    model: [qwen3.6-27b]
    files:
      - models/qwen3.6-27b/vllm/patches/vllm-marlin-pad
    load_bearing_when:
      - composes:
          - vllm/dual
          - vllm/dual-turbo
          - vllm/dual-dflash
          - vllm/dual-dflash-noviz
          - vllm/dual-bf16
          - vllm/dual-int8
          - vllm/dual-tq3-mtp
          - vllm/dual-tq3-mtp-genesis
          - vllm/dual-tq3-nomtp
          - vllm/dual-carnice-bf16mtp
          - vllm/dual-qwopus-bf16mtp
          - vllm/dual4
          - vllm/dual4-dflash
        reason: "AutoRound INT4 TP shards can fall below Marlin's output-feature tile floor."
        evidence: "models/qwen3.6-27b/vllm/patches/vllm-marlin-pad/README.md; models/qwen3.6-27b/INTERNALS.md#dual-card-the-marlin-pad-sub-tile-n-patch-vllm40361"
    delivery:               # DEPRECATED/READ-ONLY (test-only) — see header
      dockerfile_bake: true
      entrypoint_invoke: true
      genesis: false
    delivery_gaps: []
    delivery_mechanism: site_package_overlay
    delivery_spec:
      overlay_files:
        - src: models/qwen3.6-27b/vllm/patches/vllm-marlin-pad/marlin.py
          dest: /usr/local/lib/python3.12/dist-packages/vllm/model_executor/kernels/linear/mixed_precision/marlin.py
        - src: models/qwen3.6-27b/vllm/patches/vllm-marlin-pad/MPLinearKernel.py
          dest: /usr/local/lib/python3.12/dist-packages/vllm/model_executor/kernels/linear/mixed_precision/MPLinearKernel.py
      mount_mode: ro
      wired_at: volumes
    drift_guard:
      kind: import-and-boot
      check: "vLLM AutoRound W4A16 TP shard loads without Marlin sub-tile-n assertion (overlay target paths exist in selected nightly)"
      on_fail: hard-refuse   # foundational: TP weights will not load without it
    capability: tp-weight-load
    foundational: true
    upstream:
      ref: vllm-project/vllm#40361
      status: open
      drop_when: "merged into the selected vLLM nightly and all affected composes pin beyond the merge"
    status: verified

