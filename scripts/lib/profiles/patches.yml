schema_version: 1
# Phase A-prime (v0.8.0 #359/PR#147) added per-load-bearing-patch delivery
# metadata for the #141 generator: `delivery_mechanism`
# (python_sidecar|site_package_overlay|install_script|none), `delivery_spec`,
# mandatory `drift_guard`, `capability`, `foundational`. Only the ~10 patches
# with a non-empty `load_bearing_when` carry a real mechanism; diagnostics /
# negative-local-result / Genesis-env patches are `delivery_mechanism: none`.
# The legacy `delivery:` boolean block (`dockerfile_bake`/`entrypoint_invoke`/
# `genesis`) is DEPRECATED and READ-ONLY: it is retained verbatim only because
# scripts/tests/test-patch-attribution.sh still reads it; the generator and
# all new tooling MUST read `delivery_mechanism`/`delivery_spec` instead. Do
# not add new compose wiring decisions to the boolean block.
patches:
  - id: qwen-vllm-marlin-pad
    model: [qwen3.6-27b]
    files:
      - models/qwen3.6-27b/vllm/patches/vllm-marlin-pad
    load_bearing_when:
      - composes:
          - vllm/dual
          - vllm/dual-turbo
          - vllm/dual-dflash
          - vllm/dual-dflash-noviz
          - vllm/dual-bf16
          - vllm/dual-int8
          - vllm/dual-tq3-mtp
          - vllm/dual-tq3-mtp-genesis
          - vllm/dual-tq3-nomtp
          - vllm/dual-carnice-bf16mtp
          - vllm/dual-qwopus-bf16mtp
          - vllm/dual-nvlink
          - vllm/dual-nvlink-turbo
          - vllm/dual-nvlink-dflash
          - vllm/dual-nvlink-dflash-noviz
          - vllm/dual4
          - vllm/dual4-dflash
        reason: "AutoRound INT4 TP shards can fall below Marlin's output-feature tile floor."
        evidence: "models/qwen3.6-27b/vllm/patches/vllm-marlin-pad/README.md; models/qwen3.6-27b/INTERNALS.md#dual-card-the-marlin-pad-sub-tile-n-patch-vllm40361"
    delivery:               # DEPRECATED/READ-ONLY (test-only) — see header
      dockerfile_bake: true
      entrypoint_invoke: true
      genesis: false
    delivery_gaps: []
    delivery_mechanism: site_package_overlay
    delivery_spec:
      overlay_files:
        - src: models/qwen3.6-27b/vllm/patches/vllm-marlin-pad/marlin.py
          dest: /usr/local/lib/python3.12/dist-packages/vllm/model_executor/kernels/linear/mixed_precision/marlin.py
        - src: models/qwen3.6-27b/vllm/patches/vllm-marlin-pad/MPLinearKernel.py
          dest: /usr/local/lib/python3.12/dist-packages/vllm/model_executor/kernels/linear/mixed_precision/MPLinearKernel.py
      mount_mode: ro
      wired_at: volumes
    drift_guard:
      kind: import-and-boot
      check: "vLLM AutoRound W4A16 TP shard loads without Marlin sub-tile-n assertion (overlay target paths exist in selected nightly)"
      on_fail: hard-refuse   # foundational: TP weights will not load without it
    capability: tp-weight-load
    foundational: true
    upstream:
      ref: vllm-project/vllm#40361
      status: open
      drop_when: "merged into the selected vLLM nightly and all affected composes pin beyond the merge"
    status: verified

  - id: qwen-vllm-pr35936-required-fallback
    model: [qwen3.6-27b]
    files:
      - models/qwen3.6-27b/vllm/patches/vllm-pr35936-required-fallback
    load_bearing_when:
      - composes:
          - vllm/default
          - vllm/tools-text
          - vllm/minimal
          - vllm/long-text
          - vllm/long-text-no-mtp
          - vllm/long-vision
          - vllm/bounded-thinking
          - vllm/dual
          - vllm/dual-turbo
          - vllm/dual-dflash
          - vllm/dual-dflash-noviz
          - vllm/dual-bf16
          - vllm/dual-int8
          - vllm/dual-tq3-mtp
