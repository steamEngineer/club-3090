# `--speculative-config` JSON in models/qwen3.6-27b/vllm/compose/dual/autoround-int4/dflash.yml
# ('{"method":"dflash","model":"/root/.cache/huggingface/qwen3.6-27b-dflash","num_speculative_tokens":5}').
# Dir verified at /mnt/models/huggingface/qwen3.6-27b-dflash. Compose ships
