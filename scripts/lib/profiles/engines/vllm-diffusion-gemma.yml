schema_version: 1
id: vllm-diffusion-gemma
display_name: vLLM DiffusionGemma (dLLM arch-preview, vllm#45163 sideload)
type: vllm
stability: experimental
install:
  method: docker_image
  # STOCK, pullable nightly — NOT a baked custom image. The DiffusionGemma arch
  # exists in no released/nightly vLLM; it is sideloaded at boot from the vendored
  # overlay (see vendored_overlays). Re-pin when this nightly is purged + regenerate
  # the overlay (models/diffusiongemma-26b-a4b/vllm/patches/dgemma-overlay/README.md).
  spec: vllm/vllm-openai:nightly-2c9c07c85e56c799afffd5a671a8a0bace377a39
min_sm: 8.0
supported_model_families:
  - diffusion-gemma
features:
  int8_per_token_head: false
  turboquant_3bit_nc: false
  marlin_pad_sub_tile_n: false
  qwen3_coder_tool_parser: false
supported_kv_formats:
  - bf16
  - fp16
supported_drafters: []                # diffusion LM — no AR spec-dec
supported_weight_formats:
  - compressed-tensors                # RedHatAI fp8-dynamic pack → Marlin W8A16 on sm_86
required_overlays: []
vendored_overlays:
  - id: dgemma-vllm45163-sideload
    pr_url: https://github.com/vllm-project/vllm/pull/45163
    upstream_status: open
    upstream_merged_in_version: null
    local_status: vendored
    delivery: install_script           # boot-time cp of the vendored overlay onto the stock nightly
    purpose: >-
      DiffusionGemma (vllm#45163, UNMERGED draft) sideloaded onto a stock pullable
      nightly. The overlay (models/diffusiongemma-26b-a4b/vllm/patches/dgemma-overlay/)
      is the FULL stock-nightly-vs-dgemma-branch delta (123 vllm/*.py files), NOT the
      PR's formal 41-file set: load-bearing dgemma changes (e.g. build_attn_metadata's
      `causal` kwarg in v1/worker/gpu/attn_utils.py) live outside the PR diff, so a
      lean PR-only overlay version-skews. install.sh cp's it over the installed vllm
      pkg at boot (fail-loud arch assert). Layered on top: Codex's marlin-k-pad fixes
      (marlin.py + marlin_utils_fp8.py = Marlin sub-tile-K pad so fp8 Marlin W8A16
      tiles K=352/1056 within Ampere's 99 KB shared mem; diffusion_gemma.py = TP-vocab
      soft-embed fix + :656 dtype cast). Eager-only (torch.compile works, no gain).
      transformers: stock nightly's bundled version suffices (the overlay vendors its
      own diffusion_gemma config). REBASE on a nightly re-pin: regenerate the overlay
      (diff the dgemma branch's vllm/ tree vs the new stock nightly). Drop the whole
      sideload when #45163 merges into a pinnable engine.
required_genesis: false
notes: >-
  vLLM's first discrete-diffusion LM (DiffusionGemma 26B-A4B) on the V2 model runner
  (VLLM_USE_V2_MODEL_RUNNER=1). Boots+serves on 2x RTX 3090 (Ampere sm_86) via the
  sideloaded overlay above — no baked image. gemma4 tool+reasoning parsers work.
  Eager-only. NOT pinnable-stable for other rigs until #45163 merges (the base nightly
  may be purged — re-pin + regenerate the overlay then). See the model's learnings +
  models/diffusiongemma-26b-a4b/REGISTRY_PREP.md.
