schema_version: 1
id: vllm-diffusion-gemma
display_name: vLLM DiffusionGemma (official :gemma + Ampere/TP + #45588 engine backport)
type: vllm
stability: experimental
install:
  method: docker_image
  # OFFICIAL vLLM image with DiffusionGemma baked in (a stock vLLM build of the dgemma
  # branch commit 74b5964f; DiffusionGemmaForBlockDiffusion registers natively). Pinned
  # BY DIGEST (the :gemma tag is purge-resistant but mutable). Re-pin + rebase the 3
  # fix-mounts if vLLM re-pushes :gemma (see the fix dir README).
  spec: vllm/vllm-openai:gemma@sha256:9c719fc0c869092c7d0533f8357d6985a38d5ff03b20ffb6a4620c2b4806dd4b
min_sm: 8.0
supported_model_families:
  - diffusion-gemma
features:
  int8_per_token_head: false
  turboquant_3bit_nc: false
  marlin_pad_sub_tile_n: false
  qwen3_coder_tool_parser: false
supported_kv_formats:
  - bf16
  - fp16
supported_drafters: []                # diffusion LM — no AR spec-dec
supported_weight_formats:
  - compressed-tensors                # RedHatAI fp8-dynamic pack → Marlin W8A16 on sm_86
required_overlays: []
vendored_overlays:
  - id: dgemma-gemma-image-fixes
    pr_url: https://github.com/vllm-project/vllm/pull/45163
    upstream_status: open
    upstream_merged_in_version: null
    local_status: vendored
    delivery: site_package_overlay
    purpose: >-
      Ampere/TP bind-mounts (marlin K-pad ×2 + diffusion_gemma TP-vocab) + chat template
      overlay. See models/diffusiongemma-26b-a4b/vllm/patches/gemma-image-fixes/README.md.
  - id: dgemma-parser-engine-45588
    pr_url: https://github.com/vllm-project/vllm/pull/45588
    upstream_status: merged
    upstream_merged_in_version: "76a373e"
    local_status: vendored
    delivery: entrypoint_invoke
    purpose: >-
      Boot-time backport of #45413+#45588 ParserEngine Gemma4 onto pinned :gemma (74b5964f).
      Supersedes legacy gemma4_reasoning/tool_parser.py overlays. Drop when :gemma republish
      includes #45588 or #45163 merges to a pinnable release.
required_genesis: false
notes: >-
  vLLM's first discrete-diffusion LM (DiffusionGemma 26B-A4B) on the V2 model runner
  (VLLM_USE_V2_MODEL_RUNNER=1), on the OFFICIAL vllm/vllm-openai:gemma image (digest-pinned)
  + Ampere/TP mounts + #45588 ParserEngine boot install + chat template overlay.
  Boots+serves on 2x RTX 3090 (Ampere sm_86). Eager-only. Experimental: branch-not-main
  image + boot-time parser backport. See the fix dir READMEs + UPSTREAM.md.
