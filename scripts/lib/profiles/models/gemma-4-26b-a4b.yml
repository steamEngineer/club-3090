schema_version: 1
id: gemma-4-26b-a4b
display_name: Gemma 4 26B-A4B (MoE)
family: gemma4-swa-moe
hidden_size: 2816
intermediate_size: 2112
num_hidden_layers: 30
# Hybrid SWA pattern: 5 full_attention layers at indices [5, 11, 17, 23, 29]
# (every 6th layer, with last layer always global per Gemma 4 family convention)
num_full_attn_layers: 5
num_sliding_attn_layers: 25
num_attn_heads: 16
num_kv_heads: 8                       # sliding-layer KV head count
num_global_kv_heads: 2                # NEW: global-layer KV head count (asymmetric — distinct from sliding)
head_dim_sliding: 256
global_head_dim: 512
sliding_window: 1024
max_ctx_supported: 262144
attention_k_eq_v: true                # Gemma 4 family default — K and V share storage
# MoE (from config.json text_config)
num_experts: 128
num_experts_per_tok: 8                # config field: top_k_experts
moe_intermediate_size: 704
active_params_b: 4.0
mtp_num_hidden_layers: null           # MTP drafter is external (gemma-4-26B-A4B-it-assistant), not built-in
vision_capable: true                  # multimodal — vision_config + audio_config tokens present
weights:
  autoround-int4-mixed:
    path: gemma-4-26b-a4b-autoround-int4-mixed
    local_subdir: gemma-4-26b-a4b-autoround-int4-mixed
    size_gb: 16.0                      # measured post-download 2026-05-15
    format: autoround
    status: ampere-blocked             # moe_intermediate_size=704 % group_size=128 = 5.5
    hf_repo: Intel/gemma-4-26B-A4B-it-int4-mixed-AutoRound
    hf_repos:
      - Intel/gemma-4-26B-A4B-it-int4-mixed-AutoRound
    engine: vllm
    kind: main
    verify_glob: "*.safetensors"
  awq:
    path: gemma-4-26b-a4b-awq-4bit
    local_subdir: gemma-4-26b-a4b-awq-4bit
    size_gb: 17.0                      # measured post-download 2026-05-15
    format: compressed-tensors         # AWQ pack-quantized via vLLM compressed-tensors loader
    status: production                 # via vLLM PR #40886 overlay (Ampere-bootable)
    hf_repo: cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit
    hf_repos:
      - cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit
    engine: vllm
    kind: main
    verify_glob: "*.safetensors"
    setup_weights_key: awq
  assistant:
    path: gemma-4-26b-a4b-it-assistant
    local_subdir: gemma-4-26b-a4b-it-assistant
    size_gb: 0.97
    format: fp16
    status: production
    hf_repo: google/gemma-4-26B-A4B-it-assistant
    engine: vllm
    kind: draft
    verify_glob: "*.safetensors"
    setup_env: WITH_ASSISTANT_DRAFT=1
default_weight_variant: awq
compatible_drafters:
  - gemma-26b-it-assistant            # dedicated 26B-A4B MTP assistant (separate weights from 31B)
# Sliding layers cap TP at num_kv_heads=8 → [1,2,4,8]
# Global layers cap TP at num_global_kv_heads=2 → [1,2]
# Effective valid_tp = intersection = [1, 2]
valid_tp:
  - 1
  - 2
requires_genesis: false               # Gemma 4 family doesn't need Genesis (no DeltaNet quirks)
# kv-calc.py models MoE + asymmetric KV heads (8 sliding / 2 global), and as of
# #326 its KV-pool floor is per-sequence (capped at the legacy 1 GB) rather than a
# flat 1 GB — so the KV-light single-card AWQ+MTP slug projects TIGHT (correct:
# 0.78 GB growing pool holds 17,490 tok ≥ 16,384 max_ctx, boots+serves live
# 2026-06-06) instead of a false FAIL, without disabling the gate on a config we
# actively ship the drafter on. Calibration corpus is empty (both slugs
# kvcalc_key=SKIP) pending the #464 rebench anchor; projections stay directional.
kv_calc_supported: true
