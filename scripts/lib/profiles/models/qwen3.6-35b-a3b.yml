schema_version: 1
id: qwen3.6-35b-a3b
display_name: Qwen 3.6 35B-A3B (MoE)
family: qwen3-next-moe
hidden_size: 2048
num_hidden_layers: 40
# Hybrid: 10 full_attention layers at indices 3,7,11,15,19,23,27,31,35,39
# (one per 4-layer block, matching full_attention_interval=4 in config.json)
num_gdn_layers: 30
num_attn_layers: 10
num_attn_heads: 16
num_kv_heads: 2
head_dim_attn: 256
linear_num_v_heads: 32
linear_num_k_heads: 16
linear_v_head_dim: 128
linear_k_head_dim: 128
linear_conv_kernel_dim: 4
max_ctx_supported: 262144
attention_k_eq_v: false
# MoE (from config.json text_config)
num_experts: 256
num_experts_per_tok: 8
moe_intermediate_size: 512
shared_expert_intermediate_size: 512
active_params_b: 3.0
# Built-in MTP drafter (1 dedicated MTP head)
mtp_num_hidden_layers: 1
attn_output_gate: true
vision_capable: true
weights:
  autoround-int4:
    path: qwen3.6-35b-a3b-autoround-int4
    local_subdir: qwen3.6-35b-a3b-autoround-int4
    size_gb: 20.0
    format: autoround
    status: production
    hf_repo: Qwen/Qwen3-MoE-A3B-Instruct-AutoRound-Int4-mixed
    hf_repos:
      - Qwen/Qwen3-MoE-A3B-Instruct-AutoRound-Int4-mixed
    engine: vllm
    kind: main
    verify_glob: "*.safetensors"
  gptq_int4:
    path: qwen3.6-35b-a3b-gptq-int4
    local_subdir: qwen3.6-35b-a3b-gptq-int4
    size_gb: 22.0
    format: gptq
    status: experimental
    engine: vllm
    kind: main
    verify_glob: "*.safetensors"
  gguf:
    path: qwen3.6-35b-a3b-gguf
    local_subdir: qwen3.6-35b-a3b-gguf
    size_gb: 90.0
    format: gguf
    status: production
    engine: llama-cpp
    kind: gguf
    verify_glob: "*.gguf"
  dflash:
    path: qwen3.6-35b-a3b-dflash
    local_subdir: qwen3.6-35b-a3b-dflash
    size_gb: variable
    format: autoround
    status: experimental
    engine: vllm
    kind: draft
    verify_glob: "*.safetensors"
  dflash_gguf:
    path: qwen3.6-35b-a3b-dflash-gguf
    local_subdir: qwen3.6-35b-a3b-dflash-gguf
    size_gb: variable
    format: gguf
    status: experimental
    engine: llama-cpp
    kind: gguf
    verify_glob: "*.gguf"
default_weight_variant: autoround-int4
compatible_drafters:
  - qwen-mtp-builtin
# num_kv_heads=2 caps TP at 2 (each rank needs at least 1 KV head)
valid_tp:
  - 1
  - 2
# Strictly bootable on upstream vLLM (PR #42521 onwards). Genesis is
# RECOMMENDED for production: it provides TQ3 KV (Genesis-only) plus the
# Cliff 2 / DeltaNet stabilization patches that matter past ~21-26K ctx.
# Preview/smoke composes target vllm-nightly-clean (no Genesis); production
# composes (TBD — gated on Genesis v7.73.x re-anchor) target vllm-nightly-mtp.
requires_genesis: false
# kv-calc.py models the MoE + DeltaNet+attention hybrid as of v0.7.3.
# Calibration is low-anchor (preview + preview-MTP rows only); add longer
# context / max_num_seqs rows before treating projections as production-grade.
kv_calc_supported: true
