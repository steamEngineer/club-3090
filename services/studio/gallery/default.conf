# Always-on static gallery over ComfyUI's output dir — survives ComfyUI being down.
server {
    listen 80;
    server_name _;
    root /srv/media;
    location / {
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        add_header Access-Control-Allow-Origin *;
        # nginx serves static files with Range support by default → video seeking works
    }
}
