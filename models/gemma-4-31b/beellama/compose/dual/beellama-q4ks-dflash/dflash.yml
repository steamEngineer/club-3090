# ===========================================================================
# Profile (at-a-glance):
#   Model:     Gemma-4-31B-it (Unsloth Q4_K_S GGUF target + Anbeeld DFlash drafter)
#   Engine:    beellama.cpp (Anbeeld llama.cpp fork — DFlash spec-dec + SWA windowed KV)
#   Topology:  Dual 3090 (layer-split across both cards, PCIe — no NVLink needed)
#   Drafter:   DFlash (--spec-type dflash, Anbeeld DFlash-IQ4_XS GGUF)
#   KV:        q5_0 K + q4_1 V (Anbeeld's long-ctx precision default)
#   Vision:    no (mmproj NOT mounted; set MMPROJ_FILE + --mmproj for vision)
#   Template:  native (GGUF-embedded) via --jinja
#   Max ctx:   262144 default (the model's native n_ctx_train — ~48 GB combined VRAM
#              across 2 cards removes the single-card KV ceiling). UNVALIDATED at this
#              ctx on dual; see Status. Lower CTX_SIZE if a rung OOMs.
#   Genesis:   N/A — beellama is a llama.cpp-family engine
#   Status:    🧪 EXPERIMENTAL — RELEASED for community v0.3.0 testing (Anbeeld's request, #288).
#              Multi-GPU DFlash fix VALIDATED on Anbeeld's official v0.3.0 image (sm_86, FA_ALL_QUANTS=1,
#              single + dual cross-ring, 2026-06-01); image injected centrally from beellama-local
#              install.spec. Promote 🧪→⚠️ when Anbeeld tags a STABLE release AND prose accept recovers.
#   Caveats:   External dep: Anbeeld/beellama.cpp issue #39 (multi-GPU DFlash). The fix shipped in
#              v0.3.0 — launchers inject Anbeeld's OFFICIAL server-cuda-v0.3.0 and the compose
#              `image:` default is now our multi-arch v0.3.0 build (efe856397); both carry the fix,
#              validated on 2× 3090 (2026-06-01):
#                ✅ Multi-GPU crash FIXED — no "decode failed -1"; boot now logs "drafter=1
#                   devices; enabling GPU cross ring". --spec-draft-device CUDA0 no longer
#                   ggml_aborts (Anbeeld's "explicit draft device" fix).
#                ✅ CODE DFlash: up to ~157 TPS dual (≈4.2× the ~37 no-spec baseline), accept 0.33–0.64.
#                ⚠️ PROSE acceptance REGRESSED to ~0.07 → ~35 TPS (net-negative vs no-spec).
#                   IDENTICAL single + dual → NOT multi-GPU; a v0.3.0-wide DFlash-on-prose
#                   regression (old b9459 was ~0.20 prose, net-positive). Qwen3.6-27B (DeltaNet,
#                   NOT SWA-windowed) shows the identical collapse → NOT the SWA mismatch; a
#                   cross-model v0.3.0 DFlash regression. Code unaffected.
#                ❌ MTP (--spec-type mtp + radamanthys-assistant Q8_0): "unknown model
#                   architecture: gemma4_mtp" — unsupported on this build (distinct from the
#                   CLOSED Anbeeld #36, which was garbage MTP *output* on Qwen, not arch-load).
#              RUN IT: the launcher injects the OFFICIAL v0.3.0 image automatically (no prefix needed),
#              validated on Ampere sm_86 (FA_ALL_QUANTS=1, single + dual cross-ring, 2026-06-01):
#                bash scripts/switch.sh --force beellama/gemma-dflash-dual
#              5090/sm_120 (not in the official sm_86/89 build): prefix
#                BEELLAMA_IMAGE=ghcr.io/noonghunna/beellama-cpp:multiarch-v0.3.0-efe856397
#              Pin the commit tag — NOT -dev, which moves. Repoint default → Anbeeld's STABLE tag when it ships.
#              Filed PR Anbeeld#48 (FA_ALL_QUANTS Dockerfile fix + CUDA→GHCR nightly workflow).
#              Findings: club-3090 disc #288 + beellama #39. Tracked: docs/UPSTREAM.md.
#              UN-PARK TRIGGER: Anbeeld tags a STABLE release (not the dev branch) carrying these
#              fixes AND prose acceptance recovers. Until then dual-262K = vllm/gemma-int8-mtp.
#   Best for:  (gated) overlay-free 262K dual *fallback* once the upstream DFlash fix ships —
#              until then, dual-262K = vllm/gemma-int8-mtp.
# ---------------------------------------------------------------------------
# Gemma-4-31B on beellama.cpp — DUAL 3090, Q4_K_S + DFlash (Anbeeld IQ4_XS draft),
# q5_0/q4_1 KV, layer-split across both cards, 262K ctx.
#
# This is the single-card dflash.yml (../../single/beellama-q4ks-dflash/dflash.yml)
# scaled to two GPUs: `count: all` exposes both 3090s, `--split-mode layer` pipelines
# the 60 layers across them (layer-split, NOT tensor/row-split — avoids the heavy
# cross-GPU all-reduce traffic that row-split needs on a PCIe-only, NVLink-less rig).
# The bigger combined VRAM pool is what unlocks the model's native 262K ctx.
#
# Override defaults via .env or shell (same as the single-card compose, plus):
#   CTX_SIZE              KV pool size                (default: 262144 — native max; lower if OOM)
#   SPLIT_MODE            llama.cpp --split-mode       (default: layer — best for PCIe no-NVLink)
#   MAIN_GPU              --main-gpu (draft + small tensors land here)  (default: 0)
#   TENSOR_SPLIT          --tensor-split proportions   (default: unset = auto-even across equal cards)
#   CTX_SIZE / KV_TYPE_K / KV_TYPE_V / BATCH_SIZE / UBATCH_SIZE / CROSS_CTX / NP /
#   REASONING / TEMP / TOP_K / TOP_P / MIN_P / MMPROJ_FILE / PORT — see the single compose.
#
# Quick start (both GPUs must be free):
#   MODEL_DIR=/your/models/dir docker compose -f dflash.yml up -d
#   curl http://localhost:8062/v1/models
services:
  beellama-gemma4-31b-dual:
    image: ${BEELLAMA_IMAGE:-ghcr.io/noonghunna/beellama-cpp:multiarch-v0.3.0-efe856397}
    container_name: "${ESTATE_CONTAINER:-beellama-gemma4-31b-dual}"
    restart: unless-stopped
    ports:
      - "${ESTATE_PORT:-${PORT:-8062}}:8080"
    volumes:
      - "${MODEL_DIR:-../../../../../../models-cache}:/models:ro"
    command: >-
      --host 0.0.0.0
      --port 8080
      -m /models/${GGUF_FILE:-gemma-4-31b-gguf/unsloth-q4ks/gemma-4-31B-it-Q4_K_S.gguf}
      --spec-draft-model /models/${DRAFT_FILE:-gemma-4-31b-gguf/anbeeld-dflash-iq4xs/gemma4-31b-it-dflash-IQ4_XS.gguf}
      --spec-type dflash
      --spec-dflash-cross-ctx ${CROSS_CTX:-1024}
      -ngl all
      --spec-draft-ngl all
      --split-mode ${SPLIT_MODE:-layer}
      --main-gpu ${MAIN_GPU:-0}
      --ctx-size ${CTX_SIZE:-262144}
      -b ${BATCH_SIZE:-2048}
      -ub ${UBATCH_SIZE:-512}
      -np ${NP:-1}
      --kv-unified
      --cache-type-k ${KV_TYPE_K:-q5_0}
      --cache-type-v ${KV_TYPE_V:-q4_1}
      --flash-attn on
      --cache-ram 0
      --no-host
      --jinja
      --reasoning ${REASONING:-off}
      --temp ${TEMP:-${TEMPERATURE:-1.0}}
      --top-k ${TOP_K:-64}
      --top-p ${TOP_P:-0.95}
      --min-p ${MIN_P:-0.0}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
