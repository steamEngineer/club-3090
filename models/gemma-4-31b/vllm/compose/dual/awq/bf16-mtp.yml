# ===========================================================================
# Profile (at-a-glance):
#   Model:     Gemma 4 31B (cyankiwi AWQ-4bit weights — different quant from AutoRound INT4)
#   Topology:  Dual 3090 (TP=2, NVLink auto-detected via NVLINK_MODE)
#   Drafter:   MTP n=4 default (n=8 single-stream code variant via MTP_N=8)
#   KV:        bfloat16 (AWQ doesn't use FP8 KV — bypasses PR #40391 entirely)
#   Vision:    yes
#   Max ctx:   118K (single-stream) / 65K (multi-stream MAX_NUM_SEQS=4)
#   Genesis:   N/A — Genesis is Qwen3-Next-specific
#   Status:    ✅ Production
#   Best for:  Multi-tenant agent fleet at 65K + 4 streams, OR 118K single-stream code
# ---------------------------------------------------------------------------
# Gemma-4-31B-it (cyankiwi AWQ-4bit) + Google MTP "assistant" drafter
# 2× RTX 3090 TP=2 + bf16 KV + AWQ-4bit weights — long-context Gemma 4 today.
#
# This compose is a CROSS-RIG REPRODUCER of @3dluvr's [#103 bench](
# https://github.com/noonghunna/club-3090/issues/103) which showed
# **195K context, 113 narrative / 163 code TPS** on 2× RTX 3090 dual-card.
#
# Why this exists alongside `dual.yml` and `dual-int8.yml`:
#
# | Compose | Weights | KV | Max ctx | Strategy |
# |---|---|---|---:|---|
# | `dual.yml` | INT4 (AutoRound) | bf16 | 32K | bf16 KV ceiling |
# | `dual-int8.yml` | INT4 (AutoRound) | INT8 PTH | 262K | trade KV precision for ctx |
# | **`dual-awq.yml`** ⭐ | **AWQ-4bit (cyankiwi)** | **bf16** | **262K** | **trade weight quant for ctx** |
#
# AWQ-4bit weights are SMALLER than bf16 weights at the same ~31B param count
# (~17 GB vs ~62 GB), so even at bf16 KV the 24 GB cards have enough headroom
# for 195K-262K KV pool. Bypasses PR #40391's per-token-head bug entirely.
#
# Status: COMMUNITY-CONTRIBUTED — first cross-rig reproducer pending validation.
#
# Models:
#   target: cyankiwi/gemma-4-31B-it-AWQ-4bit  (~17 GB on disk, AWQ-pack-quantized)
#   draft : google/gemma-4-31B-it-assistant    (0.5B / 927 MB BF16, MTP n=8)
#
# Quant scheme detail (from config.json):
#   AWQ-4bit pack-quantized, group_size=32, asymmetric, MSE observer.
#   Routed via vLLM's "compressed-tensors" loader → Marlin kernel for inference.
#   Marlin kernel was previously buggy on Ampere with sub-tile-n cases (our
#   PR #40361 fix on Qwen3.6); this AWQ config uses head_dim 128 / 256 / 512
#   which may or may not hit the same case — boot test will confirm.
#
# Bench targets (from @3dluvr #103, single rig — to be cross-validated here):
#   narrative ~113 wall TPS  (MTP n=8, --dtype half, --async-scheduling)
#   code      ~163 wall TPS
#   Max ctx   195K (3dluvr's anchored test) → 262K theoretical
#   Peak VRAM 23890 MiB / card (very tight envelope, 0.97 of card capacity)
#
# Differences from 3dluvr's #103 config (kept conservative for first-rig boot):
#   - mem-util default 0.85 (3dluvr used 0.8) — slightly less tight to leave
#     room for vLLM's memory-profiler estimates
#   - `--dtype bfloat16` instead of `half` — bf16 is what our other Gemma
#     composes use; A/B vs `half` is a follow-up
#   - Default cudagraph_capture_sizes left at vLLM defaults (3dluvr's `[9]`
#     is single-stream-specialized; default broader sweep helps p50)
#   - max-num-seqs default 4 (3dluvr's 1 is single-stream-only); override
#     MAX_NUM_SEQS=1 for max-context single-stream like 3dluvr.
# ===========================================================================
# Hardware metadata (parsed by scripts/preflight.sh):
# Requires-min-vram-gb: 24
# Engine-profile: vllm-nightly-full
# Requires-min-gpu-count: 2
# Tensor-parallel: 2
services:
  vllm-gemma-4-31b-awq:
    # Latest nightly that contains PR #41745 (Gemma 4 MTP). AWQ doesn't need
    # PR #40391's per-token-head fix, so we stay on the post-#41745 nightly.
    image: ${VLLM_IMAGE:-vllm/vllm-openai:nightly-${VLLM_NIGHTLY_SHA}}
    container_name: "${ESTATE_CONTAINER:-vllm-gemma-4-31b-awq}"
    restart: "no"
    ports:
      - "${ESTATE_PORT:-${PORT:-8033}}:8000"
    volumes:
      - ${MODEL_DIR:-../../../../../../models-cache}:/root/.cache/huggingface
      - ../../../cache/torch_compile_awq:/root/.cache/vllm/torch_compile_cache
      - ../../../cache/triton_awq:/root/.triton/cache
      # NVLink auto-detection — runs inside container at boot.
      - ../../../../../../scripts/detect_nvlink.sh:/etc/club3090/detect_nvlink.sh:ro
      # vLLM PR #41800 (truncate_prompt_tokens kwarg) overlay — fixes opencode-style
      # HTTP 400 on get_max_tokens(). No-op on post-fix nightlies.
      # See ../../../patches/vllm-pr41800-truncate-prompt-tokens/README.md.
      - ../../../patches/vllm-pr41800-truncate-prompt-tokens/install.sh:/etc/club3090/install-pr41800.sh:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=${ESTATE_GPUS:-${NVIDIA_VISIBLE_DEVICES:-all}}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NVLINK_MODE=${NVLINK_MODE:-auto}
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_NO_USAGE_STATS=1
      - OMP_NUM_THREADS=1
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - PYTORCH_CUDA_ALLOC_CONF=${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True,max_split_size_mb:256,max_non_split_rounding_mb:1024}
      - TRITON_CACHE_DIR=/root/.triton/cache
      # Marlin atomic-add — 3dluvr's flag for AWQ-Marlin perf on consumer GPUs
      - VLLM_MARLIN_USE_ATOMIC_ADD=${VLLM_MARLIN_USE_ATOMIC_ADD:-1}
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # transformers 5.8.0 needed for gemma4_assistant (MTP drafter).
    # Image ships 5.7.0; pip install on entrypoint until vLLM nightly rebuilds
    # against ≥5.8.0.
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -e
        pip install --quiet --upgrade transformers==5.8.0
        # NVLink auto-detection (sets NCCL env vars, _NVLINK_ENABLED).
        source /etc/club3090/detect_nvlink.sh
        bash /etc/club3090/install-pr41800.sh
        if [ "${_NVLINK_ENABLED:-0}" = "1" ]; then
          exec vllm serve "$@"
        else
          exec vllm serve --disable-custom-all-reduce "$@"
        fi
      - --
    command:
      - --override-generation-config
      - '{"temperature":${TEMP:-${TEMPERATURE:-1.0}},"top_p":${TOP_P:-0.95},"top_k":${TOP_K:--1},"min_p":${MIN_P:-0.0},"repetition_penalty":${REPEAT_PENALTY:-1.0}}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - /root/.cache/huggingface/gemma-4-31b-it-AWQ-4bit
      - --served-model-name
      - gemma-4-31b-awq
      - --tensor-parallel-size
      - "${TP:-2}"
      - --pipeline-parallel-size
      - "${PP:-1}"
      - --dtype
      - "${DTYPE:-bfloat16}"
      - --trust-remote-code
      - --enable-chunked-prefill
      # ---- max-model-len ----
      # Conservative initial 65K (4× of bf16 / 32K baseline) for boot validation.
      # Bump to 195K after first-pass validation matches 3dluvr's anchor.
      # 262K (model native) is the stretch target.
      - --max-model-len
      - "${MAX_MODEL_LEN:-65536}"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTILIZATION:-0.85}"
      - --max-num-seqs
      - "${MAX_NUM_SEQS:-4}"
      - --max-num-batched-tokens
      - "${MAX_NUM_BATCHED_TOKENS:-6144}"
      - --enable-auto-tool-choice
      - --tool-call-parser
      - gemma4
      - --chat-template
      - /vllm-workspace/examples/tool_chat_template_gemma4.jinja
      # MTP "assistant" drafter — same as dual.yml but with n=8 (3dluvr's
      # choice; our other Gemma 4 composes use n=4 default — n-sweep is a
      # follow-up subtask).
      - --speculative-config
      - '{"model":"/root/.cache/huggingface/gemma-4-31b-it-assistant","num_speculative_tokens":${MTP_N:-4}}'
