# ===========================================================================
# Profile (at-a-glance):
#   Model:     Gemma 4 31B (Intel AutoRound INT4)
#   Topology:  Dual 3090 (TP=2, NVLink auto-detected via NVLINK_MODE)
#   Drafter:   MTP n=4 (Google's official `gemma-4-31B-it-assistant`, BF16 0.5B)
#   KV:        turboquant_3bit_nc
#   Status:    ⛔ HARDWARE-BLOCKED on Ampere — see 2026-05-11 walkthrough below.
#              Compose retained as documentation + future re-test surface.
#   Best for:  Reference / re-test when FA Ampere head_dim>256 lands OR vLLM
#              gains per-layer attention backend routing.
# ---------------------------------------------------------------------------
# 2026-05-11 WORKAROUND ATTEMPT — full walkthrough + final wall:
#
#   We walked the vllm-issue#41403 5-gate chain. Outcome: 5 gates closed/
#   worked-around, then hit a 6th hardware-physical gate on Ampere.
#
#   Gates 1–5 (all addressable on this rig):
#     Gate 3 (plugin drift):  `pip uninstall -y turboquant-vllm` in entrypoint.
#     Gate 4 (ninja):         `pip install ninja` in entrypoint.
#     Gate 5 (page-size):     closed by merged vllm#39931 in nightly 1acd67a7.
#     Gate 1 (mm_prefix):     `--hf-overrides text_config.use_bidirectional_attention=null`.
#     Gate 2 (per-layer routing): patched our overlay's
#                             TurboQuantConfig.get_boundary_skip_layers → [],
#                             so no layers want "auto" dtype that TQ rejects.
#     Plus vendored vllm#40108 overlay (8 files in ../../../patches/vllm-pr40108-rebased/)
#     for TQ + YOCO + sliding-window kernels.
#     Plus our cudagraph-capture guards on 3 `.tolist()` sites in PR #40108's
#     turboquant_attn.py (lines 486, 591, 592) — same family of fix as the
#     merged PR #41434 elsewhere in the codebase.
#
#   Gate 6 — HARDWARE-PHYSICAL on Ampere SM 8.6 (RTX 3090):
#     ```
#     RuntimeError: FlashAttention forward only supports head dimension at most 256
#     ```
#     Fires in TurboQuantAttentionBackend._prefill_attention →
#     flash_attn_varlen_func(). Gemma 4 has interleaved head_dims: sliding-
#     attention layers use head_dim=256, global-attention layers use
#     head_dim=512. With gate 2 worked around (boundary skip disabled), TQ
#     backend handles all 60 layers including the global ones. FA2 on Ampere
#     SM 8.6 only supports head_dim ≤ 256. FA3 (which supports 512) requires
#     Hopper SM 9.0+. The TQ backend has no pure-Triton fallback for global
#     attention on Ampere.
#
#     If we restore boundary skip: boundary layers want "auto" dtype, vLLM
#     has no per-layer attention backend routing, so the global TURBOQUANT
#     backend rejects them on validation. Both paths blocked.
#
#   What unlocks this path:
#     (a) vLLM TQ backend gains pure-Triton prefill for head_dim>256 on
#         Ampere (no upstream PR exists yet), OR
#     (b) vLLM gains per-layer attention backend routing (would let
#         boundary layers use TRITON_ATTN while interior layers use
#         TURBOQUANT), OR
#     (c) Run on Hopper SM 9.0+ hardware where FA3 supports head_dim=512.
#
#   Compose retained as both documentation and re-test surface. To re-test
#   when unlocked: `MODEL_DIR=/mnt/models/huggingface docker compose -f int8-tq3.yml up -d`.
#
# ---------------------------------------------------------------------------
# ORIGINAL TOMBSTONE (pre-2026-05-11 workaround attempt, retained for history):
#
# UPSTREAM BLOCKER CHAIN (verified 2026-05-11):
#
#   Booting this compose today fails at engine init with:
#     ValueError: Selected backend AttentionBackendEnum.TRITON_ATTN is not
#                 valid for this configuration.
#                 Reason: ['kv_cache_dtype not supported']
#
#   Gemma 4 uses TRITON_ATTN for its interleaved sliding-window + global
#   head attention, and TRITON_ATTN doesn't yet have a TurboQuant integration.
#   `turboquant_3bit_nc` / `turboquant_4bit_nc` only tie into the
#   `turboquant_attn` backend used by standard-attention models. Qwen3-Next
#   hybrid works fine — see the matched-config sister compose at
#   `qwen3.6-27b/vllm/compose/dual/int8-tq3.yml`.
#
# Active upstream PRs that together would unblock this:
#   - vllm#40108 — Support TurboQuant for YOCO + sliding-window models
#                  (Gemma 4 E4B). Adds PyTorch mask + Triton windowed
#                  decode + unified KV page-size logic. OPEN, iterating
#                  as of 2026-05-07 (+237/-42).
#   - vllm#41497 — [Bugfix] Preserve TurboQuant sliding-window KV specs.
#                  Companion to #40108. OPEN.
#   - vllm#40308 — [Bugfix] Hybrid KV manager for quantized per-token-head
#                  KV cache. OPEN.
#
# Trackers:
#   - vllm-issue#41403 — 5-gate blocker chain for Gemma 4 multimodal + TQ.
#   - vllm-issue#40094 — Our exact bug ("Turbo Quant keep failing
#                        TRITON_ATTN 'kv_cache_dtype not supported'").
#
# When the PR stack merges, re-test this compose. Expected outcome based
# on extrapolating from Qwen TQ3 (+134% KV pool vs INT8 PTH): KV pool
# ≈ 1.1M tokens, max concurrency ≈ 4.1× @ 262K. Until then, the
# apples-to-apples TQ3 head-to-head with Qwen isn't possible — use
# `dual/int8.yml` for any matched-config Gemma bench.
#
# ---------------------------------------------------------------------------
# Original int8.yml header retained below for reference; the INT8 PTH path
# is what we actually ship for this model (`dual/int8.yml`).
# ---------------------------------------------------------------------------
# Gemma-4-31B-it (Intel AutoRound INT4) + Google MTP "assistant" drafter
# 2× RTX 3090 TP=2 + per-token-head INT8 KV + ~120K ctx target.
#
# Default KV_DTYPE is int8_per_token_head because that's what runs on Ampere
# sm_86. fp8 PTH variants require Ada/Blackwell — see hardware compatibility
# table below. Override KV_DTYPE=fp8_per_token_head if you're on Ada/Blackwell
# and want to A/B against fp8 precision.
#
# Status: COMMUNITY-CONTRIBUTED, EXPERIMENTAL.
#   Post-rebase of vLLM PR #40391 by @lisp19 (Gemma 4 KV cache page-size
#   alignment for per-token-head quantization). PR is upstream-open + stalled
#   on maintainer review; cross-rig validation by @cferra (sm_120 Blackwell
#   TP=4) and @noonghunna (sm_86 Ampere — this rig). Local rebase resolves
#   the conflict against post-Mamba-hybrid-support main.
#
# Companion to dual.yml:
#   dual.yml         — bf16 KV, 32K ctx (safe default, no overlays)
#   dual-int8.yml    — INT8 per-token-head KV, ~120K ctx (this file)
#   single.yml     — TP=1 single-card (boot OOM on Ampere)
#
# Hardware × per-token-head dtype compatibility:
#
#   |               | INT8 PTH | FP8 e4m3 PTH | FP8 e5m2 PTH | NVFP4 |
#   | sm_90 Hopper  |    ✅     |      ✅       |      ✅       |   ✅   |
#   | sm_89 Ada     |    ✅     |      ✅       |      ✅       |   ✅   |
#   | sm_120 Black. |    ✅     |      ✅       |      ✅       |   ✅   |
#   | sm_86 Ampere  |    ✅     |      ❌       |      ❌       |   ❌   |
#
#   Ampere blocker for fp8 PTH: Triton kernel uses `fp8e4nv` which sm_86
#   doesn't implement (Ampere only supports `fp8e4b15` and `fp8e5`).
#   ValueError: "type fp8e4nv not supported in this architecture"
#   → fires from `_initialize_kv_caches` boot path. Confirmed 2026-05-08.
#
#   INT8 PTH dispatches to standard PyTorch torch.int8 ops (not Triton fp8
#   kernel) so it runs on every consumer GPU including Ampere. Same KV
#   memory savings as FP8 (1 byte/element); slightly different precision
#   characteristics (better near-zero, narrower dynamic range than e5m2).
#
#   For Ada/Blackwell users: override KV_DTYPE=fp8_per_token_head if you
#   want to benchmark FP8 vs INT8 PTH precision on your hardware.
#
# Why this exists (the upstream-blocker chain, summarized):
#
#   Gemma 4 has interleaved attention with two head_dims:
#     - sliding/local layers: head_dim=256
#     - global/full layers:   head_dim=512
#   ANY per-token-head KV format adds scale metadata per token, breaking
#   vLLM's `unify_kv_cache_spec_page_size()` because the resulting page
#   sizes don't share a clean ratio. PR #40391 pre-pads the global layers
#   to a 1040-byte factor and routes standard attention through a new
#   `get_padded_attention_kv_cache_shape` helper to unblock this family.
#
#   Without PR #40391, dual.yml is forced to bf16 KV + 32K ctx ceiling
#   (KV pool exhausted at higher). With PR #40391 + INT8 PTH KV, ctx
#   ceiling lifts to ~120K (4×) at the same TP=2 mem-util budget.
#
# Bench targets (TBD post-validation on this rig):
#   narrative ~109 wall TPS (parity with bf16 path; KV format affects
#                            ctx ceiling, not per-token TPS materially)
#   code      ~142 wall TPS
#   Max ctx   ~120K (4× lift vs dual.yml's 32K)
#
# Models:
#   target: Intel/gemma-4-31B-it-int4-AutoRound  (21.2 GB, vision preserved)
#   draft : google/gemma-4-31B-it-assistant       (0.5B / 927 MB BF16)
#
# Vendored overlays (drop when upstream merges):
#   1. vLLM PR #40391 — gemma4 per-token-head fp8 KV (rebased onto post-Mamba
#      main with conflict resolved in gpu/attn_utils.py).
#      See: ../../../patches/vllm-pr40391-rebased/README.md
#   2. vLLM PR #42006 (whytem) + PR #41991 (the-david-oy) stacked — Gemma 4
#      tool-parser bug fixes (MTP streaming multi-tool + parser bounds).
#      See: ../../../patches/vllm-gemma4-tool-parser-fixes/README.md
#
# Drop both overlays when the corresponding upstream PRs land:
#   gh api repos/vllm-project/vllm/pulls/40391 --jq '.state, .merged_at'
#   gh api repos/vllm-project/vllm/pulls/42006 --jq '.state, .merged_at'
#   gh api repos/vllm-project/vllm/pulls/41991 --jq '.state, .merged_at'
# ===========================================================================
# Hardware metadata (parsed by scripts/preflight.sh):
# Requires-min-vram-gb: 24
# Engine-profile: vllm-nightly-full
# Requires-min-gpu-count: 2
# Tensor-parallel: 2
# Requires-sm: 9.0+
services:
  vllm-gemma-4-31b-mtp-int8-tq3:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:nightly-${VLLM_NIGHTLY_SHA}}
    container_name: "${ESTATE_CONTAINER:-vllm-gemma-4-31b-mtp-int8-tq3}"
    restart: "no"
    ports:
      - "${ESTATE_PORT:-${PORT:-8034}}:8000"
    volumes:
      - ${MODEL_DIR:-../../../../../../models-cache}:/root/.cache/huggingface
      # torch.compile + Triton kernel caches — first boot warms (~5-7 min);
      # subsequent boots reuse cached graphs (~3 min). Separate cache dirs
      # from dual.yml because the overlay file set differs (cudagraph
      # capture would re-key on the patched kernel paths anyway).
      - ../../../cache/torch_compile_int8:/root/.cache/vllm/torch_compile_cache
      - ../../../cache/triton_int8:/root/.triton/cache
      # ---- vLLM PR #40108 overlay (TurboQuant + YOCO + sliding-window) ----
      # 8 files: adds PyTorch sliding-window mask, Triton windowed decode,
      # unified KV page-size logic for TQ backend on Gemma 4. Drop when
      # PR #40108 merges. See ../../../patches/vllm-pr40108-rebased/README.md.
      # NOTE: this REPLACES the PR #40391 overlay (used by int8.yml) — both
      # PRs touch attention.py + kv_cache_utils.py, can't coexist file-mount.
      # int8.yml keeps the #40391 overlay; this compose uses #40108 instead
      # because TQ3 doesn't need per-token-head KV support.
      - ../../../patches/vllm-pr40108-rebased/config/model.py:/usr/local/lib/python3.12/dist-packages/vllm/config/model.py:ro
      - ../../../patches/vllm-pr40108-rebased/engine/arg_utils.py:/usr/local/lib/python3.12/dist-packages/vllm/engine/arg_utils.py:ro
      - ../../../patches/vllm-pr40108-rebased/model_executor/layers/attention/attention.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/layers/attention/attention.py:ro
      - ../../../patches/vllm-pr40108-rebased/model_executor/layers/quantization/turboquant/config.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/layers/quantization/turboquant/config.py:ro
      - ../../../patches/vllm-pr40108-rebased/v1/attention/backends/turboquant_attn.py:/usr/local/lib/python3.12/dist-packages/vllm/v1/attention/backends/turboquant_attn.py:ro
      - ../../../patches/vllm-pr40108-rebased/v1/attention/ops/triton_turboquant_decode.py:/usr/local/lib/python3.12/dist-packages/vllm/v1/attention/ops/triton_turboquant_decode.py:ro
      - ../../../patches/vllm-pr40108-rebased/v1/core/kv_cache_utils.py:/usr/local/lib/python3.12/dist-packages/vllm/v1/core/kv_cache_utils.py:ro
      - ../../../patches/vllm-pr40108-rebased/v1/worker/utils.py:/usr/local/lib/python3.12/dist-packages/vllm/v1/worker/utils.py:ro
      # ---- Gemma 4 tool-parser stacked fixes (PR #42006 + PR #41991) ----
      # 1 file: MTP streaming multi-tool + parser bounds. Drop when both PRs merge.
      - ../../../patches/vllm-gemma4-tool-parser-fixes/tool_parsers/gemma4_tool_parser.py:/usr/local/lib/python3.12/dist-packages/vllm/tool_parsers/gemma4_tool_parser.py:ro
      # NVLink auto-detection — runs inside container at boot.
      - ../../../../../../scripts/detect_nvlink.sh:/etc/club3090/detect_nvlink.sh:ro
      # --------------------------------------------------------------------
      # vLLM PR #41800 (truncate_prompt_tokens kwarg) overlay — fixes opencode-style
      # HTTP 400 on get_max_tokens(). No-op on post-fix nightlies.
      # See ../../../patches/vllm-pr41800-truncate-prompt-tokens/README.md.
      - ../../../patches/vllm-pr41800-truncate-prompt-tokens/install.sh:/etc/club3090/install-pr41800.sh:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=${ESTATE_GPUS:-${NVIDIA_VISIBLE_DEVICES:-all}}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NVLINK_MODE=${NVLINK_MODE:-auto}
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_NO_USAGE_STATS=1
      - OMP_NUM_THREADS=1
      - PYTORCH_CUDA_ALLOC_CONF=${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True,max_split_size_mb:512}
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - TRITON_CACHE_DIR=/root/.triton/cache
      # Note: PR #40108's turboquant_attn.py has 3 `.tolist()` CPU syncs at
      # lines 486, 591, 592 that crashed cudagraph capture. Our overlay
      # adds is_current_stream_capturing() guards at all three sites
      # (same family of fix as PR #41434 applied elsewhere). Cudagraph
      # capture stays enabled.
    # ---- 2026-05-11 workaround preamble ----
    # Gate 4: ninja required for Triton JIT (some TurboQuant kernels JIT-compile).
    # Gate 3: drop turboquant-vllm plugin if present (signature drift vs nightly).
    # Then chain to the normal `vllm serve` entrypoint.
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -e
        echo "[club3090-tq3] Gate 4: installing ninja..." >&2
        pip install ninja --quiet 2>&1 | tail -2 >&2 || true
        echo "[club3090-tq3] Gate 3: dropping turboquant-vllm plugin..." >&2
        pip uninstall -y turboquant-vllm 2>&1 | tail -1 >&2 || true
        echo "[club3090-tq3] Launching vllm serve..." >&2
        # NVLink auto-detection (sets NCCL env vars, _NVLINK_ENABLED).
        source /etc/club3090/detect_nvlink.sh
        bash /etc/club3090/install-pr41800.sh
        if [ "${_NVLINK_ENABLED:-0}" = "1" ]; then
          exec vllm serve "$@"
        else
          exec vllm serve --disable-custom-all-reduce "$@"
        fi
      - --
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command:
      - --override-generation-config
      - '{"temperature":${TEMP:-${TEMPERATURE:-1.0}},"top_p":${TOP_P:-0.95},"top_k":${TOP_K:--1},"min_p":${MIN_P:-0.0},"repetition_penalty":${REPEAT_PENALTY:-1.0}}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - /root/.cache/huggingface/gemma-4-31b-autoround-int4
      - --served-model-name
      - gemma-4-31b-autoround
      - --tensor-parallel-size
      - "${TP:-2}"
      - --pipeline-parallel-size
      - "${PP:-1}"
      # ---- 2026-05-11 workaround flags ----
      # Force TURBOQUANT backend — required because vLLM has no per-layer
      # backend routing (Gate 2). Without force, vLLM picks TRITON_ATTN
      # globally for Gemma 4 and rejects turboquant_3bit_nc on interior layers.
      # Companion patch: our overlay's TurboQuantConfig.get_boundary_skip_layers
      # returns [] so no layers want "auto" dtype (which TURBOQUANT rejects).
      # Quality cost: boundary precision loss on layers 0/1/58/59. Upstream
      # notes ~30 GSM8K drop on Qwen3-4B at aggressive 3bit_nc; Gemma 4
      # impact unmeasured. Drop this when per-layer routing lands.
      - --attention-backend
      - TURBOQUANT
      # Gate 1 workaround: disable bidirectional vision attention so image
      # tokens don't propagate mm_prefix=True (which TQ backend doesn't yet
      # implement). Image-token attention degrades to causal — bench-OK,
      # but vision-quality benchmarks are no longer apples-to-apples.
      - --hf-overrides
      - '{"text_config":{"use_bidirectional_attention":null}}'
      # ---- KV format ----
      # Default `int8_per_token_head` runs on every consumer GPU including
      # sm_86 Ampere (uses standard PyTorch torch.int8 ops, not the Triton
      # fp8e4nv kernel that sm_86 doesn't implement).
      # Ada/Blackwell users can override KV_DTYPE=fp8_per_token_head to A/B
      # against fp8 PTH precision.
      # NOT `fp8_e5m2` (legacy tensor-wide fp8, rejected by query_quant
      # allowlist on Gemma 4 even with PR #40391 — that's a separate query
      # quantization compatibility check). NOT `fp8_e4m3` either (Triton
      # fp8e4nv kernel not supported on sm_86 Ampere).
      - --kv-cache-dtype
      - "${KV_DTYPE:-turboquant_3bit_nc}"
      # ---- max-model-len ceiling (TP=2, fp8 KV after PR #40391) ----
      # Theoretical: ~120K (4× lift vs bf16 KV's 32K because per-token KV is
      # ~half size with fp8). Conservative initial test: 96K with mem-util 0.95.
      # Bump to 120K once 96K validates clean.
      - --max-model-len
      - "${MAX_MODEL_LEN:-98304}"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTILIZATION:-0.95}"
      # max-num-seqs governs concurrency. Trade vs context: KV pool is shared
      # across streams, so lower max-num-seqs → more per-stream context budget.
      # Recommended overrides:
      #   max-num-seqs=4 + max-model-len=98K  (default — multi-tenant agent)
      #   max-num-seqs=2 + max-model-len=170K (2 concurrent long-ctx agents)
      #   max-num-seqs=1 + max-model-len=262144 (single-stream, model native max)
      - --max-num-seqs
      - "${MAX_NUM_SEQS:-4}"
      # Vision tower: max_tokens_per_mm_item=2496 must fit in batched tokens.
      - --max-num-batched-tokens
      - "4096"
      - --trust-remote-code
      # Tool-call support — required for soak / agent traffic that includes
      # `tools: [...]` array. The vendored tool-parser overlay above also
      # contributes here.
      - --enable-auto-tool-choice
      - --tool-call-parser
      - gemma4
      - --chat-template
      - /vllm-workspace/examples/tool_chat_template_gemma4.jinja
      # SPEC_N_MAX overridable for matched-config head-to-head against
      # qwen3.6-27b/vllm/compose/dual/autoround-int4/int8.yml (Qwen's built-in MTP caps at
      # n=3 architecturally, so the canonical apples-to-apples bench uses
      # SPEC_N_MAX=3 here).
      - --speculative-config
      - '{"model":"/root/.cache/huggingface/gemma-4-31b-it-assistant","num_speculative_tokens":${SPEC_N_MAX:-4}}'
