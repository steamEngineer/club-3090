# ===========================================================================
# Profile (at-a-glance):
#   Model:     Gemma 4 31B (Intel AutoRound INT4)
#   Topology:  Dual 3090 (TP=2, NVLink auto-detected via NVLINK_MODE) — single-card boot-OOMs on 24 GB
#   Drafter:   MTP n=3 (Google's official `gemma-4-31B-it-assistant`, BF16 0.5B)
#   KV:        bfloat16 (2 bytes/token)
#   Vision:    yes
#   Max ctx:   32K (BF16 ceiling — for 262K use dual-int8.yml)
#   Genesis:   N/A — Genesis is Qwen3-Next-specific
#   Status:    ✅ Production
#   Quality:   126/150 (84%) — det 56/75 (75%) · sandbox 70/75 (93%, v0.4 shape-check) (--full, 2026-05-09)
#                TC 60% · IF 87% · SO 87% · DE 100% · RM 40% · BF 100% · HA 100% · CLI 88%
#   Best for:  Gemma 4 dual-card STABLE fallback (stock v0.22.0, no overlay, 32K) — vision + tools.
#              The dual default is vllm/gemma-int8 (full 262K); use this when you want
#              to stay on stable with no vendored overlay and 32K ctx is enough.
# ---------------------------------------------------------------------------
# Gemma-4-31B-it (Intel AutoRound INT4) + Google MTP "assistant" drafter
# 2× RTX 3090 TP=2 + bfloat16 KV + 32K ctx + 4 streams.
#
# Status: COMMUNITY-CONTRIBUTED, EXPERIMENTAL.
#   First Ampere consumer cross-rig data on Google's Gemma 4 MTP drafters
#   (released 2026-05-05). Google benched on RTX PRO 6000 Blackwell;
#   this compose tests the same path on 2× RTX 3090 (Ampere sm_86, PCIe-only).
#
# Bench (2× 3090 PCIe, no NVLink, 230W cap, 2026-05-05 evening):
#   narrative (canonical 800-word essay): 109.16 wall TPS (CV 3.0%)
#   code (canonical quicksort):           140.59 wall TPS (CV 1.7%)
#   AL: 3.05 narr / 3.99 code (n=4 max — code essentially saturating)
#   Per-position accept narr: 79/57/41/29 %
#   Per-position accept code: 92/77/66/56 %
#   VRAM: 21.5 GB/card
#   Speedup vs no-spec-decode baseline (~61 TPS): 1.79× narr / 2.31× code.
#
# Models:
#   target: Intel/gemma-4-31B-it-int4-AutoRound  (21.2 GB, vision preserved)
#   draft : google/gemma-4-31B-it-assistant       (0.5B / 927 MB BF16)
#
# Pre-merge dependencies — both LANDED 2026-05-08:
#   1. vLLM PR #41745 — Gemma 4 MTP — MERGED 2026-05-06 (commit 27e0057a).
#      Nightly tag `1acd67a795...` (2026-05-08) is post-merge → overlay dropped.
#   2. transformers ≥ 5.8.0 — released 2026-05-05. Verified: post-merge nightly
#      ships transformers 5.8.0 → entrypoint upgrade line dropped.
# Pin uses the post-Gemma4-merge nightly. Note: Qwen3.6 composes stay on the
# v7.72.2 PROD pin (01d4d1ad3) since Genesis allowlist anchors there.
#
# KV format pinned in a corner on Ampere:
#   - fp8_e5m2 → assert fail in gemma4_mm.py:1336 (vLLM allowlist excludes it)
#   - fp8_e4m3 → Triton "fp8e4nv not supported in this architecture" on sm_86
#     (Ampere supports only fp8e4b15 / fp8e5; not fp8e4nv)
#   - default (auto = bfloat16) → sidesteps all fp8 kernel paths
# Smaller KV pool than fp8 but at 32K test ctx that's not the bottleneck.
# ===========================================================================
# Hardware metadata (parsed by scripts/preflight.sh):
# Requires-min-vram-gb: 24
# Engine-profile: vllm-gemma-stable
# Requires-min-gpu-count: 2
# Tensor-parallel: 2
services:
  vllm-gemma-4-31b-mtp:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:v0.22.0}
    container_name: "${ESTATE_CONTAINER:-vllm-gemma-4-31b-mtp}"
    restart: ${CLUB3090_RESTART:-unless-stopped}
    ports:
      - "${ESTATE_PORT:-${PORT:-8030}}:8000"
    volumes:
      - ${MODEL_DIR:-../../../../../../models-cache}:/root/.cache/huggingface
      # torch.compile + Triton kernel caches — first boot warms (~5-7 min);
      # subsequent boots reuse cached graphs (~3 min). Pattern from dual-turbo.yml.
      - ../../../cache/torch_compile:/root/.cache/vllm/torch_compile_cache
      - ../../../cache/triton:/root/.triton/cache
      # PR #41745 overlay dropped 2026-05-08: merged upstream + nightly contains it.
      # NVLink auto-detection — runs inside container at boot.
      - ../../../../../../scripts/detect_nvlink.sh:/etc/club3090/detect_nvlink.sh:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=${ESTATE_GPUS:-${NVIDIA_VISIBLE_DEVICES:-all}}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NVLINK_MODE=${NVLINK_MODE:-auto}
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_NO_USAGE_STATS=1
      - OMP_NUM_THREADS=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:512
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - TRITON_CACHE_DIR=/root/.triton/cache
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # transformers 5.8.0+ ships in the post-Gemma4-merge nightly (verified
    # 2026-05-08: nightly-1acd67a795... has transformers 5.8.0). Entrypoint
    # upgrade dropped.
    entrypoint:
      - /bin/bash
      - -c
      - |
        # NVLink auto-detection (sets NCCL env vars, _NVLINK_ENABLED).
        source /etc/club3090/detect_nvlink.sh
        if [ "${_NVLINK_ENABLED:-0}" = "1" ]; then
          exec vllm serve "$@"
        else
          exec vllm serve --disable-custom-all-reduce "$@"
        fi
      - --
    command:
      - --override-generation-config
      - '{"temperature":${TEMP:-${TEMPERATURE:-1.0}},"top_p":${TOP_P:-0.95},"top_k":${TOP_K:-64},"min_p":${MIN_P:-0.0},"repetition_penalty":${REPEAT_PENALTY:-1.0}}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - /root/.cache/huggingface/gemma-4-31b-autoround-int4
      - --served-model-name
      - gemma-4-31b-autoround
      - --tensor-parallel-size
      - "${TP:-2}"
      - --pipeline-parallel-size
      - "${PP:-1}"
      # max-model-len ceiling (TP=2, BF16 KV):
      #   32K ctx @ 0.92 → KV pool ~38K tokens (shipped default — matches bench above)
      #   48K ctx @ 0.95 → KV pool ~50K tokens (safe — MTP drafter is 0.5B vs DFlash's 2.9B,
      #                                          slightly more headroom than dual-dflash.yml)
      #   65K ctx @ 0.95 → KV pool ~60K tokens (max practical; 65K request partially overflows)
      # fp8 KV blocked on Ampere — see header comment.
      # Override: MAX_MODEL_LEN=49152 GPU_MEMORY_UTILIZATION=0.95 bash scripts/switch.sh vllm/gemma-mtp
      - --max-model-len
      - "${MAX_MODEL_LEN:-32768}"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTILIZATION:-0.92}"
      - --max-num-seqs
      - "4"
      # Vision tower: max_tokens_per_mm_item=2496 must fit in batched tokens.
      - --max-num-batched-tokens
      - "4096"
      - --trust-remote-code
      # Tool-call support per vLLM Gemma 4 recipe — required for any soak /
      # agent traffic that includes a `tools: [...]` array. Without these,
      # vLLM rejects tool-bearing requests with HTTP 400.
      - --enable-auto-tool-choice
      - --tool-call-parser
      - gemma4
      - --chat-template
      - /vllm-workspace/examples/tool_chat_template_gemma4.jinja
      - --speculative-config
      - '{"model":"/root/.cache/huggingface/gemma-4-31b-it-assistant","num_speculative_tokens":4}'
