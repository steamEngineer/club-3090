# ===========================================================================
# Profile (at-a-glance):
#   Model:     Gemma 4 31B (Intel AutoRound INT4)
#   Topology:  Dual 3090 (TP=2, NVLink auto-detected via NVLINK_MODE)
#   Drafter:   z-lab Gemma 4 DFlash n=7 (block-diffusion, BF16 KV in independent pool)
#   KV:        int8_per_token_head (target) + bfloat16 (drafter — independent pools)
#   Vision:    yes
#   Max ctx:   262K (8.2× over bf16 ceiling)
#   Genesis:   N/A — Genesis is Qwen3-Next-specific
#   Status:    ⏸️ Upstream-gated
#   Caveats:   Boots only with vLLM PR #42102 vendored mounts (our patch, OPEN/awaiting `ready` label). Drop the override mounts when PR merges + propagates to a nightly tag.
#   Best for:  Long-context code-optimal Gemma 4 — 87/146 TPS at 262K (+16% code vs MTP-int8) ⭐⭐
# ---------------------------------------------------------------------------
# Gemma-4-31B-it (Intel AutoRound INT4) + z-lab DFlash drafter + INT8 PTH KV
# 2× RTX 3090 TP=2 + per-token-head INT8 KV — long-context DFlash spec-decode.
#
# THIS IS THE PHASE 3 STACK — combines:
#   - PR #41703 z-lab Gemma 4 DFlash drafter (12 vendored files, jianc99 fork
#     of upstream PR, rebased onto e47c98ef nightly by Codex).
#   - PR #40391 lisp19 per-token-head fp8 KV page-size fix (5 vendored files,
#     manually backported to e47c98ef base — see vllm-gemma4-dflash-int8/README.md
#     for rebase notes).
#
# ✅ STATUS: WORKING via vLLM PR #42102 (our patch, OPEN as of 2026-05-08)
#   https://github.com/vllm-project/vllm/pull/42102
#
# Originally blocked at `_init_minimal_kv_cache_for_profiling` with:
#   NotImplementedError: The page size of the layer is not divisible by the
#   maximum page size. Cannot unify by adjusting block_size.
# at kv_cache_utils.py:1068 inside unify_kv_cache_spec_page_size().
#
# Root cause (per our diagnostic 2026-05-08): DFlash drafter uses BF16 KV pool
# regardless of `--kv-cache-dtype`, and the engine forced target+drafter
# through a single page-size unify pass. PR #42102's three-layer fix:
# (1) partition DFlash drafter specs into independent KV groups before unify,
# (2) override drafter cache_dtype to "auto" when engine is quantized,
# (3) FA metadata scheduler reads per-spec dtype when kv_quant_mode is NONE.
#
# Local validation on 2x 3090 Ampere:
#   max_model_len=262144, INT8 PTH KV, n=7 DFlash, single-stream:
#   - Boot HEALTHY, KV pool 168,178 tokens (effective ceiling ~168K context)
#   - Paris smoke clean, narrative 86.86 / code 145.96 TPS
#   - NIAH PASS at 98,444 tokens
#   - n-sweep at 262K: n=5 81.91/138.87, n=7 86.86/145.96, n=8 86.63/152.06
#     — n=7 is the lowest-variance choice; n=8 +4% code at higher CV (5.7%)
#   - vs dual-int8.yml at 262K: +16% code (146 vs 126), -10% narr (87 vs 95)
#     — DFlash code-optimal advantage preserved at long context
#
# Drop overlay when PR #42102 merges to vLLM main + propagates to a nightly tag.
# Track:
#   gh api repos/vllm-project/vllm/pulls/42102 --jq '.state, .merged_at'
# Pre-PR-42102 historical broken versions preserved at:
#   ../../../patches/vllm-gemma4-dflash-int8/_pre-pr42102-historical/
# (kv_cache_utils.py.before, qwen3_dflash.py.before — for record only).
#
# Status: COMMUNITY-CONTRIBUTED, EXPERIMENTAL, BLEEDING EDGE — DOES NOT BOOT.
#   The combined overlay is a structural superset of:
#     - dual-dflash.yml     (DFlash drafter, bf16 KV, 32K ctx ceiling)
#     - dual-int8.yml   (MTP drafter, INT8 PTH KV, 262K ctx)
#   It targets DFlash's code-optimal acceptance length (AL ~5 at n=7) at
#   long context (~120K-200K) — a regime previously unreachable on Ampere.
#
# Why structurally interesting:
#   - DFlash drafter is code-optimal: 95-104 narr / 168-177 code TPS in
#     existing dual-dflash.yml at 32K bf16. MTP is narrative-optimal:
#     109/141 at 32K bf16 / 95/126 at 262K INT8 PTH. So DFlash×INT8 PTH
#     is the combined "long-context code-optimal" cell of the matrix.
#   - The 32K bf16 ceiling on DFlash blocks IDE-agent / large-repo / tool
#     prefill workloads that need >32K context. INT8 PTH unblocks ~98K-262K
#     context while preserving DFlash's code TPS profile.
#
# Hardware × per-token-head dtype compatibility — same as dual-int8.yml:
#   sm_86 Ampere (us)  → INT8 PTH ✅, FP8 PTH ❌ (fp8e4nv Triton kernel)
#   sm_89 Ada / sm_120 → INT8 PTH ✅, FP8 PTH ✅
#
# Pin: nightly `e47c98ef7a38792996e452ef53914e21e41928e9` (2026-05-06)
#   This is the SAME pin as dual-dflash.yml (DFlash overlay was rebased to
#   this base). Bumping requires re-rebasing PR #41703 onto a newer nightly.
#   Once PR #41703 lands upstream, both this file AND dual-dflash.yml can
#   bump nightly together + drop their DFlash overlays.
#
# Bench targets (TBD post-validation on this rig):
#   narrative ~95 wall TPS  (parity with dual-dflash.yml + INT8 PTH cost)
#   code      ~165 wall TPS (parity with dual-dflash.yml + INT8 PTH cost)
#   Max ctx   ~98K-200K (target — actual ceiling depends on KV pool budget
#                        + DFlash drafter footprint at 290 MB BF16)
#
# Models:
#   target: Intel/gemma-4-31B-it-int4-AutoRound  (21.2 GB, vision preserved)
#   draft : z-lab/gemma-4-31B-it-DFlash           (2.9 GB BF16, code-tuned)
#
# Vendored overlays (drop when upstream PRs land):
#   1. PR #41703 z-lab DFlash drafter — see ../../../patches/vllm-gemma4-dflash/README
#   2. PR #40391 per-token-head — see ../../../patches/vllm-gemma4-dflash-int8/README
# ===========================================================================
# Hardware metadata (parsed by scripts/preflight.sh):
# Requires-min-vram-gb: 24
# Engine-profile: vllm-nightly-dflash
# Requires-min-gpu-count: 2
# Tensor-parallel: 2
services:
  vllm-gemma-4-31b-dflash-int8:
    # SAME pin as dual-dflash.yml — DFlash overlay was rebased to e47c98ef.
    # See ../../../patches/vllm-gemma4-dflash-int8/README.md for the merge resolution.
    image: ${VLLM_IMAGE:-vllm/vllm-openai:nightly-${VLLM_NIGHTLY_SHA}}
    container_name: "${ESTATE_CONTAINER:-vllm-gemma-4-31b-dflash-int8}"
    restart: "no"
    ports:
      - "${ESTATE_PORT:-${PORT:-8032}}:8000"
    volumes:
      - ${MODEL_DIR:-../../../../../../models-cache}:/root/.cache/huggingface
      # Distinct cache dirs from dual-dflash.yml because the patched kernel
      # paths differ (cudagraph capture re-keys on the patches).
      - ../../../cache/torch_compile_dflash_int8:/root/.cache/vllm/torch_compile_cache
      - ../../../cache/triton_dflash_int8:/root/.triton/cache
      # ---- Combined DFlash + per-token-head overlay tree ----
      # 17 files. See ../../../patches/vllm-gemma4-dflash-int8/README.md for rebase
      # notes (especially the 2 conflict-resolved files).
      # config layer (DFlash)
      - ../../../patches/vllm-gemma4-dflash-int8/config/attention.py:/usr/local/lib/python3.12/dist-packages/vllm/config/attention.py:ro
      - ../../../patches/vllm-gemma4-dflash-int8/config/speculative.py:/usr/local/lib/python3.12/dist-packages/vllm/config/speculative.py:ro
      # model_executor layer
      - ../../../patches/vllm-gemma4-dflash-int8/model_executor/layers/attention/attention.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/layers/attention/attention.py:ro
      - ../../../patches/vllm-gemma4-dflash-int8/model_executor/models/gemma4.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/models/gemma4.py:ro
      - ../../../patches/vllm-gemma4-dflash-int8/model_executor/models/qwen3_dflash.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/models/qwen3_dflash.py:ro
      # transformers_utils
      - ../../../patches/vllm-gemma4-dflash-int8/transformers_utils/configs/speculators/algos.py:/usr/local/lib/python3.12/dist-packages/vllm/transformers_utils/configs/speculators/algos.py:ro
      # v1 attention
      - ../../../patches/vllm-gemma4-dflash-int8/v1/attention/backends/triton_attn.py:/usr/local/lib/python3.12/dist-packages/vllm/v1/attention/backends/triton_attn.py:ro
      - ../../../patches/vllm-gemma4-dflash-int8/v1/attention/backends/flash_attn.py:/usr/local/lib/python3.12/dist-packages/vllm/v1/attention/backends/flash_attn.py:ro
      - ../../../patches/vllm-gemma4-dflash-int8/v1/attention/selector.py:/usr/local/lib/python3.12/dist-packages/vllm/v1/attention/selector.py:ro
      # v1 core (DFlash + PR #40391 merged)
      - ../../../patches/vllm-gemma4-dflash-int8/v1/core/kv_cache_utils.py:/usr/local/lib/python3.12/dist-packages/vllm/v1/core/kv_cache_utils.py:ro
      - ../../../patches/vllm-gemma4-dflash-int8/v1/core/sched/scheduler.py:/usr/local/lib/python3.12/dist-packages/vllm/v1/core/sched/scheduler.py:ro
      # v1 spec_decode (DFlash)
      - ../../../patches/vllm-gemma4-dflash-int8/v1/spec_decode/dflash.py:/usr/local/lib/python3.12/dist-packages/vllm/v1/spec_decode/dflash.py:ro
      - ../../../patches/vllm-gemma4-dflash-int8/v1/spec_decode/eagle.py:/usr/local/lib/python3.12/dist-packages/vllm/v1/spec_decode/eagle.py:ro
      - ../../../patches/vllm-gemma4-dflash-int8/v1/spec_decode/utils.py:/usr/local/lib/python3.12/dist-packages/vllm/v1/spec_decode/utils.py:ro
      # v1 kv_cache_interface (PR #40391)
      - ../../../patches/vllm-gemma4-dflash-int8/v1/kv_cache_interface.py:/usr/local/lib/python3.12/dist-packages/vllm/v1/kv_cache_interface.py:ro
      # v1 worker (DFlash + PR #40391 merged)
      - ../../../patches/vllm-gemma4-dflash-int8/v1/worker/gpu/attn_utils.py:/usr/local/lib/python3.12/dist-packages/vllm/v1/worker/gpu/attn_utils.py:ro
      - ../../../patches/vllm-gemma4-dflash-int8/v1/worker/gpu_model_runner.py:/usr/local/lib/python3.12/dist-packages/vllm/v1/worker/gpu_model_runner.py:ro
      - ../../../patches/vllm-gemma4-dflash-int8/v1/worker/kv_cache_shape_utils.py:/usr/local/lib/python3.12/dist-packages/vllm/v1/worker/kv_cache_shape_utils.py:ro
      # NVLink auto-detection — runs inside container at boot.
      - ../../../../../../scripts/detect_nvlink.sh:/etc/club3090/detect_nvlink.sh:ro
      # --------------------------------------------------------------------
      # vLLM PR #41800 (truncate_prompt_tokens kwarg) overlay — fixes opencode-style
      # HTTP 400 on get_max_tokens(). No-op on post-fix nightlies.
      # See ../../../patches/vllm-pr41800-truncate-prompt-tokens/README.md.
      - ../../../patches/vllm-pr41800-truncate-prompt-tokens/install.sh:/etc/club3090/install-pr41800.sh:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=${ESTATE_GPUS:-${NVIDIA_VISIBLE_DEVICES:-all}}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NVLINK_MODE=${NVLINK_MODE:-auto}
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_NO_USAGE_STATS=1
      - OMP_NUM_THREADS=1
      - PYTORCH_CUDA_ALLOC_CONF=${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True,max_split_size_mb:512}
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - TRITON_CACHE_DIR=/root/.triton/cache
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # transformers 5.8.0 needed for gemma4_assistant (DFlash uses it via model
    # registration). Image ships 5.7.0; pip install on entrypoint until vLLM
    # nightly rebuilds against ≥5.8.0.
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -e
        pip install --quiet --upgrade transformers==5.8.0
        # NVLink auto-detection (sets NCCL env vars, _NVLINK_ENABLED).
        source /etc/club3090/detect_nvlink.sh
        bash /etc/club3090/install-pr41800.sh
        if [ "${_NVLINK_ENABLED:-0}" = "1" ]; then
          exec vllm serve "$@"
        else
          exec vllm serve --disable-custom-all-reduce "$@"
        fi
      - --
    command:
      - --override-generation-config
      - '{"temperature":${TEMP:-${TEMPERATURE:-1.0}},"top_p":${TOP_P:-0.95},"top_k":${TOP_K:--1},"min_p":${MIN_P:-0.0},"repetition_penalty":${REPEAT_PENALTY:-1.0}}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - /root/.cache/huggingface/gemma-4-31b-autoround-int4
      - --served-model-name
      - gemma-4-31b-autoround
      - --tensor-parallel-size
      - "${TP:-2}"
      - --pipeline-parallel-size
      - "${PP:-1}"
      - --dtype
      - bfloat16
      # ---- KV format (per-token-head INT8 — Ampere-compatible) ----
      - --kv-cache-dtype
      - "${KV_DTYPE:-int8_per_token_head}"
      # ---- max-model-len ----
      # DFlash drafter (2.9 GB BF16) + Gemma 4 INT4 (~21.2 GB) leaves ~3-4 GB
      # KV pool per card at TP=2 mem-util 0.95. INT8 PTH ~doubles KV per byte
      # vs bf16, so ceiling target is ~96K-200K depending on max-num-seqs.
      # Default 65K + max-num-seqs=2 leaves headroom for DFlash drafter ops.
      # Bump to 98K once 65K validates clean. 200K is target stretch goal.
      - --max-model-len
      - "${MAX_MODEL_LEN:-65536}"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTILIZATION:-0.95}"
      - --max-num-seqs
      - "${MAX_NUM_SEQS:-2}"
      - --max-num-batched-tokens
      - "4096"
      - --trust-remote-code
      - --enable-auto-tool-choice
      - --tool-call-parser
      - gemma4
      - --chat-template
      - /vllm-workspace/examples/tool_chat_template_gemma4.jinja
      # ---- DFlash drafter (z-lab fork) ----
      - --speculative-config
      - '{"method":"dflash","model":"/root/.cache/huggingface/gemma-4-31b-it-dflash","num_speculative_tokens":7}'
