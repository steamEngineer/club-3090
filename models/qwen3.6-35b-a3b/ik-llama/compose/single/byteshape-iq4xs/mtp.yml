# ===========================================================================
# Profile (at-a-glance):
#   Model:     Qwen3.6-35B-A3B (byteshape IQ4_XS 4.19bpw GGUF)
#   Engine:    ik_llama.cpp (ghcr.io/ikawrakow/ik-llama-cpp@sha256:5f914f1ccade922417af58c94bd1cbb558052c8852d86678ead3fe693eec0143)
#   Topology:  Single 3090 (TP=1)
#   Drafter:   MTP n=2, p-min 0.0 (built-in MTP head — byteshape/Qwen3.6-35B-A3B-MTP-GGUF)
#   KV:        q4_0 K + q4_0 V + -khad/-vhad Hadamard
#   Vision:    NO (mmproj-bf16.gguf exists upstream — vision not wired here yet)
#   Default ctx: --fit (auto; author observed 262K full n_ctx_train)
#   Genesis:   N/A — Genesis is Qwen3-Next-specific; 35B-A3B is MoE
#   Status:    ⚠️ Production w/ caveats — first-party validated on 1× 3090 (2026-06-02):
#              verify-full all-pass, verify-stress 8/8 (NIAH→240K, no Cliff), bench n=5
#              (narrative 113/116 · code 129/137 wall/decode TPS, CV <2.3%), 8-pack 110/150,
#              soak-continuous PASS (0 err, 0 VRAM growth, 0/25 silent-empty, 100% retention).
#              Community intake from PR #293 (@Rhonstin).
#   Caveats:   Single-rig validation (1× 3090, 370 W) — cross-rig numbers welcome. Agent-pack
#              scores (hermesagent-20 11/20 = 55%, cli-40 17/40 = 42%) are typical for the
#              35B-A3B class (the apex sibling scores similarly). Intake fixes vs PR #293:
#              image cu12→cu13-server, port 8020→8058.
#   Quality:   toolcall-15 15/15 (100%) · instructfollow-15 14/15 (93%) · structoutput-15 14/15 (93%) · dataextract-15 13/15 (87%) · reasonmath-15 13/15 (87%) · bugfind-15 13/15 (87%) · hermesagent-20 11/20 (55%) · cli-40 17/40 (42%) (--full, our 1× 3090, 2026-06-02 — 110/150 total)
#   Best for:  Single-card Qwen3.6-35B-A3B — author's best overall 8-pack on the rig (111/150, 74%)
# ---------------------------------------------------------------------------
# Qwen3.6-35B-A3B on ik_llama.cpp — single 3090, byteshape IQ4_XS + q4_0 KV + MTP.
#
# File: byteshape/Qwen3.6-35B-A3B-MTP-GGUF — Qwen3.6-35B-A3B-IQ4_XS-4.19bpw.gguf (~18.6 GB)
# The MTP head is embedded in the GGUF (byteshape "MTP-GGUF" repo).
#
# Uses --fit to auto-size context to available VRAM (similar to mudler-apex-compact/fit-mtp.yml).
# No apex chat template — byteshape uses native GGUF-embedded Qwen3 template.
#
# Quick start:
#   # File at: <MODEL_DIR>/qwen3.6-35b-a3b-gguf/byteshape-iq4xs/Qwen3.6-35B-A3B-IQ4_XS-4.19bpw.gguf
#   From this directory:
#     docker compose -f mtp.yml up -d
#   curl http://localhost:8058/v1/models
#
# Override defaults via .env or shell:
#   MODEL_DIR              host dir to mount as /models  (default: ../../../../../../models-cache)
#   GGUF_FILE              path under /models  (default: qwen3.6-35b-a3b-gguf/byteshape-iq4xs/Qwen3.6-35B-A3B-IQ4_XS-4.19bpw.gguf)
#   CTX_SIZE               KV pool size (overrides --fit if set)
#   BATCH_SIZE             llama.cpp -b        (default: 4096)
#   UBATCH_SIZE            llama.cpp -ub       (default: 1024)
#   NP                     parallel slots      (default: 1)
#   KV_TYPE                K and V quant type  (default: q4_0)
#   MTP_DRAFT_N_MAX        MTP draft tokens    (default: 2)
#   DRAFT_P_MIN            draft accept floor  (default: 0.0)
#   REASONING             thinking gate       (default: off)
#   REASONING_FORMAT      reasoning routing   (default: deepseek)
#   PORT                  host port           (default: 8058)
#   CUDA_VISIBLE_DEVICES  which GPU to use    (default: 0)

services:
  ik-llama-qwen36-35b-a3b-byteshape-iq4xs:
    image: ${IK_LLAMA_IMAGE:-ghcr.io/ikawrakow/ik-llama-cpp@sha256:5f914f1ccade922417af58c94bd1cbb558052c8852d86678ead3fe693eec0143}
    container_name: "${ESTATE_CONTAINER:-ik-llama-qwen36-35b-a3b-byteshape}"
    restart: unless-stopped
    ports:
      - "${ESTATE_PORT:-${PORT:-8058}}:8080"
    volumes:
      - "${MODEL_DIR:-../../../../../../models-cache}:/models:ro"
    command: >-
      --host 0.0.0.0
      --port 8080
      --model /models/${GGUF_FILE:-qwen3.6-35b-a3b-gguf/byteshape-iq4xs/Qwen3.6-35B-A3B-IQ4_XS-4.19bpw.gguf}
      --fit
      --fit-margin 256
      -ngl 99
      -b ${BATCH_SIZE:-4096}
      -ub ${UBATCH_SIZE:-1024}
      -np ${NP:-1}
      -ctk ${KV_TYPE:-q4_0}
      -ctv ${KV_TYPE:-q4_0}
      -khad
      -vhad
      -ngld 99
      --spec-type mtp:n_max=${MTP_DRAFT_N_MAX:-2},p_min=${DRAFT_P_MIN:-0.0}
      --recurrent-ckpt-mode auto
      --merge-qkv
      -fa on
      --jinja
      --parallel-tool-calls
      --reasoning ${REASONING:-off}
      --reasoning-format ${REASONING_FORMAT:-deepseek}
      --temp ${TEMP:-${TEMPERATURE:-0.6}}
      --top-p ${TOP_P:-0.95}
      --top-k ${TOP_K:-20}
      --min-p ${MIN_P:-0.0}
      --repeat-penalty ${REPEAT_PENALTY:-1.1}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${ESTATE_GPUS:-${CUDA_VISIBLE_DEVICES:-0}}"]
              capabilities: [gpu]
