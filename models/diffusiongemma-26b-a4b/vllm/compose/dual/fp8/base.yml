# ===========================================================================
# Profile (at-a-glance):
#   Model:     DiffusionGemma 26B-A4B — discrete-diffusion LM / dLLM (RedHatAI
#              FP8-dynamic, compressed-tensors float-quantized)
#   Topology:  Dual 3090 PCIe (TP=2, no NVLink)
#   Drafter:   none — diffusion LM (block-parallel denoising; AR spec-dec N/A)
#   KV:        bf16 (pool ~408K tok @ util 0.82, 262K-len)
#   Vision:    no (text diffusion)
#   Max ctx:   262144 (NIAH retrieval validated to ~250K)
#   Genesis:   N/A — Genesis is Qwen3-Next-specific
#   Status:    ⏸️ Upstream-gated — works on Ampere, but boots only via the vendored
#              overlay until vllm#45163 merges into a pinnable engine.
#   Caveats:   The DiffusionGemma arch exists in NO released/nightly vLLM — only in
#              the UNMERGED PR vllm#45163 (https://github.com/vllm-project/vllm/pull/45163).
#              Delivery = stock PULLABLE nightly + a SIDELOADED overlay applied at
#              boot (install_script), NOT a baked custom image:
#                • image = stock `vllm/vllm-openai:nightly-2c9c07c8…` (everyone can pull it)
#                • ../../../patches/dgemma-overlay/ = the vendored payload: the full
#                  stock-nightly-vs-dgemma-branch delta (123 vllm/*.py files — the
#                  PR's formal 41-file set version-skews, since load-bearing dgemma
#                  changes like build_attn_metadata's `causal` kwarg live outside the
#                  PR diff) + Codex's 3 fixes (marlin.py + marlin_utils_fp8.py K-pad
#                  for fp8 Marlin W8A16 on sm_86's 99 KB shared mem; diffusion_gemma.py
#                  TP-vocab soft-embed + :656 dtype cast). install.sh cp's it over the
#                  installed vllm pkg before the server starts (fail-loud arch assert).
#              REBASE when the nightly moves/is purged: re-pin the image + regenerate
#              the overlay (see ../../../patches/dgemma-overlay/README.md). Not
#              pinnable-stable until #45163 merges — then this collapses to one pin.
#              Runs EAGER-ONLY (torch.compile works but gives no throughput gain).
#   Quality:   8-pack 100/150 (67%) — toolcall 13/15 · instructfollow 13-15/15 ·
#              structoutput 14/15 · dataextract 10/15 · reasonmath 11/15 ·
#              bugfind 11/15 · hermesagent-20 14/20 (agentic tool-use works) ·
#              cli-40 14/40. Deterministic 5-pack 63/75 (84%). (--full, 2026-06-11,
#              gemma4 tool+reasoning parsers; 57%→84% on the 5-pack WITH parsers.)
#   Best for:  experimental dLLM serving / agentic tool-use on Ampere (research)
# ---------------------------------------------------------------------------
# DiffusionGemma is Google's 26B-A4B (3.8B active) MoE discrete-diffusion LM on the
# Gemma4 backbone — vLLM's first dLLM (blog 2026-06-10). It denoises a whole block
# ("canvas", 256 tok) in parallel via bidirectional attention, through vLLM's
# model-runner-v2 (`VLLM_USE_V2_MODEL_RUNNER=1`). Throughput is content-dependent
# (entropy-bound sampler): ~150–200 tok/s typical, up to ~450–490 on low-entropy text.
#
# gemma4 tool + reasoning parsers WORK (it's gemma4-based) — mirrored from the
# gemma-4-26b-a4b compose. Tool requests would http_error WITHOUT
# --enable-auto-tool-choice; with the gemma4 parsers, tool-calling + reasoning-field
# routing both function (the 5-pack jumped 57%→84%).
#
# Output length: the model's generation_config caps max_new_tokens at 256, which vLLM
# applies as the default max_tokens → truncated answers + next-turn echo for clients
# (OWUI) that omit max_tokens. We lift it to 16384 via --override-generation-config
# (NOT --generation-config vllm, which would strip the diffusion denoising params).
# Note 16384 is a CAP only — the instruct model self-terminates ~1.2–1.8K words; it
# will not one-shot 10K words (use multi-turn).
#
# Engine: NO build step. The overlay is applied at container start by install.sh
# (entrypoint). Just `docker compose up` (or switch.sh / launch.sh).
# ===========================================================================
# Hardware metadata (parsed by scripts/preflight.sh):
# Requires-min-vram-gb: 24
# Engine-profile: vllm-diffusion-gemma
# Requires-min-gpu-count: 2
# Tensor-parallel: 2
# Requires-sm: 8.0+
services:
  vllm-diffusiongemma-26b-a4b-fp8-tp2:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:nightly-2c9c07c85e56c799afffd5a671a8a0bace377a39}
    container_name: "${ESTATE_CONTAINER:-vllm-diffusiongemma-26b-a4b-fp8-tp2}"
    restart: ${CLUB3090_RESTART:-unless-stopped}
    ports:
      - "${ESTATE_PORT:-${PORT:-8042}}:8000"
    volumes:
      - ${MODEL_DIR:-../../../../../../models-cache}:/root/.cache/huggingface
      # ---- vllm#45163 DiffusionGemma overlay — SIDELOADED (install_script) ----
      # The vendored payload (the dgemma-branch vllm/ delta + Codex's marlin-k-pad +
      # TP-vocab/dtype fixes). install.sh cp's it over the stock-nightly vllm pkg at
      # boot — no baked image. Regenerate on a nightly re-pin (see the dir README).
      - ../../../patches/dgemma-overlay:/etc/club3090/dgemma-overlay:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=${ESTATE_GPUS:-${NVIDIA_VISIBLE_DEVICES:-all}}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-${OFFLINE:-0}}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-${OFFLINE:-0}}
      - VLLM_USE_V2_MODEL_RUNNER=1
      - TORCHDYNAMO_DISABLE=1
      - TORCH_COMPILE_DISABLE=1
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_DISABLE_CUSTOM_ALL_REDUCE=1
      - VLLM_NO_USAGE_STATS=1
      - OMP_NUM_THREADS=1
      - PYTORCH_CUDA_ALLOC_CONF=${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True,max_split_size_mb:512}
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - VLLM_ATTENTION_BACKEND=TRITON_ATTN
      - TRITON_CACHE_DIR=/root/.triton/cache
      - DGEMMA_OVERLAY_DIR=/etc/club3090/dgemma-overlay
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint:
      - /bin/bash
      - -c
      - |
        # Apply the vllm#45163 DiffusionGemma overlay to the stock nightly BEFORE
        # vllm imports. Fail-loud: a non-zero exit (arch didn't register) aborts boot
        # rather than serving a half-patched engine.
        bash /etc/club3090/dgemma-overlay/install.sh
        exec python3 -m vllm.entrypoints.openai.api_server "$@"
      - --
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - /root/.cache/huggingface/diffusiongemma-26b-a4b-it-fp8-dynamic
      - --served-model-name
      - diffusiongemma-26b-a4b
      - --trust-remote-code
      - --tensor-parallel-size
      - "${TP:-2}"
      - --pipeline-parallel-size
      - "${PP:-1}"
      - --max-model-len
      - "${MAX_MODEL_LEN:-262144}"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTILIZATION:-0.82}"      # 0.90 OOMs the warmup (KV pool over-provisions); 0.82 leaves activation headroom
      - --max-num-seqs
      - "${MAX_NUM_SEQS:-1}"
      - --max-num-batched-tokens
      - "${MAX_NUM_BATCHED_TOKENS:-2048}"
      - --enforce-eager
      - --kv-cache-dtype
      - auto
      - --attention-backend
      - TRITON_ATTN
      - --hf-overrides
      - '{"diffusion_sampler":"entropy_bound","diffusion_entropy_bound":0.1}'
      # Lift the model's 256-tok default-answer cap (truncation + next-turn echo for
      # clients that omit max_tokens). Override ONLY max_new_tokens; keep
      # --generation-config auto so the diffusion denoising params survive.
      # 16384 ≈ 12K words; it's a CAP, the model self-terminates well before it.
      - --generation-config
      - auto
      - --override-generation-config
      - '{"max_new_tokens":16384}'
      # gemma4 tool + reasoning parsers (DiffusionGemma is gemma4-based) — mirrors gemma-4-26b-a4b:
      - --enable-auto-tool-choice
      - --tool-call-parser
      - gemma4
      - --reasoning-parser
      - gemma4
      - --chat-template
      - /vllm-workspace/examples/tool_chat_template_gemma4.jinja
      # Thinking: left at the model/template natural default (NOT force-disabled) — the
      # earlier "stuck in thinking / empty answer" was the 256-tok cap above, not thinking.
      # The reasoning parser routes any thinking into the `reasoning` field; clients can
      # still pass enable_thinking via chat_template_kwargs per request.
      # NOTE: torch.compile (drop the TORCHDYNAMO/COMPILE-disable envs + --enforce-eager)
      # WORKS (Codex+Claude validated 2026-06-11) but gave NO throughput gain (~164 vs
      # ~172 tok/s eager — diffusion is denoising-step-bound) + boot cost → eager stays default.
