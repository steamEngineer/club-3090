# ===========================================================================
# Profile (at-a-glance):
#   Model:     Gemma-4-12B-it (bf16 — google/gemma-4-12B-it)
#   Engine:    vLLM (vllm/vllm-openai:gemma4-unified — Gemma-4 arch-preview image)
#   Topology:  Dual 3090 PCIe (TP=2, no NVLink → custom all-reduce auto-disabled)
#   Drafter:   assistant speculative-decode, n=4 (google/gemma-4-12B-it-assistant ~0.5B)
#   KV:        bf16 / auto — single kv-dtype (vLLM); no FP8/INT8-PTH on this image
#   Vision:    yes (gemma4_unified is multimodal; served text-only here)
#   Max ctx:   256K (262144) — stock, no overlay. The fixed RoPE cache is sized from
#              config.max_position_embeddings; google/gemma-4-12B-it (+ the assistant draft)
#              now ship max_position_embeddings=262144 (upstream config fix, vllm#39914), so
#              the stock gemma4_unified image serves the full 256K — drafter included.
#              NIAH exact-recall validated 140K–241K with MTP active (2026-06-04).
#   Genesis:   N/A — Genesis is Qwen3-Next-specific
#   Status:    ⚠️ Production w/ caveats — validated on 2× 3090 sm_86 (rebench-full 2026-06-04:
#              verify-full + bench + verify-stress + 8-pack 94/150 + soak PASS; 256K NIAH overlay-free).
#   Caveats:   Ephemeral arch-preview image `vllm/vllm-openai:gemma4-unified` (0.1.dev) — pin a
#              digest before relying on it. Promotes to ✅ Production when gemma4_unified ships
#              in a STABLE vLLM release.
#   Quality:   94/150 (63%) thinking-OFF default · 85/150 (57%) reasoning-ON (think-ON lower —
#              over-reasoning/timeouts; thinking-OFF is the default). Soak PASS: 0 err · 0/100
#              silent-empty · 0 MiB growth · p50 115.7 TPS · 94.8% retention. rebench-full 2026-06-04.
#   Best for:  the target config — dual-3090 Gemma-4-12B + assistant spec-dec (vLLM's recipe, Ampere-adapted)
# ---------------------------------------------------------------------------
# Dual-3090 bf16 + the assistant speculative-decode draft, mirroring the
# gemma-4-31b dual's --speculative-config. Ampere form: TP=2 + the
# detect_nvlink.sh entrypoint that injects --disable-custom-all-reduce (PCIe,
# no NVLink), bf16, gemma4 parsers. (The no-draft base compose was pruned —
# MTP is lossless and fits the full 262144, so it bought nothing.)
#
# The draft model
# `gemma-4-12B-it-assistant` (google) carries the same max_position_embeddings=262144
# config fix the 256K ceiling needs — fetch it from google:
#   hf download google/gemma-4-12B-it-assistant --local-dir $MODEL_DIR/gemma-4-12b-it-assistant
# Default SPEC_MODEL below expects it at /root/.cache/huggingface/gemma-4-12b-it-assistant.
#
# Weights (base): hf download google/gemma-4-12B-it --local-dir $MODEL_DIR/gemma-4-12b-it
# The arch-preview image tag may be ephemeral — pin a digest before shipping.

services:
  vllm-gemma-4-12b-dual-mtp:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:gemma4-unified}
    container_name: "${ESTATE_CONTAINER:-vllm-gemma-4-12b-dual-mtp}"
    restart: ${CLUB3090_RESTART:-unless-stopped}
    ports:
      - "${ESTATE_PORT:-${PORT:-8036}}:8000"
    volumes:
      - ${MODEL_DIR:-../../../../../../models-cache}:/root/.cache/huggingface
      - ../../../cache/torch_compile:/root/.cache/vllm/torch_compile_cache
      - ../../../cache/triton:/root/.triton/cache
      - ../../../../../../scripts/detect_nvlink.sh:/etc/club3090/detect_nvlink.sh:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=${ESTATE_GPUS:-${NVIDIA_VISIBLE_DEVICES:-all}}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-${OFFLINE:-0}}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-${OFFLINE:-0}}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NVLINK_MODE=${NVLINK_MODE:-auto}
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_NO_USAGE_STATS=1
      - OMP_NUM_THREADS=1
      - PYTORCH_CUDA_ALLOC_CONF=${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True,max_split_size_mb:512}
      - CUDA_LAUNCH_BLOCKING=${CUDA_LAUNCH_BLOCKING:-0}
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - TRITON_CACHE_DIR=/root/.triton/cache
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint:
      - /bin/bash
      - -c
      - |
        # PCIe (no NVLink) → inject --disable-custom-all-reduce; NVLink rigs skip it.
        source /etc/club3090/detect_nvlink.sh
        if [ "$${_NVLINK_ENABLED:-0}" = "1" ]; then
          exec vllm serve "$$@"
        else
          exec vllm serve --disable-custom-all-reduce "$$@"
        fi
      - --
    command:
      - --override-generation-config
      - '{"temperature":${TEMP:-${TEMPERATURE:-1.0}},"top_p":${TOP_P:-0.95},"top_k":${TOP_K:-64},"min_p":${MIN_P:-0.0},"repetition_penalty":${REPEAT_PENALTY:-1.0}}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - /root/.cache/huggingface/${MODEL_SUBDIR:-gemma-4-12b-it}
      - --served-model-name
      - ${SERVED_NAME:-gemma-4-12b}
      - --tensor-parallel-size
      - "${TP:-2}"
      - --pipeline-parallel-size
      - "${PP:-1}"
      - --max-model-len
      - "${MAX_MODEL_LEN:-${CTX:-262144}}"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTILIZATION:-0.90}"
      - --max-num-seqs
      - "${MAX_NUM_SEQS:-4}"
      - --max-num-batched-tokens
      - "4096"
      - --trust-remote-code
      - --enable-auto-tool-choice
      - --tool-call-parser
      - gemma4
      - --reasoning-parser
      - gemma4
      - --chat-template
      - /vllm-workspace/examples/tool_chat_template_gemma4.jinja
      - --speculative-config
      - '{"model":"${SPEC_MODEL:-/root/.cache/huggingface/gemma-4-12b-it-assistant}","num_speculative_tokens":${SPEC_N_MAX:-4}}'
