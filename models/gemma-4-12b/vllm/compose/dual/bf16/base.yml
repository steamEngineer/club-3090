# ===========================================================================
# Profile (at-a-glance):
#   Model:     Gemma-4-12B-it (bf16 — google/gemma-4-12B-it)
#   Engine:    vLLM (vllm/vllm-openai:gemma4-unified — Gemma-4 arch-preview image)
#   Topology:  Dual 3090 PCIe (TP=2, no NVLink → custom all-reduce auto-disabled)
#   Drafter:   none (assistant speculative-decode variant → mtp.yml)
#   KV:        bf16 / auto — single kv-dtype (vLLM); no FP8/INT8-PTH on this image
#   Vision:    yes (gemma4_unified is multimodal; served text-only here)
#   Max ctx:   256K (262144) — stock, no overlay. The fixed RoPE cache is sized from
#              config.max_position_embeddings; google/gemma-4-12B-it now ships
#              max_position_embeddings=262144 (upstream config fix, vllm#39914), so the
#              stock gemma4_unified image serves the full advertised 256K p-RoPE.
#              NIAH exact-recall validated 140K–241K on this rig (2026-06-04).
#   Genesis:   N/A — Genesis is Qwen3-Next-specific
#   Status:    🧪 Experimental — validated on 2× 3090 sm_86 (bench + 256K NIAH 2026-06-04).
#              Stays 🧪 while the image is an ephemeral arch-preview tag (gemma4-unified,
#              0.1.dev) → promote to ⚠️ caveats when gemma4_unified lands in a STABLE vLLM
#              release (cf. the beellama dev-branch rule).
#   Quality:   output quality ≡ mtp.yml (MTP is speed-only / output-lossless) — 8-pack
#              94/150 (63%) thinking-OFF · soak PASS, measured on the MTP sibling. This
#              no-MTP compose is benched for TPS only (47.5 / 47.5).
#   Best for:  bring-up — first vLLM serving of Gemma-4-12B on dual 3090 (no drafter)
# ---------------------------------------------------------------------------
# Why dual + this shape (Ampere, NOT vLLM's H100/TP=1 reference recipe):
#   - bf16 12B weights (~24 GB) do NOT fit one 24 GB 3090 with KV → TP=2 mandatory.
#   - 2x 3090 are PCIe, no NVLink → the detect_nvlink.sh entrypoint injects
#     --disable-custom-all-reduce (rig rule; TP=2 hangs otherwise).
#   - heterogeneous head dims (256 local / 512 global) → vLLM forces TRITON_ATTN (OK on sm_86).
#   gemma4 wiring: --tool-call-parser gemma4 + --reasoning-parser gemma4 + the
#   bundled chat template, mirroring the gemma-4-31b dual.
#
# OPEN RISK (why 🧪): whether gemma4_unified ships working sm_86 kernels — the
# boot is the test. No patch mounts: the gemma4-unified image is today's vLLM main,
# which already carries the Gemma-4 fixes, and 256K now works straight from the
# upstream config fix (max_position_embeddings=262144) — no local overlay needed.
#
# Weights (google/gemma-4-12B-it is gated — accept the license on HF first; it ships
# the corrected max_position_embeddings=262144 that the 256K ceiling needs. The
# unsloth mirror still lagged at 131072 as of 2026-06-04):
#   hf download google/gemma-4-12B-it --local-dir $MODEL_DIR/gemma-4-12b-it
# The arch-preview image tag may be ephemeral — pin a digest before shipping.

services:
  vllm-gemma-4-12b-dual:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:gemma4-unified}
    container_name: "${ESTATE_CONTAINER:-vllm-gemma-4-12b-dual}"
    restart: ${CLUB3090_RESTART:-unless-stopped}
    ports:
      - "${ESTATE_PORT:-${PORT:-8035}}:8000"
    volumes:
      - ${MODEL_DIR:-../../../../../../models-cache}:/root/.cache/huggingface
      - ../../../cache/torch_compile:/root/.cache/vllm/torch_compile_cache
      - ../../../cache/triton:/root/.triton/cache
      # NVLink auto-detection — runs inside the container at boot.
      - ../../../../../../scripts/detect_nvlink.sh:/etc/club3090/detect_nvlink.sh:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=${ESTATE_GPUS:-${NVIDIA_VISIBLE_DEVICES:-all}}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NVLINK_MODE=${NVLINK_MODE:-auto}
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_NO_USAGE_STATS=1
      - OMP_NUM_THREADS=1
      - PYTORCH_CUDA_ALLOC_CONF=${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True,max_split_size_mb:512}
      - CUDA_LAUNCH_BLOCKING=${CUDA_LAUNCH_BLOCKING:-0}
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - TRITON_CACHE_DIR=/root/.triton/cache
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint:
      - /bin/bash
      - -c
      - |
        # PCIe (no NVLink) → inject --disable-custom-all-reduce; NVLink rigs skip it.
        source /etc/club3090/detect_nvlink.sh
        if [ "${_NVLINK_ENABLED:-0}" = "1" ]; then
          exec vllm serve "$@"
        else
          exec vllm serve --disable-custom-all-reduce "$@"
        fi
      - --
    command:
      - --override-generation-config
      - '{"temperature":${TEMP:-${TEMPERATURE:-1.0}},"top_p":${TOP_P:-0.95},"top_k":${TOP_K:-64},"min_p":${MIN_P:-0.0},"repetition_penalty":${REPEAT_PENALTY:-1.0}}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - /root/.cache/huggingface/${MODEL_SUBDIR:-gemma-4-12b-it}
      - --served-model-name
      - ${SERVED_NAME:-gemma-4-12b}
      - --tensor-parallel-size
      - "${TP:-2}"
      - --pipeline-parallel-size
      - "${PP:-1}"
      - --max-model-len
      - "${MAX_MODEL_LEN:-${CTX:-262144}}"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTILIZATION:-0.90}"
      - --max-num-seqs
      - "${MAX_NUM_SEQS:-4}"
      - --max-num-batched-tokens
      - "4096"
      - --trust-remote-code
      - --enable-auto-tool-choice
      - --tool-call-parser
      - gemma4
      - --reasoning-parser
      - gemma4
      - --chat-template
      - /vllm-workspace/examples/tool_chat_template_gemma4.jinja
