# ===========================================================================
# Profile (at-a-glance):
#   Model:     Qwen3.6-27B (Lorbus AutoRound INT4 — lm_head + mtp.fc + vision BF16)
#   Topology:  Single 3090 (no TP, all on device 0)
#   Drafter:   Ex0bit/Qwen3.6-27B-PRISM-EAGLE3 'compressed/' variant (32K vocab + d2t map)
#   KV:        fp8_e5m2 (24 GB capacity path; target activations remain BF16)
#   Vision:    no (mmproj path untested with EAGLE3; disabled for first boot)
#   Max ctx:   8192 (initial conservative; push up after boot validates)
#   Genesis:   N/A — Genesis is vLLM-specific
#   Status:    ⚠️ EXPERIMENTAL — single-card EAGLE3 path unvalidated on Ampere
#   Caveats:   Vendored startup patches wire EAGLE-3 capture into
#              Qwen3_5ForConditionalGeneration and keep AutoRound's BF16
#              split-shard overrides intact for fused DeltaNet `in_proj_ba`.
#              Pinned to v0.5.12 per engine-image-pinning policy (AGENTS.md).
#              First exploration of the Ex0bit EAGLE3 path on this stack — see #171.
#   Best for:  Probe whether SGLang's SPEC_V2 scheduler unblocks DeltaNet-family
#              spec-decode on a quantized target (the gap MTP fills on llama.cpp/vLLM).
# ---------------------------------------------------------------------------
# Single-card SGLang + EAGLE-3 spec-decode for Qwen3.6-27B AutoRound INT4.
#
# Why this exists: the V2 scheduler in SGLang (SGLANG_ENABLE_SPEC_V2=1) is
# specifically designed for hybrid GatedDeltaNet + radix cache — exactly the
# Qwen3-Next attention layout that blocks EAGLE / DFlash on vLLM (DeltaNet
# rollback). If V2 + the Ex0bit drafter holds on Ampere, this is the first
# working external-drafter spec-decode for the Qwen3-Next dense family on
# consumer hardware.
#
# Why AutoRound + 'compressed/' drafter: BF16 target won't fit on 24 GB (54 GB
# weights alone). AutoRound INT4 is 18 GB on disk and is our v0.8.x vLLM
# default (Lorbus path) — same checkpoint, different engine. The 'compressed/'
# EAGLE-3 drafter (1.1 GB BF16) is recommended by Ex0bit for serving speed and
# carries its own 32K projection + d2t map — less coupled to target lm_head
# quantization than the 'full/' 248K variant.
#
# Open compatibility questions (validation gate must answer):
#   1. Does SGLang's `auto-round` loader accept Lorbus's auto_round:auto_gptq
#      packing alongside an EAGLE-3 capture hook? (config kept lm_head BF16,
#      should be OK — but unproven on this stack.)
#   2. Does SPEC_V2 close the DeltaNet rollback bug at --speculative-num-steps=3,
#      or do we see KV-cache divergence at the verify boundary?
#   3. Does the patched Qwen3_5ForConditionalGeneration boot under auto-round
#      loader, or does the patch only target the BF16 module path?
#   4. Does the Marlin pad-sub-tile-n bug (sglang_marlin_pad_same_bug, blocking
#      Lorbus INT4 + EAGLE on older SGLang) still exist in v0.5.12, or was it
#      silently fixed by #24663 ("Support newer EAGLE-3 drafters") / Adaptive
#      Spec V2 work?
#
# VRAM budget (24 GB ceiling, single 3090):
#   - Target (AutoRound INT4, 18 GB disk):     ~17-19 GB
#   - EAGLE-3 compressed drafter (1.1 GB BF16): ~3 GB
#   - KV cache @ 8K ctx + SGLang activations:   ~2-3 GB
#   - Total:                                    ~22-25 GB (tight; explicit low
#                                                request/Mamba/KV caps required)
#
# Prerequisites:
#   1. Pull SGLang image:
#        docker pull lmsysorg/sglang:v0.5.12
#   2. Have target weights at MODEL_DIR/qwen3.6-27b-autoround-int4/:
#        bash scripts/setup.sh qwen3.6-27b   # already covers the Lorbus path
#   3. Have EAGLE-3 drafter at MODEL_DIR/qwen3.6-27b-prism-eagle3/:
#        hf download Ex0bit/Qwen3.6-27B-PRISM-EAGLE3 \
#          --include 'compressed/*' --include 'patch_sglang_eagle3.py' \
#          --local-dir <MODEL_DIR>/qwen3.6-27b-prism-eagle3
#
# To run:
#   cd <repo>/models/qwen3.6-27b/sglang/compose/single
#   MODEL_DIR=/your/models/dir docker compose -f eagle3-experimental.yml up -d
# ===========================================================================

services:
  sglang-qwen36-27b-eagle3:
    image: lmsysorg/sglang:v0.5.12   # pinned: we vendor patch_sglang_eagle3.py
    container_name: "${ESTATE_CONTAINER:-sglang-qwen36-27b-eagle3}"
    restart: unless-stopped
    ports:
      - "${ESTATE_PORT:-8040}:30000"
    ipc: host
    shm_size: "16g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${ESTATE_GPUS:-0}"]
              capabilities: [gpu]
    volumes:
      - "${MODEL_DIR:?MODEL_DIR is required}/qwen3.6-27b-autoround-int4:/models/target:ro"
      - "${MODEL_DIR}/qwen3.6-27b-prism-eagle3/compressed:/models/drafter:ro"
      - "../../patches/patch_sglang_eagle3.py:/patches/patch_sglang_eagle3.py:ro"
      - "../../patches/patch_sglang_autoround_fused_bf16.py:/patches/patch_sglang_autoround_fused_bf16.py:ro"
    environment:
      SGLANG_ENABLE_SPEC_V2: "1"
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -euo pipefail
        echo "[club-3090] applying EAGLE-3 patch to SGLang v0.5.12 ..."
        python3 /patches/patch_sglang_eagle3.py
        echo "[club-3090] applying AutoRound fused-BF16 patch to SGLang v0.5.12 ..."
        python3 /patches/patch_sglang_autoround_fused_bf16.py
        echo "[club-3090] launching sglang.launch_server ..."
        exec python3 -m sglang.launch_server \
          --model-path /models/target \
          --speculative-algorithm EAGLE3 \
          --speculative-draft-model-path /models/drafter \
          --speculative-draft-model-quantization unquant \
          --speculative-num-steps 3 \
          --speculative-eagle-topk 1 \
          --speculative-num-draft-tokens 4 \
          --max-running-requests 1 \
          --max-mamba-cache-size 1 \
          --max-total-tokens 8192 \
          --disable-radix-cache \
          --mamba-scheduler-strategy no_buffer \
          --mm-attention-backend sdpa \
          --quantization auto-round \
          --dtype bfloat16 \
          --kv-cache-dtype fp8_e5m2 \
          --context-length 8192 \
          --mem-fraction-static 0.92 \
          --disable-cuda-graph \
          --cpu-offload-gb 2 \
          --trust-remote-code \
          --host 0.0.0.0 --port 30000 \
          --served-model-name qwen3.6-27b-eagle3
