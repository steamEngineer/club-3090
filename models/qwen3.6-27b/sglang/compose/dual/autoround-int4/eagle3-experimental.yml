# ===========================================================================
# ⚠ PARKED 2026-05-21 — KEPT FOR ARCHIVAL ONLY, NOT A PRODUCTION PATH
#
# This compose boots and serves coherent output on dual 3090, but it sits at
# ~15-18 TPS (with the mandatory --disable-cuda-graph workaround for the CUTE_DSL
# capture-hang on Ampere). Production paths for Qwen3-Next are:
#   - vllm/dual/turbo.yml (TP=2 + MTP + Genesis TQ3 → ~85 TPS)
#   - llamacpp/mtp.yml (single 3090 + MTP → ~50 TPS)
# Both use the model's built-in MTP head, which (per Ex0bit's own benches)
# beats EAGLE-3 chain even on Blackwell where EAGLE-3 actually works.
#
# See README.md in this subtree for the full parking rationale + re-test triggers.
# ===========================================================================
# Profile (at-a-glance):
#   Model:     Qwen3.6-27B (Lorbus AutoRound INT4 by default; INT8/AWQ via TARGET_DIR override)
#   Topology:  Dual 3090 PCIe (TP=2, no NVLink → custom all-reduce disabled)
#   Drafter:   Ex0bit/Qwen3.6-27B-PRISM-EAGLE3 'compressed/' variant (32K vocab + d2t map)
#   KV:        bf16 (default — SGLang handles INT4 dequant; hidden states emerge BF16)
#   Vision:    no (mmproj path untested with EAGLE3; disabled for first boot)
#   Max ctx:   32768 (4× the single-card variant — TP=2 doubles KV budget)
#   Genesis:   N/A — Genesis is vLLM-specific
#   Status:    ⚠ PARKED 2026-05-21 — boots + coherent output validated, but sub-MTP
#              throughput on consumer Ampere makes it a non-shipping path. The
#              compose stays for archival reference; production path is
#              vllm/dual/turbo.yml. See README.md "Why parked" for the 3 reasons.
#   Caveats:   Two vendor patches required (EAGLE-3 hook + AutoRound fused-BF16
#              mapper). cuda-graph MUST be disabled on Ampere (CUTE_DSL hang).
#              Pinned to v0.5.12 per engine-image-pinning policy (AGENTS.md).
#   Best for:  Archival / future re-test when SGLang ships MTP for Qwen3-Next OR
#              upstream lands a CUTE_DSL Ampere fallback.
# ---------------------------------------------------------------------------
# Why this exists (separate from single-card eagle3-experimental.yml):
#
#   eagle3-experimental.yml (single) = 1 GPU, ctx 8K, tight VRAM envelope.
#   THIS file (dual)                 = TP=2, ctx 32K, headroom for larger
#                                      activations / longer prompts. Also the
#                                      natural path if INT8 W8A16 weights are
#                                      adopted later (~36 GB → 18 GB/card TP=2,
#                                      same Marlin-bug sidestep route).
#
# Why pinned to v0.5.12 (not :latest):
#   The vendored startup patches edit specific files in SGLang. A rolling tag
#   would break the patches the moment upstream restructures qwen3_5.py.
#   See AGENTS.md → "Engine image pinning" (2026-05-20 policy: pin when we
#   vendor patches, otherwise track rolling).
#
# Hardware constraints captured here:
#   - 2× RTX 3090 Ampere sm_86 PCIe-only (no NVLink). Custom all-reduce must
#     be disabled. See CLAUDE.md "Hardware truths".
#   - At TP=2 the N-dim quant alignment doesn't improve (96→48 still ≠ 64-mod).
#     Dual GPU does NOT sidestep the Marlin pad-sub-tile-n crash for INT4
#     targets on its own — it's a sibling boot path, not a workaround.
#
# Open compatibility questions (validation gate must answer):
#   1. Does the vendored fused-BF16 mapper patch close the Marlin alignment
#      crash on both single AND dual? (Single is the simpler test; dual likely
#      shares the same code path.)
#   2. Does SPEC_V2 close the DeltaNet rollback bug at --speculative-num-steps=3
#      across TP=2 ranks, or do we see KV-cache divergence at the verify boundary?
#   3. Does SGLang correctly place the EAGLE-3 drafter (rank 0 only) without
#      double-mounting onto both ranks?
#
# VRAM budget (per-card, 24 GB ceiling each, 48 GB total):
#   - Target shard (AutoRound INT4 18 GB / TP=2):    ~9 GB/card
#   - EAGLE-3 drafter (1.1 GB BF16, rank 0 only):    ~3 GB on GPU 0
#   - KV cache @ 32K ctx (split across ranks):       ~2-3 GB/card
#   - SGLang activations + Mamba state:              ~2-3 GB/card
#   - Total:                                         ~14-15 GB GPU 0, ~12-13 GB GPU 1
#
# Prerequisites:
#   1. Pull SGLang image:
#        docker pull lmsysorg/sglang:v0.5.12
#   2. Have target weights at one of these mount points (set TARGET_DIR):
#        TARGET_DIR=qwen3.6-27b-autoround-int4         # default (Lorbus, INT4)
#        TARGET_DIR=qwen3.6-27b-awq-int4               # FenomAI, INT4 (Marlin-affected)
#        TARGET_DIR=qwen3.6-27b-int8                   # TheHouseOfTheDude, W8A16 (Marlin-free, NOT YET DOWNLOADED)
#   3. Set QUANTIZATION to match the target's loader:
#        QUANTIZATION=auto-round           # Lorbus
#        QUANTIZATION=compressed-tensors   # FenomAI AWQ / TheHouseOfTheDude INT8
#   4. Have EAGLE-3 drafter at MODEL_DIR/qwen3.6-27b-prism-eagle3/.
#
# To run:
#   cd <repo>/models/qwen3.6-27b/sglang/compose/dual
#   MODEL_DIR=/your/models/dir docker compose -f eagle3-experimental.yml up -d
#   # Or, to point at a different quant variant:
#   MODEL_DIR=/your/models/dir TARGET_DIR=qwen3.6-27b-int8 QUANTIZATION=compressed-tensors \
#     docker compose -f eagle3-experimental.yml up -d
# ===========================================================================
# Hardware metadata (parsed by scripts/preflight.sh):
# Requires-min-vram-gb: 24
# Engine-profile: sglang-eagle3
# Requires-min-gpu-count: 2
# Tensor-parallel: 2

services:
  sglang-qwen36-27b-eagle3-dual:
    image: lmsysorg/sglang:v0.5.12   # pinned: we vendor patch_sglang_eagle3.py + autoround fused-BF16 patch
    container_name: "${ESTATE_CONTAINER:-sglang-qwen36-27b-eagle3-dual}"
    restart: unless-stopped
    ports:
      - "${ESTATE_PORT:-8041}:30000"
    ipc: host
    shm_size: "32g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${ESTATE_GPUS:-0,1}"]
              capabilities: [gpu]
    volumes:
      - "${MODEL_DIR:?MODEL_DIR is required}/${TARGET_DIR:-qwen3.6-27b-autoround-int4}:/models/target:ro"
      - "${MODEL_DIR}/qwen3.6-27b-prism-eagle3/compressed:/models/drafter:ro"
      - "../../../patches/patch_sglang_eagle3.py:/patches/patch_sglang_eagle3.py:ro"
      - "../../../patches/patch_sglang_autoround_fused_bf16.py:/patches/patch_sglang_autoround_fused_bf16.py:ro"
    environment:
      SGLANG_ENABLE_SPEC_V2: "1"
      # Disable custom all-reduce on PCIe-only Ampere — see CLAUDE.md
      NCCL_P2P_DISABLE: "${NCCL_P2P_DISABLE:-1}"
      # Allocator hygiene — helps with the spec-decode + Mamba state mix
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -euo pipefail
        echo "[club-3090] applying EAGLE-3 patch to SGLang v0.5.12 ..."
        python3 /patches/patch_sglang_eagle3.py
        echo "[club-3090] applying AutoRound fused-BF16 patch to SGLang v0.5.12 ..."
        python3 /patches/patch_sglang_autoround_fused_bf16.py
        echo "[club-3090] launching sglang.launch_server (TP=2) ..."
        exec python3 -m sglang.launch_server \
          --model-path /models/target \
          --tp-size 2 \
          --disable-custom-all-reduce \
          --speculative-algorithm EAGLE3 \
          --speculative-draft-model-path /models/drafter \
          --speculative-num-steps 3 \
          --speculative-eagle-topk 1 \
          --speculative-num-draft-tokens 4 \
          --speculative-draft-model-quantization unquant \
          --mamba-scheduler-strategy extra_buffer \
          --max-running-requests 4 \
          --max-mamba-cache-size 8 \
          --mm-attention-backend sdpa \
          --quantization "${QUANTIZATION:-auto-round}" \
          --kv-cache-dtype "${KV_CACHE_DTYPE:-fp8_e5m2}" \
          --disable-cuda-graph \
          --dtype bfloat16 \
          --context-length 32768 \
          --mem-fraction-static 0.85 \
          --trust-remote-code \
          --host 0.0.0.0 --port 30000 \
          --served-model-name qwen3.6-27b-eagle3-dual
