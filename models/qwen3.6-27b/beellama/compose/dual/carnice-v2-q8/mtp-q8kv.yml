# ===========================================================================
# Profile (at-a-glance):
#   Model:     Carnice-V2-27B (stuchapin Q8_0 MTP GGUF — kai-os/Carnice-V2-27b,
#              a Hermes-style agentic SFT of Qwen3.6-27B; full model + embedded MTP head)
#   Engine:    beellama.cpp v0.3.2-preview (Anbeeld fork — MTP spec-dec + KVarN/quant KV)
#   Topology:  Dual 3090 (layer-split, -ts 0.55,0.45)
#   Drafter:   MTP (--spec-type draft-mtp, embedded head — NO separate draft model).
#              n_max=1 default (the head is mtp_num_hidden_layers=1); n=2 = +13% opt-in (see Caveats).
#   KV:        q8_0 K + q8_0 V (standard quantized KV — high fidelity; chosen over kvarn6 after a
#              measured A/B, see "Why q8_0 not kvarn6").
#   Vision:    no (text-only fine-tune; no mmproj)
#   Template:  native (GGUF-embedded) via --jinja
#   Max ctx:   262144 (full native) — fits @ -ts 0.55,0.45: 21.9/21.2 GB/card (~2.5 GB free each).
#   Genesis:   N/A — beellama is a llama.cpp-family engine; Genesis is vLLM/Qwen3-Next-specific
#   Status:    🧪 Experimental
#   Quality:   FULLY VALIDATED 2026-06-16 (rebench-full, dual 3090, q8_0 KV, n=1, 262K): verify-full
#              ALL-PASS; bench n=5 narr 40.7 / code 44.0 decode TPS (CV <1.5%), TTFT ~90 ms, PP
#              ~1197 t/s; verify-stress 8/8 (NIAH ladder clean to 240K = 91% of 262K); soak fresh
#              20x5 PASS (0 MiB growth, 0 err, 0/100 silent-empty, p50 42.2 TPS, 100% retention);
#              MTP accept ~81%. 8-pack think-OFF 103/150 (69%) / think-ON 105/150 (70%, wash):
#              toolcall 13/14 · instructfollow 13/14 · structoutput 14/14 · dataextract 9/10 ·
#              reasonmath 13/12 · bugfind 12/13 · hermes 12/12 (of 20) · cli 17/16 (of 40). In-band
#              (≈ qwopus-coder 103; Q5 single = 110) — q8_0 KV held quality with the +17% prefill.
#   Caveats:
#     - MTP n_max=1 default (the head is mtp_num_hidden_layers=1; author: n=3 "wrong by a wide
#       margin", n=2 "crashed on my 2x3090"). On OUR dual, n=2 does NOT crash and is ~+13% decode
#       (45 vs 40 narr) — spec-dec is lossless, so the lower acceptance (62% vs 81%) costs speed
#       only, not quality. n=2 is a validated opt-in (DRAFT_N_MAX=2); n=1 stays default.
#     - beellama v0.3.2 is a rolling PRE-RELEASE, not a tagged stable (#455 un-park gate).
#   Why q8_0 not kvarn6 (measured 2026-06-15, dual, 262K): the request was kvarn6/kvarn6, but a KV
#     A/B showed q8_0 is strictly better HERE. kvarn6 (software KV-compression) prefilled 860 t/s;
#     ANY standard quant KV (q8_0 or q4_0) prefills ~1003 (+17%) — the speedup is from escaping
#     KVarN's software-compression compute, not the bit-width (q4=q8=1004). Decode is identical
#     (~42, Q8-weight-bandwidth-bound). q8_0 also gives HIGHER fidelity (q8 > kvarn6's q6-class) and
#     is the REFERENCE path (kvarn6 is Anbeeld-flagged "experimental, only k4v2 reference-aligned"),
#     and it FITS 262K on dual (21.9/21.2 GB). kvarn's value is KV *compression* for a TIGHT single
#     card (its win on carnice-v2-single); on dual (48 GB) you don't need it. -b/-ub tuning + --no-mmap
#     were also A/B'd and are FLAT (852-995 t/s) — KV type was the only prefill lever.
#   Why MTP (not DFlash): MTP is the ONLY good spec-dec for Carnice. The embedded head is
#     distribution-matched by construction (~81% accept @ n=1). A DFlash A/B was RULED OUT
#     (2026-06-15): the only DFlash drafters that exist are BASE-Qwen3.6-27B (Anbeeld GGUF / z-lab
#     safetensors + community re-quants — all the same z-lab base drafter), distribution-mismatched
#     to the fine-tune → ~10% accept, slower than MTP. The same base drafter is net-POSITIVE on base
#     Qwen3.6-27B (beellama/dflash, +27-58% TPS), so the 10% is purely the fine-tune mismatch. No
#     Carnice-matched DFlash drafter exists (HF: 0 of 50 Carnice repos ship one). So MTP-only (#403/#392).
#   Best for:  dual-card agentic reasoning + tool-use (reasoning ON by default) at the Q8 quant
#              with high-fidelity q8_0 KV over the full 262K — the quality-max Carnice. ⭐
# ---------------------------------------------------------------------------
# Carnice-V2-27B on beellama.cpp v0.3.2-preview — DUAL 3090, Q8_0 weights + MTP (embedded head),
# q8_0/q8_0 KV. The dual / higher-quant follow-through requested in discussion #403.
#
# Why dual: Q8_0 is ~29 GB — it cannot fit one 24 GB card. Layer-split across both 3090s via
# `--split-mode layer --tensor-split 0.55,0.45` (PCIe, no NVLink; layer-split is a pipeline, no
# cross-GPU all-reduce). The 0.55,0.45 weighting offsets the MTP context (which pins to the main
# card) — even 1,1 skews 18.6/22.2 with card-1 the bottleneck; 0.55,0.45 balances to 21.9/21.2.
#
# Override defaults via .env or shell:
#   MODEL_DIR    host dir mounted as /models (default: ../../../../../../models-cache)
#   GGUF_FILE    MTP target GGUF under /models
#                (default: carnice-v2-27b-gguf/stuchapin-q8/Carnice-V2-27B-Q8_0-mtp.gguf)
#   CTX_SIZE     KV pool size            (default: 262144 — full native, validated fit)
#   DRAFT_N_MAX  --spec-draft-n-max      (default: 1; =2 is a +13% validated opt-in)
#   TENSOR_SPLIT layer split             (default: 0.55,0.45 — balances the cards)
#   BATCH_SIZE / UBATCH_SIZE  -b / -ub   (default: 2048 / 512 — A/B'd: bigger is FLAT, keep lean)
#   KV_TYPE_K / KV_TYPE_V     K/V cache  (default: q8_0 / q8_0)
#   NP           parallel slots          (default: 1)
#   REASONING    thinking gate           (default: on — Carnice is a reasoning/agentic SFT; 'off' = fast)
#   REASONING_FORMAT / REASONING_BUDGET  (defaults: deepseek / 4096)
#   PORT         host port               (default: 8070)
#   BEELLAMA_IMAGE  engine image         (default: pinned v0.3.2-preview digest)
services:
  beellama-carnice-v2-dual:
    image: ${BEELLAMA_IMAGE:-ghcr.io/anbeeld/beellama.cpp@sha256:858e7cfbfb0d5d3d605723a82ace1474698de368b81bc310f4df4dadc6c1b7d2}
    container_name: "${ESTATE_CONTAINER:-beellama-carnice-v2-dual}"
    restart: unless-stopped
    ports:
      - "${ESTATE_PORT:-${PORT:-8070}}:8080"
    volumes:
      - "${MODEL_DIR:-../../../../../../models-cache}:/models:ro"
    # server target ENTRYPOINT is /app/llama-server — args only below.
    command: >-
      --host 0.0.0.0
      --port 8080
      -m /models/${GGUF_FILE:-carnice-v2-27b-gguf/stuchapin-q8/Carnice-V2-27B-Q8_0-mtp.gguf}
      --spec-type draft-mtp
      --spec-draft-n-max ${DRAFT_N_MAX:-1}
      -ngl all
      --split-mode ${SPLIT_MODE:-layer}
      --main-gpu ${MAIN_GPU:-0}
      --tensor-split ${TENSOR_SPLIT:-0.55,0.45}
      --ctx-size ${CTX_SIZE:-262144}
      -b ${BATCH_SIZE:-2048}
      -ub ${UBATCH_SIZE:-512}
      -np ${NP:-1}
      --kv-unified
      --no-context-shift
      --cache-type-k ${KV_TYPE_K:-q8_0}
      --cache-type-v ${KV_TYPE_V:-q8_0}
      --flash-attn on
      --cache-ram 0
      --no-host
      --jinja
      --reasoning ${REASONING:-on}
      --reasoning-format ${REASONING_FORMAT:-deepseek}
      --reasoning-budget ${REASONING_BUDGET:-4096}
      --temp ${TEMP:-${TEMPERATURE:-0.6}}
      --top-k ${TOP_K:-20}
      --top-p ${TOP_P:-0.95}
      --min-p ${MIN_P:-0.0}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
