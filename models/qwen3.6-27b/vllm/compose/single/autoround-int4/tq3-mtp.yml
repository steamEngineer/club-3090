# ===========================================================================
# Profile (at-a-glance):
#   Model:     Qwen3.6-27B (Lorbus AutoRound INT4 + BF16 mtp.fc preserved)
#   Topology:  Single 3090 (TP=1)
#   Drafter:   MTP n=3 (built-in)
#   KV:        turboquant_3bit_nc (TQ3)
#   Vision:    yes
#   Max ctx:   48K (mem-util 0.92 — safe single-card default)
#   Genesis:   v7.72.2 (full PROD env stack)
#   Status:    🗑️ Deprecated
#   Best for:  Single-card default — vision + tools + MTP + Cliff-safe at
#              <48K ctx; recommended starting point for 1× 3090
# ---------------------------------------------------------------------------
# DEFAULT compose for Qwen3.6-27B on a single RTX 3090.
#
# Stack: vLLM + Sandermage's Genesis v7.14 patches + TurboQuant 3-bit KV
# + MTP n=3 speculative decoding + vision tower.
#
# This compose ships the production-safe defaults (48K context, 0.92 mem-util)
# below both prefill-activation cliffs found on this hardware. All 10
# verify-full.sh checks pass at this combo. Vision, tool calls, streaming,
# thinking, MTP — all green.
#
# Genesis v7.14 P65 closes vllm-project/vllm#40880 (silent <tool_call>
# cascade under MTP × TurboQuant × cudagraph) by forcing PIECEWISE cudagraph
# for spec-decode → eager continuation runs the correct branch. P66 filters
# capture sizes; P64 fixes streaming tool-call edge case; P68/P69 long-ctx
# tool-format adherence (env-opt-in).
#
# Two prefill-activation cliffs make 24 GB-card defaults non-trivial (verified 2026-04-28):
#
# CLIFF 1 — TurboQuant attention scratch + tool-response prefill
#   Trigger: ≥25K total prompt with TQ3 KV at high mem_util.
#   Site:    turboquant_attn forward, dequant scratch + mid_o/output buffers.
#   Symptom: CUDA OOM allocating ~138 MiB; engine dies mid-request.
#   Why:    fits the bug ampersandru reported in #1 (Hermes news-fetch, 20K+
#           token tool response stuffed back into the conversation).
#
# CLIFF 2 — DeltaNet/GLA recurrent state buffer
#   Trigger: single prompt above ~50-60K tokens (regardless of tool use).
#   Site:    fla.ops.chunk.chunk_gated_delta_rule_fwd_h.h.new_empty(B, NT, H, V, K)
#           where NT = ceil(seq_len / chunk_size) — grows with prompt length.
#   Symptom: CUDA OOM allocating ~50-740 MiB during forward; engine dies.
#   Why:    Qwen3-Next is hybrid (16 attention + 48 GDN layers). GDN state
#           is sized by total seq_len, not chunk size — chunked-prefill
#           doesn't help. We can't fix this short of multi-GPU or upstream
#           kernel changes.
#
# vLLM's `--gpu-memory-utilization` is a hard cap with no soft fallback or
# circular eviction. Everything outside the cap — prefill activation peaks,
# fragmentation, kernel scratch — has to fit in `(1 - mem_util) × 24 GB`.
# vLLM's pre-check guarantees the steady-state KV fits, not the activation
# peak during forward.
#
# Measured envelope on dev205 + Genesis v7.54 (1× 3090 24 GB, vision on, TQ3 KV):
#
#   max-model-len   mem-util    boots?   safe single-prompt    notes
#   ────────────────────────────────────────────────────────────────────────────
#    48,000          0.92       ✅       up to 48K               ⭐ default — verify-full.sh ALL 10 PASS, below BOTH cliffs
#    64,000          0.92       ✅       up to ~50K               needle scale=900 (~58K) OOMs (Cliff 2)
#    96,000          0.93       ✅       up to ~50K               needle scale=900 OOMs (Cliff 2)
#   128,000          0.95       ✅       up to ~40K (tool only)   #7 needle 60K+ OOMs (Cliff 2)
#   198,000          0.98 + vision           up to ~50K           ⭐ long-vision variant — Cliff 1 closed via PN12 anchor sidecar
#   218,000          0.985 + no vision       up to ~50K           ⭐ long-text variant — same sidecars, vision dropped for higher ceiling
#
# Cliff 1 (≥25K-token tool prefills OOM at >0.95 mem-util on TQ3) is now
# closed across long-* variants since 2026-04-30 PM via the PN12 anchor
# sidecar — see docs/CLIFFS.md. Cliff 2 (single-prompt >50–60K in DeltaNet
# GDN) still applies — that's why the 198K/218K variants ship as
# "steady-state accumulation, not single-shot big prompts."
#
# This variant ships **48K + 0.92** as the production default — verify-full.sh
# passes all 10 checks (including the long-context needle at 10K + 30K depths,
# tool-prefill OOM at 25K+, and MTP acceptance ≥2.0). 48K covers chat history
# accumulation, single-file coding, tool-using agent flows up to ~30K tool
# responses, and document analysis up to ~40K input.
#
# Above-cliff requests get a CLEAN HTTP 400 from the engine pre-check (not an
# OOM crash). To push higher and accept the risk, see the opt-in matrix above
# and the README "Activation memory caveat" section.
#
# Variant matrix (measured on dev205 + Genesis v7.54):
#
#   docker-compose.yml             (THIS — default)   48K   51/68 TPS  vision  ⭐ Production-safe; below BOTH cliffs
#   single/long-vision.yml                    198K   51/68 TPS  vision     Long ctx + vision; Cliff 1 closed via PN12 sidecar; Cliff 2 single-prompt >50K
#   single/long-text.yml                      218K   50/66 TPS  no vis     Engine-ceiling text-only at 0.985 mem-util; same Cliff 2 caveat
#   single/tools-text.yml                      75K   51/65 TPS  no vis     IDE agents (Cline/Cursor/Copilot) — fp8 KV + PN8 closes Cliff 1
#   single/minimal.yml                         32K   32/33 TPS  vision     Simplest stack; no Genesis, no spec-decode
#
# Upstream tracker: vllm-project/vllm#40880 (Sandermage's root-cause + v7.14
# patches). Proper kernel fix (P67) designed-but-not-implemented; v7.14 is
# a workaround until that lands.
#
# Run with:
#   bash ../scripts/setup.sh    # ensures Genesis tree at v7.14+ layout
#   cd compose && docker compose up -d
# ===========================================================================
# Hardware metadata (parsed by scripts/preflight.sh):
# Requires-min-vram-gb: 24
# Engine-profile: vllm-nightly-mtp
# Requires-min-gpu-count: 1
# Tensor-parallel: 1
services:
  vllm-qwen36-27b:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:nightly-${VLLM_NIGHTLY_SHA}}
    container_name: "${ESTATE_CONTAINER:-vllm-qwen36-27b}"
    restart: ${CLUB3090_RESTART:-unless-stopped}
    ports:
      - "${BIND_HOST:-0.0.0.0}:${ESTATE_PORT:-${PORT:-8020}}:8000"
    volumes:
      - ${MODEL_DIR:-../../../../../../models-cache}:/root/.cache/huggingface
      # torch.compile + Triton kernel caches — first boot warms (~60-90 sec);
      # subsequent boots reuse cached graphs. Pattern from Sander's PROD launch.
      # Closes club-3090 #22.
      - ../../../cache/torch_compile:/root/.cache/vllm/torch_compile_cache
      - ../../../cache/triton:/root/.triton/cache
      # Genesis v7.14 modular package (mounted into vLLM's site-packages).
      # Apply via `python3 -m vllm._genesis.patches.apply_all` at boot.
      - ../../../patches/genesis/vllm/_genesis:/usr/local/lib/python3.12/dist-packages/vllm/_genesis:ro
      - ../../../patches/local/qwen3coder_tool_parser_deferred_commit.py:/patches/qwen3coder_tool_parser_deferred_commit.py:ro
      # Standalone .tolist() cudagraph capture fix — separate bug from P65.
      # Different bug class: P65 fixes cu_seqlens_k=cu_seqlens_q misclassification;
      # this fix guards .tolist() syscalls during capture.
      # workspace_lock_disable — relaxes vllm#39226 strict assertion until
      # Sandermage's P98 marker fix lands. v0.20-only requirement.
      # vLLM PR #35936 required-tool fallback (drop when upstream lands).
      # vLLM PR #35936 required-tool fallback — sidecar pattern (drop when upstream lands).
      # Bind-mounted at side paths so install.sh can copy into vLLM's site-packages
      # BEFORE Genesis runs — avoids the RO-mount conflict with Genesis P64/P68/P69
      # which write to chat_completion/serving.py at vllm-import time. See
      # patches/vllm-pr35936-required-fallback/install.sh + README.md.
      - ../../../patches/vllm-pr35936-required-fallback/vllm/entrypoints/openai/chat_completion/serving.py:/etc/club3090/pr35936-chat-completion-serving.py:ro
      - ../../../patches/vllm-pr35936-required-fallback/vllm/entrypoints/openai/engine/serving.py:/etc/club3090/pr35936-engine-serving.py:ro
      - ../../../patches/vllm-pr35936-required-fallback/install.sh:/etc/club3090/install-pr35936.sh:ro
      # vLLM PR #41800 (truncate_prompt_tokens kwarg) overlay — fixes opencode-style
      # HTTP 400 on get_max_tokens(). No-op on post-fix nightlies.
      # See ../../../patches/vllm-pr41800-truncate-prompt-tokens/README.md.
      - ../../../patches/vllm-pr41800-truncate-prompt-tokens/install.sh:/etc/club3090/install-pr41800.sh:ro
      # froggeric/Qwen-Fixed-Chat-Templates qwen3.6 — fixes 7 default-template
      # bugs (empty <think></think> spam, </thinking> hallucination, unclosed
      # think before tool call, no-user-query crash, developer role, etc.).
      # See docs/UPSTREAM.md "Community templates / model assets" + the row at
      # https://huggingface.co/froggeric/Qwen-Fixed-Chat-Templates
      - ../../../patches/froggeric-chat-template/chat_template.jinja:/etc/qwen-froggeric-chat-template.jinja:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=${ESTATE_GPUS:-${NVIDIA_VISIBLE_DEVICES:-all}}
      # Uncomment the next line to pin to a specific GPU (e.g. GPU 0):
      # - CUDA_VISIBLE_DEVICES=0
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-${OFFLINE:-0}}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-${OFFLINE:-0}}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS=1
      - VLLM_NO_USAGE_STATS=1
      # expandable_segments:True crashes boot on some setups (likely cuMemMap path).
      # Known: JusefPol on NVLink (PR #31), WSL2 single-card 3090 Ti.
      # Override via .env: PYTORCH_CUDA_ALLOC_CONF=expandable_segments:False
      - PYTORCH_CUDA_ALLOC_CONF=${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True,max_split_size_mb:512}
      - VLLM_FLOAT32_MATMUL_PRECISION=high
      - VLLM_USE_FLASHINFER_SAMPLER=1
      - OMP_NUM_THREADS=1
      - CUDA_DEVICE_MAX_CONNECTIONS=8
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - VLLM_MARLIN_USE_ATOMIC_ADD=1
      - TRITON_CACHE_DIR=/root/.triton/cache
      # Genesis v7.14 opt-in patches — these are OFF by default and must be
      # enabled per-process. Without these, v7.14 produces the same cudagraph
      # behavior as v7.13 (silent tool-call cascade).
      # P65 (cudagraph downgrade workaround) replaced with P67 (proper Triton
      # kernel fix) on 2026-05-03 — same bug class (#40880 cascade) but P67
      # keeps cudagraphs on instead of forcing PIECEWISE; +25-35% TPS on
      # spec-decode K+1 verify per Sandermage's measurements.
      - GENESIS_ENABLE_P67_TQ_MULTI_QUERY_KERNEL=1            # core fix for #40880 (proper Triton kernel)
      - GENESIS_ENABLE_P66_CUDAGRAPH_SIZE_FILTER=1            # capture-size divisibility
      - GENESIS_ENABLE_P64_QWEN3CODER_MTP_STREAMING=1        # streaming tool-call edge case
      - GENESIS_ENABLE_PN59_STREAMING_GDN=1
      # PN34 (env-opt-in): runtime workspace-lock relaxation. Without this,
      # first decode call crashes with AssertionError: Workspace is locked at
      # turboquant_attn.py:_decode_attention. Surfaced 2026-05-06 in #82.
      # See docs/CLIFFS.md row "PN34" for full context.
      - GENESIS_ENABLE_PN34_WORKSPACE_LOCK_RELAX=1
      # P98: forward-compat for when Sander ships the marker fix
      # (auto-skips on v0.20 today via UNIFORM_SINGLE_TOKEN_DECODE drift-marker
      # false-positive — tracked at docs/UPSTREAM.md). PN34 above is what's
      # actually firing today; P98 will engage once the marker fix lands.
      # Belt+suspenders pattern matches long-text.yml + long-text-no-mtp.yml.
      - GENESIS_ENABLE_P98=1
      # P40 — TQ k8v4 GQA grouping kernel (+15-30% on compute-regime GPUs, L2>=24MB).
      # Default off (RTX 3090: 6MB L2 = no gain). Enable on RTX 5090/A100/H100.
      - GENESIS_ENABLE_P40=${GENESIS_ENABLE_P40:-0}
      # PN54 — GDN contiguous-call deduplication (Cliff 2b OOM mitigation).
      - GENESIS_ENABLE_PN54=${GENESIS_ENABLE_PN54:-0}
      # P68/P69 deliberately DISABLED (2026-04-29) — same reasoning as
      # tools-text.yml: 8000-char threshold breaks IDE-agent flows with
      # silent finish_reason=stop. Bisected on club-3090 issue #2.
      # - GENESIS_ENABLE_P68_AUTO_FORCE_TOOL=1
      # - GENESIS_ENABLE_P69_LONG_CTX_TOOL_REMINDER=1
      # PN8 deliberately NOT enabled here: TQ3 + 0.92 has plenty of activation
      # headroom; PN8 is no-op on TQ3 + small TPS cost. Enabled only on the
      # FP8+MTP path (tools-text.yml) where it frees ~800 MiB.
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -e
        pip install xxhash pandas scipy -q
        # Pre-flight: Genesis patches must be populated. Empty volume mount
        # = silent no-op apply_all = boot fails later with cryptic upstream
        # error (e.g. "TurboQuant KV not supported for hybrid models", #13).
        if [ ! -f /usr/local/lib/python3.12/dist-packages/vllm/_genesis/patches/apply_all.py ]; then
          echo "ERROR: Genesis patches missing — host volume models/qwen3.6-27b/vllm/patches/genesis/ is empty." >&2
          echo "       Run from repo root before 'docker compose up':" >&2
          echo "         bash scripts/setup.sh qwen3.6-27b" >&2
          exit 1
        fi
        # Install PR #35936 overlay BEFORE Genesis runs so Genesis can write hooks
        # to chat_completion/serving.py without hitting RO-mount errors.
        bash /etc/club3090/install-pr35936.sh
        bash /etc/club3090/install-pr41800.sh
        python3 -m vllm._genesis.patches.apply_all
        # Tool-parser deferred-commit fix for qwen3coder SSE-silence bug (issue #72).
        # Drops out when vllm-project/vllm lands the upstream fix.
        python3 /patches/qwen3coder_tool_parser_deferred_commit.py
        # VLLM_ENFORCE_EAGER=1 in compose/.env disables CUDA graphs — use on
        # hardware where Cliff 2 GDN activation spikes occur at runtime.
        exec vllm serve ${VLLM_ENFORCE_EAGER:+--enforce-eager} "$@"
      - --
    command:
      - --model
      - /root/.cache/huggingface/qwen3.6-27b-autoround-int4
      - --served-model-name
      - qwen3.6-27b-autoround
      - --quantization
      - auto_round
      - --dtype
      - float16
      - --tensor-parallel-size
      - "${TP:-1}"
      - --pipeline-parallel-size
      - "${PP:-1}"
      # 48K + 0.92 — production default. Below BOTH cliffs:
      #   - GDN forward (single-prompt OOM at ~50-60K tokens) → 48K stays safely under
      #   - TurboQuant tool prefill (OOM at high mem_util + big tool responses) → 0.92 leaves ~1.9 GB headroom
      # Engine REJECTS oversized requests with HTTP 400 (clean), no crashes.
      # Verify-full.sh ALL 10 checks pass at this combo (2026-04-28).
      #
      # To push higher: prefer the dedicated long-* variants (which carry the
      # PN12 anchor sidecar that closes Cliff 1) rather than just bumping
      # max-model-len here:
      #   - 64K + 0.92        → up to ~50K single prompts safe (most agent flows)
      #   - 96K + 0.93        → up to ~40-50K; needle scale=900 OOMs in GDN (Cliff 2)
      #   - 128K + 0.95       → up to ~40K tool prefill, single prompts >50K may OOM
      #   - long-vision.yml   → 198K + vision + sidecars (Cliff 1 closed; Cliff 2 caveat)
      #   - long-text.yml     → 218K text-only + sidecars (same Cliff 2 caveat)
      - --max-model-len
      - "${MAX_MODEL_LEN:-48000}"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTILIZATION:-0.92}"
      - --max-num-seqs
      - "1"
      - --max-num-batched-tokens
      - "4128"
      - --kv-cache-dtype
      - "${KV_CACHE_DTYPE:-turboquant_3bit_nc}"
      # For maximum context, switch to single/long-text.yml (218K, no
      # vision) or single/long-vision.yml (198K + vision). Both carry
      # the PN12 anchor sidecar that closes Cliff 1 on TQ3 paths.
      #- --language-model-only
      - --trust-remote-code
      # froggeric chat-template override (see volumes block + docs/UPSTREAM.md)
      - --chat-template
      - /etc/qwen-froggeric-chat-template.jinja
      - --reasoning-parser
      - qwen3
      - --default-chat-template-kwargs
      - '{"enable_thinking": false}'
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --no-scheduler-reserve-full-isl
      - --speculative-config
      - '{"method":"mtp","num_speculative_tokens":3}'
      # cudagraph_mode left at vLLM default. Genesis v7.14 P65 auto-downgrades
      # FULL_AND_PIECEWISE → PIECEWISE for spec-decode K+1 verify; 1-token
      # decode batches still get cudagraph capture. Forcing FULL_AND_PIECEWISE
      # explicitly produces no measurable benefit (verified 2026-04-27).
      - --override-generation-config
      - '{"temperature":${TEMP:-${TEMPERATURE:-0.6}},"top_p":${TOP_P:-0.95},"top_k":${TOP_K:-20},"min_p":${MIN_P:-0.0},"repetition_penalty":${REPEAT_PENALTY:-1.0}}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
