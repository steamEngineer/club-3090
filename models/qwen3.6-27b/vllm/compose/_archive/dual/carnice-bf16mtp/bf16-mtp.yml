# ===========================================================================
# Profile (at-a-glance):
#   Model:     Carnice-V2-27B (Hermes agentic fine-tune of Qwen3.6-27B,
#              INT4 + BF16 MTP overlay, HF: wasifb/Carnice_V2_27B_INT4_BF16MTP)
#   Topology:  Dual 3090 PCIe (TP=2, no NVLink)
#   Drafter:   MTP n=3 (BF16 MTP overlay grafted onto Carnice's stripped INT4)
#   KV:        fp8_e5m2
#   Vision:    yes
#   Max ctx:   262K
#   Genesis:   v7.72.2 (full PROD env stack)
#   Status:    ⚠️ Production w/ caveats
#   Caveats:   MTP AL=2.0 vs Lorbus's 3.4-3.8 (TPS 72/80, working but suboptimal). Carnice was uploaded with stripped MTP keys; we delta-merged the head. Three diagnostic steps queued in /opt/ai/club-3090-todo.md (Tier 2 Carnice plan).
#   Best for:  Hermes-style agentic tool-calling specialization
# ---------------------------------------------------------------------------
# Carnice-V2-27B + BF16 MTP overlay — dual RTX 3090 variant.
#
# Carnice is a Hermes-style agentic fine-tune of Qwen3.6-27B. This variant
# grafts the BF16 MTP head from the base Qwen3.6-27B (un-quantized) onto the
# AutoRound INT4 quant applied to Carnice, recovering MTP spec-decode AL from
# 2.0 → 3.0 (85–95% of base-Qwen TPS). Tool-call format is Hermes JSON via
# patched chat template + vLLM's `--tool-call-parser hermes`.
#
#   Measured (2026-05-04 on club-3090 substrate, dev205):
#     71.8 narr / 80.4 code wall TPS (n=5 each, CV ~11%)
#     MTP AL 3.02-3.14, TTFT 141ms, VRAM 22,246 MiB/card
#
# What this gives you (vs the dual.yml default for base Qwen3.6-27B):
#   - Hermes-style agentic specialization (better tool use, assistant behavior)
#   - Full 262K context, 2 streams, fp8 KV, MTP n=3 — identical to dual.yml
#   - ~85% code TPS of base Qwen — close enough that Hermes specialization wins
#   - BF16 MTP head adds +270 MB/card (negligible at this VRAM budget)
#
# All dual-card variants in this dir:
#
#   File                                Ctx    Streams   Narr/Code TPS   KV       Vision  Topology
#   dual/docker-compose.yml             262K   2         69 / 89          fp8      ✅      2× PCIe
#   dual/carnice-bf16mtp.yml  262K   2         72 / 80          fp8      ✅      2× PCIe
#   multi4/docker-compose.yml            262K   4         63 / 76          fp8      ✅      4× PCIe
#   multi4/dflash.yml     262K   2         64 / 104         FP16     ✅      4× PCIe
#   dual/turbo.yml       262K   4         54 / 73          TQ3      ✅      2× PCIe
#   dual/dflash.yml      185K   1         82 / 125         FP16     ✅
#   dual/dflash-noviz.yml 200K   1         78 / 127         FP16     ❌      2× PCIe
#
# Available on HuggingFace: wasifb/Carnice_V2_27B_INT4_BF16MTP
# https://huggingface.co/wasifb/Carnice_V2_27B_INT4_BF16MTP
#
# Run:
#   cd <repo>/models/qwen3.6-27b/vllm/compose
#   docker compose -f dual/carnice-bf16mtp.yml up -d
# ===========================================================================
# Hardware metadata (parsed by scripts/preflight.sh):
# Requires-min-vram-gb: 24
# Engine-profile: vllm-nightly-clean
# Requires-min-gpu-count: 2
# Tensor-parallel: 2
services:
  vllm-carnice-bf16mtp:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:nightly-${VLLM_NIGHTLY_SHA}}
    container_name: "${ESTATE_CONTAINER:-vllm-carnice-bf16mtp}"
    restart: ${CLUB3090_RESTART:-unless-stopped}
    ports:
      - "${BIND_HOST:-0.0.0.0}:${ESTATE_PORT:-${PORT:-8070}}:8000"
    volumes:
      - ${MODEL_DIR:-../../../../../../models-cache}:/root/.cache/huggingface
      # Patched chat template: tells Carnice to output JSON tool calls
      # inside <tool_call> tags (instead of Qwen3 XML format). Required for
      # `--tool-call-parser hermes` to parse correctly.
      - ../../../patches/carnice-chat-template.jinja:/root/.cache/huggingface/carnice-v2-27b-int4-recipe-d-bf16mtp/chat_template.jinja:ro
      # torch.compile + Triton kernel caches — first boot warms (~60-90 sec);
      # subsequent boots reuse cached graphs. Pattern from Sander's PROD launch.
      # Closes club-3090 #22.
      - ../../../cache/torch_compile:/root/.cache/vllm/torch_compile_cache
      - ../../../cache/triton:/root/.triton/cache
      # Marlin pad-sub-tile-n patch (vLLM PR #40361) — required for TP=2
      # on AutoRound W4A16 models where out-dim shards fall below 64.
      # Vendored in this repo at ../../../patches/vllm-marlin-pad/ (no host
      # filesystem dependency). Drops out when vllm#40361 lands upstream.
      - ../../../patches/vllm-marlin-pad/marlin.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/kernels/linear/mixed_precision/marlin.py:ro
      - ../../../patches/vllm-marlin-pad/MPLinearKernel.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/kernels/linear/mixed_precision/MPLinearKernel.py:ro
      # vLLM PR #35936 required-tool fallback (drop when upstream lands).
      # vLLM PR #35936 required-tool fallback — sidecar pattern (drop when upstream lands).
      # Bind-mounted at side paths so install.sh can copy into vLLM's site-packages
      # BEFORE Genesis runs — avoids the RO-mount conflict with Genesis P64/P68/P69
      # which write to chat_completion/serving.py at vllm-import time. See
      # patches/vllm-pr35936-required-fallback/install.sh + README.md.
      - ../../../patches/vllm-pr35936-required-fallback/vllm/entrypoints/openai/chat_completion/serving.py:/etc/club3090/pr35936-chat-completion-serving.py:ro
      - ../../../patches/vllm-pr35936-required-fallback/vllm/entrypoints/openai/engine/serving.py:/etc/club3090/pr35936-engine-serving.py:ro
      - ../../../patches/vllm-pr35936-required-fallback/install.sh:/etc/club3090/install-pr35936.sh:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=${ESTATE_GPUS:-${NVIDIA_VISIBLE_DEVICES:-all}}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-${OFFLINE:-0}}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-${OFFLINE:-0}}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      # PCIe-only stack — disable NCCL features that assume NVLink.
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_NO_USAGE_STATS=1
      - VLLM_USE_FLASHINFER_SAMPLER=1
      - OMP_NUM_THREADS=1
      # expandable_segments:True crashes boot on some setups (likely cuMemMap path).
      # Known: JusefPol on NVLink (PR #31), WSL2 single-card 3090 Ti.
      # Override via .env: PYTORCH_CUDA_ALLOC_CONF=expandable_segments:False
      - PYTORCH_CUDA_ALLOC_CONF=${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True,max_split_size_mb:512}
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint:
      - /bin/bash
      - -c
      - |
        # VLLM_ENFORCE_EAGER=1 in .env disables CUDA graphs — use on
        # hardware where graph capture causes OOM or instability (e.g. WSL2).
        # Install PR #35936 overlay before vllm imports (drop when upstream lands).
        bash /etc/club3090/install-pr35936.sh
        exec vllm serve ${VLLM_ENFORCE_EAGER:+--enforce-eager} "$@"
      - --
    command:
      - --model
      - /root/.cache/huggingface/carnice-v2-27b-int4-recipe-d-bf16mtp
      - --served-model-name
      - carnice-bf16mtp
      - --quantization
      - auto_round
      - --dtype
      - float16
      - --tensor-parallel-size
      - "${TP:-2}"
      - --pipeline-parallel-size
      - "${PP:-1}"
      - --disable-custom-all-reduce
      - --max-model-len
      - "${MAX_MODEL_LEN:-262144}"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTILIZATION:-0.92}"
      - --max-num-seqs
      - "2"
      - --max-num-batched-tokens
      - "8192"
      - --kv-cache-dtype
      - "${KV_CACHE_DTYPE:-fp8_e5m2}"
      - --trust-remote-code
      - --reasoning-parser
      - qwen3
      - --default-chat-template-kwargs
      - '{"enable_thinking": false}'
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_xml
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --speculative-config
      - '{"method":"mtp","num_speculative_tokens":3}'
      - --override-generation-config
      - '{"temperature":${TEMP:-${TEMPERATURE:-0.6}},"top_p":${TOP_P:-0.95},"top_k":${TOP_K:-20},"min_p":${MIN_P:-0.0},"repetition_penalty":${REPEAT_PENALTY:-1.0}}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
