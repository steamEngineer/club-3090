# ===========================================================================
# Profile (at-a-glance):
#   Model:     Qwen3.6-27B (Lorbus AutoRound INT4 + BF16 mtp.fc preserved)
#   Topology:  Dual 3090 PCIe (TP=2, no NVLink)
#   Drafter:   MTP n=3 (built-in)
#   KV:        turboquant_3bit_nc (TQ3) — 3-bit per element
#   Max ctx:   262144 (262K)
#   Status:    🗑️ Deprecated
#   Caveats:   Tombstoned 2026-05-11 — NOT shipping. Genesis-free TQ3+MTP needs an
#              upstream P67-equivalent multi-query TurboQuant kernel that doesn't exist
#              yet (see gap below). Kept as a reference / re-test surface. Use
#              dual/tq3-mtp-genesis.yml (upstream-gated) or dual/turbo.yml instead.
#   Best for:  Reference / re-test surface once an upstream P67-equivalent
#              multi-query TurboQuant spec-decode kernel lands.
# ---------------------------------------------------------------------------
# 2026-05-11 UPSTREAM-FIX GAP (no Genesis):
#
#   TQ3 + MTP on Qwen3-Next requires Genesis-side handling that upstream
#   vLLM does not yet have. Sander initially closed vllm-issue#40880 with
#   the v7.14 P64/P65/P66/P68/P69 stack, then later generalized the real
#   fix as P67/P67b: a K+1-aware multi-query TurboQuant path against the
#   compressed cache.
#
#   Today's upstream-PR landscape still does not cover that P67 behavior:
#     - PR #40914 (OPEN) — synthetic seq_lens K+1 routing. Local rebases
#       on this Qwen3.6-27B nightly stack were negative: with the overlay
#       active, MTP acceptance reached 100% but long-context recall collapsed
#       into `!` floods and tool/multi-turn paths timed out. Dropping it
#       improved verify-stress from 3/7 to 5/7, but needles still failed.
#     - PR #40798 (OPEN) — TQ decode workspace pre-allocation (separate
#       workspace-lock bug; partially required for boot)
#     - PR #42215 (OPEN) — TQ decode kernel warmup (overlapping with #40798)
#     - PR #40792 (OPEN) — k8v4 GQA decode optimization; faster, but not a
#       K+1 spec-verify multi-query correctness fix.
#
#   Tracking issue vllm#40069 still lists "Speculative decoding / Eagle" as
#   disabled or unverified for TurboQuant, which matches our local matrix.
#
#   We attempted a partial stack on 2026-05-11:
#     - marlin-pad (vllm#40361)
#     - PR #40798 `gpu_model_runner.py` ONLY (workspace pre-allocation)
#     - PR #40914 K+1 dispatch block manually rebased onto post-#41434 main
#
#   Result: PR #40914 was not just insufficient here, it was worse than
#   stock nightly. Enforce-eager and the output-buffer epilogue fix did not
#   change the `!`-flood. With #40914 removed, tool-prefill and multi-turn
#   recovered, but TQ3/TQ4/k8v4 + MTP all still failed long-context needles
#   with first-word repetition. TQ3 with MTP disabled passes all checks, so
#   this is an MTP x TurboQuant multi-query bug, not TQ precision.
#
# Deployable alternatives without Genesis:
#   - dual/tq3-nomtp.yml  ← validated: 1.73M KV pool, 6.59× concurrency,
#                            verify-stress all pass, no MTP acceleration
#   - dual/int8.yml       ← shipping baseline: 605K KV pool, 2.31×, MTP working
#
# Deployable alternative WITH Genesis:
#   - dual/tq3-mtp-genesis.yml  ← uses the full P64/P65/P66/P68/P69 stack
#                                  via Genesis modular package
#
# Drop the tombstone only when an upstream P67-equivalent fix lands and
# passes our verify-stress matrix across TQ3/TQ4/k8v4 + MTP.
# ===========================================================================
# Run (only when all 5 upstream fixes are available):
#   docker compose -f dual/tq3-mtp.yml up -d
# ===========================================================================
# Hardware metadata (parsed by scripts/preflight.sh):
# Requires-min-vram-gb: 24
# Engine-profile: vllm-nightly-mtp
# Requires-min-gpu-count: 2
# Tensor-parallel: 2
services:
  vllm-qwen36-27b-dual-int8-tq3:
    # Same vLLM nightly as gemma-4-31b/vllm/compose/dual/int8-tq3.yml — 2026-05-08
    # cut, post Gemma 4 MTP merge + INT8 PTH KV path (vllm#40391). Pin matches
    # so head-to-head TPS deltas reflect model intrinsics, not vLLM-version
    # drift between Qwen and Gemma legs.
    image: ${VLLM_IMAGE:-vllm/vllm-openai:nightly-${VLLM_NIGHTLY_SHA}}
    container_name: "${ESTATE_CONTAINER:-vllm-qwen36-27b-dual-int8-tq3}"
    restart: ${CLUB3090_RESTART:-unless-stopped}
    ports:
      - "${BIND_HOST:-0.0.0.0}:${ESTATE_PORT:-${PORT:-8013}}:8000"
    volumes:
      - ${MODEL_DIR:-../../../../../../models-cache}:/root/.cache/huggingface
      # Reuse the same torch.compile + Triton kernel caches as dual.yml so
      # second-boot warm time stays short. The kernel cache is keyed by
      # (model, kv-dtype, vllm-version) so we share with dual.yml only when
      # all three match — for int8 vs fp8 the cache won't collide.
      - ../../../cache/torch_compile:/root/.cache/vllm/torch_compile_cache
      - ../../../cache/triton:/root/.triton/cache
      # Marlin pad-sub-tile-n patch (vLLM PR #40361) — still required for
      # TP=2 on AutoRound W4A16 (drops out when upstream merges).
      - ../../../patches/vllm-marlin-pad/marlin.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/kernels/linear/mixed_precision/marlin.py:ro
      - ../../../patches/vllm-marlin-pad/MPLinearKernel.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/kernels/linear/mixed_precision/MPLinearKernel.py:ro
      # ⚠️ DEBUG ROUND-5 (2026-05-11): test Sander's P65 mechanism cleanly.
      # PR #40914 K+1 dispatch DROPPED — that overlay intercepts spec-verify
      # batches with a synthetic-seq_lens path that's broken even in eager.
      # P65's real mechanism: let K+1 batches fall through to the stock
      # _prefill_attention per-request continuation branch (which we get
      # by default in nightly). Plus VLLM_ENFORCE_EAGER=1 to take the
      # cudagraph path off the table entirely.
      - ../../../patches/vllm-pr40798-rebased/v1/worker/gpu_model_runner.py:/usr/local/lib/python3.12/dist-packages/vllm/v1/worker/gpu_model_runner.py:ro
      # vLLM PR #35936 required-tool fallback (drop when upstream lands).
      # vLLM PR #35936 required-tool fallback — sidecar pattern (drop when upstream lands).
      # Bind-mounted at side paths so install.sh can copy into vLLM's site-packages
      # BEFORE Genesis runs — avoids the RO-mount conflict with Genesis P64/P68/P69
      # which write to chat_completion/serving.py at vllm-import time. See
      # patches/vllm-pr35936-required-fallback/install.sh + README.md.
      - ../../../patches/vllm-pr35936-required-fallback/vllm/entrypoints/openai/chat_completion/serving.py:/etc/club3090/pr35936-chat-completion-serving.py:ro
      - ../../../patches/vllm-pr35936-required-fallback/vllm/entrypoints/openai/engine/serving.py:/etc/club3090/pr35936-engine-serving.py:ro
      - ../../../patches/vllm-pr35936-required-fallback/install.sh:/etc/club3090/install-pr35936.sh:ro
      # vLLM PR #41800 (truncate_prompt_tokens kwarg) overlay — fixes opencode-style
      # HTTP 400 on get_max_tokens(). No-op on post-fix nightlies.
      # See ../../../patches/vllm-pr41800-truncate-prompt-tokens/README.md.
      - ../../../patches/vllm-pr41800-truncate-prompt-tokens/install.sh:/etc/club3090/install-pr41800.sh:ro
      # froggeric/Qwen-Fixed-Chat-Templates qwen3.6 — fixes 7 default-template
      # bugs (empty <think></think> spam, </thinking> hallucination, unclosed
      # think before tool call, no-user-query crash, developer role, etc.).
      # See docs/UPSTREAM.md "Community templates / model assets" + the row at
      # https://huggingface.co/froggeric/Qwen-Fixed-Chat-Templates
      - ../../../patches/froggeric-chat-template/chat_template.jinja:/etc/qwen-froggeric-chat-template.jinja:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=${ESTATE_GPUS:-${NVIDIA_VISIBLE_DEVICES:-all}}
      - VLLM_ENFORCE_EAGER=1
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-${OFFLINE:-0}}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-${OFFLINE:-0}}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_NO_USAGE_STATS=1
      - VLLM_USE_FLASHINFER_SAMPLER=1
      - OMP_NUM_THREADS=1
      - PYTORCH_CUDA_ALLOC_CONF=${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True,max_split_size_mb:512}
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint:
      - bash
      - -c
      - |
        # Install PR #35936 overlay before vllm imports (drop when upstream lands).
        bash /etc/club3090/install-pr35936.sh
        bash /etc/club3090/install-pr41800.sh
        exec vllm serve ${VLLM_ENFORCE_EAGER:+--enforce-eager} "$@"
      - --
    command:
      - --model
      - /root/.cache/huggingface/qwen3.6-27b-autoround-int4
      - --served-model-name
      - qwen3.6-27b-autoround
      - --quantization
      - auto_round
      - --dtype
      - float16
      - --tensor-parallel-size
      - "${TP:-2}"
      - --pipeline-parallel-size
      - "${PP:-1}"
      - --disable-custom-all-reduce
      - --max-model-len
      - "${MAX_MODEL_LEN:-262144}"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTILIZATION:-0.92}"
      - --max-num-seqs
      - "${MAX_NUM_SEQS:-2}"
      - --max-num-batched-tokens
      - "8192"
      # INT8 per-token-head KV via vllm#40391 (same as gemma-int8-tq3.yml).
      # If this errors at boot on Qwen3-Next DeltaNet hybrid attention,
      # the model may not yet be compatible — fall back to fp8_e5m2 dual.yml.
      - --kv-cache-dtype
      - "${KV_DTYPE:-turboquant_3bit_nc}"
      - --trust-remote-code
      # froggeric chat-template override (see volumes block + docs/UPSTREAM.md)
      - --chat-template
      - /etc/qwen-froggeric-chat-template.jinja
      - --reasoning-parser
      - qwen3
      - --default-chat-template-kwargs
      - '{"enable_thinking": false}'
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --enable-chunked-prefill
      # MTP n — architectural target for Qwen3-Next built-in heads is the
      # number of physical MTP layers in the model (3 for Qwen3.6 AutoRound
      # at time of writing). Higher n re-uses the same MTP layer for the
      # extra draft steps and emits a vLLM warning about reduced acceptance
      # rate. Use SPEC_N_MAX=4 to A/B against Gemma's n=4.
      - --speculative-config
      - '{"method":"mtp","num_speculative_tokens":${SPEC_N_MAX:-3}}'
      - --override-generation-config
      - '{"temperature":${TEMP:-${TEMPERATURE:-0.6}},"top_p":${TOP_P:-0.95},"top_k":${TOP_K:-20},"min_p":${MIN_P:-0.0},"repetition_penalty":${REPEAT_PENALTY:-1.0}}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
