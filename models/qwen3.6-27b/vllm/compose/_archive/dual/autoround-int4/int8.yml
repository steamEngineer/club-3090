# ===========================================================================
# Profile (at-a-glance):
#   Model:     Qwen3.6-27B (Lorbus AutoRound INT4 + BF16 mtp.fc preserved)
#   Topology:  Dual 3090 PCIe (TP=2, no NVLink)
#   Drafter:   MTP n=3 (built-in, architectural max for Qwen3-Next)
#   KV:        int8_per_token_head (PTH, via vllm#40391) — 1 byte/token like fp8
#              but uses PR #40391 quantized-pool path that lets Gemma run at
#              the same KV class. Created for **matched-config head-to-head
#              against gemma-int8.yml** — same vLLM pin, same KV class, same
#              262K ctx.
#   Vision:    yes
#   Max ctx:   262144 (262K — same as fp8 dual.yml)
#   Genesis:   none (matches dual.yml — intentionally Genesis-free)
#   Status:    🗑️ Deprecated
#   Caveats:   Pruned 2026-05-31 — was a matched-config A/B vs Gemma 4 31B int8.yml;
#              never validated on Qwen DeltaNet, and fp8 is native on Qwen so int8 PTH
#              buys nothing. Superseded by vllm/dual. Recover from git if revisited.
#   Best for:  (deprecated — was: apples-to-apples vs Gemma int8.yml)
# ---------------------------------------------------------------------------
# Run:
#   docker compose -f dual/int8.yml up -d
# ===========================================================================
# Hardware metadata (parsed by scripts/preflight.sh):
# Requires-min-vram-gb: 24
# Engine-profile: vllm-nightly-full
# Requires-min-gpu-count: 2
# Tensor-parallel: 2
services:
  vllm-qwen36-27b-dual-int8:
    # Same vLLM nightly as gemma-4-31b/vllm/compose/dual/autoround-int4/int8.yml — 2026-05-08
    # cut, post Gemma 4 MTP merge + INT8 PTH KV path (vllm#40391). Pin matches
    # so head-to-head TPS deltas reflect model intrinsics, not vLLM-version
    # drift between Qwen and Gemma legs.
    image: ${VLLM_IMAGE:-vllm/vllm-openai:nightly-${VLLM_NIGHTLY_SHA}}
    container_name: "${ESTATE_CONTAINER:-vllm-qwen36-27b-dual-int8}"
    restart: ${CLUB3090_RESTART:-unless-stopped}
    ports:
      - "${BIND_HOST:-0.0.0.0}:${ESTATE_PORT:-${PORT:-8011}}:8000"
    volumes:
      - ${MODEL_DIR:-../../../../../../models-cache}:/root/.cache/huggingface
      # Reuse the same torch.compile + Triton kernel caches as dual.yml so
      # second-boot warm time stays short. The kernel cache is keyed by
      # (model, kv-dtype, vllm-version) so we share with dual.yml only when
      # all three match — for int8 vs fp8 the cache won't collide.
      - ../../../cache/torch_compile:/root/.cache/vllm/torch_compile_cache
      - ../../../cache/triton:/root/.triton/cache
      # Marlin pad-sub-tile-n patch (vLLM PR #40361) — still required for
      # TP=2 on AutoRound W4A16 (drops out when upstream merges).
      - ../../../patches/vllm-marlin-pad/marlin.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/kernels/linear/mixed_precision/marlin.py:ro
      - ../../../patches/vllm-marlin-pad/MPLinearKernel.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/kernels/linear/mixed_precision/MPLinearKernel.py:ro
      # vLLM PR #35936 required-tool fallback (drop when upstream lands).
      # vLLM PR #35936 required-tool fallback — sidecar pattern (drop when upstream lands).
      # Bind-mounted at side paths so install.sh can copy into vLLM's site-packages
      # BEFORE Genesis runs — avoids the RO-mount conflict with Genesis P64/P68/P69
      # which write to chat_completion/serving.py at vllm-import time. See
      # patches/vllm-pr35936-required-fallback/install.sh + README.md.
      - ../../../patches/vllm-pr35936-required-fallback/vllm/entrypoints/openai/chat_completion/serving.py:/etc/club3090/pr35936-chat-completion-serving.py:ro
      - ../../../patches/vllm-pr35936-required-fallback/vllm/entrypoints/openai/engine/serving.py:/etc/club3090/pr35936-engine-serving.py:ro
      - ../../../patches/vllm-pr35936-required-fallback/install.sh:/etc/club3090/install-pr35936.sh:ro
      # vLLM PR #41800 (truncate_prompt_tokens kwarg) overlay — fixes opencode-style
      # HTTP 400 on get_max_tokens(). No-op on post-fix nightlies.
      # See ../../../patches/vllm-pr41800-truncate-prompt-tokens/README.md.
      - ../../../patches/vllm-pr41800-truncate-prompt-tokens/install.sh:/etc/club3090/install-pr41800.sh:ro
      # froggeric/Qwen-Fixed-Chat-Templates qwen3.6 — fixes 7 default-template
      # bugs (empty <think></think> spam, </thinking> hallucination, unclosed
      # think before tool call, no-user-query crash, developer role, etc.).
      # See docs/UPSTREAM.md "Community templates / model assets" + the row at
      # https://huggingface.co/froggeric/Qwen-Fixed-Chat-Templates
      - ../../../patches/froggeric-chat-template/chat_template.jinja:/etc/qwen-froggeric-chat-template.jinja:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=${ESTATE_GPUS:-${NVIDIA_VISIBLE_DEVICES:-all}}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-${OFFLINE:-0}}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-${OFFLINE:-0}}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_NO_USAGE_STATS=1
      - VLLM_USE_FLASHINFER_SAMPLER=1
      - OMP_NUM_THREADS=1
      - PYTORCH_CUDA_ALLOC_CONF=${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True,max_split_size_mb:512}
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint:
      - bash
      - -c
      - |
        # Install PR #35936 overlay before vllm imports (drop when upstream lands).
        bash /etc/club3090/install-pr35936.sh
        bash /etc/club3090/install-pr41800.sh
        exec vllm serve ${VLLM_ENFORCE_EAGER:+--enforce-eager} "$@"
      - --
    command:
      - --model
      - /root/.cache/huggingface/qwen3.6-27b-autoround-int4
      - --served-model-name
      - qwen3.6-27b-autoround
      - --quantization
      - auto_round
      - --dtype
      - float16
      - --tensor-parallel-size
      - "${TP:-2}"
      - --pipeline-parallel-size
      - "${PP:-1}"
      - --disable-custom-all-reduce
      - --max-model-len
      - "${MAX_MODEL_LEN:-262144}"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTILIZATION:-0.92}"
      - --max-num-seqs
      - "${MAX_NUM_SEQS:-2}"
      - --max-num-batched-tokens
      - "8192"
      # INT8 per-token-head KV via vllm#40391 (same as gemma-int8.yml).
      # If this errors at boot on Qwen3-Next DeltaNet hybrid attention,
      # the model may not yet be compatible — fall back to fp8_e5m2 dual.yml.
      - --kv-cache-dtype
      - "${KV_DTYPE:-int8_per_token_head}"
      - --trust-remote-code
      # froggeric chat-template override (see volumes block + docs/UPSTREAM.md)
      - --chat-template
      - /etc/qwen-froggeric-chat-template.jinja
      - --reasoning-parser
      - qwen3
      - --default-chat-template-kwargs
      - '{"enable_thinking": false}'
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --enable-chunked-prefill
      # MTP n — architectural target for Qwen3-Next built-in heads is the
      # number of physical MTP layers in the model (3 for Qwen3.6 AutoRound
      # at time of writing). Higher n re-uses the same MTP layer for the
      # extra draft steps and emits a vLLM warning about reduced acceptance
      # rate. Use SPEC_N_MAX=4 to A/B against Gemma's n=4.
      - --speculative-config
      - '{"method":"mtp","num_speculative_tokens":${SPEC_N_MAX:-3}}'
      - --override-generation-config
      - '{"temperature":${TEMP:-${TEMPERATURE:-0.6}},"top_p":${TOP_P:-0.95},"top_k":${TOP_K:-20},"min_p":${MIN_P:-0.0},"repetition_penalty":${REPEAT_PENALTY:-1.0}}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
