# ===========================================================================
# Profile (at-a-glance):
#   Model:     Qwen3.6-27B (Lorbus AutoRound INT4 + BF16 mtp.fc preserved)
#   Topology:  Quad 3090 PCIe (TP=4) — see MULTI_CARD.md for derivation
#   Drafter:   MTP n=3 (built-in)
#   KV:        fp8_e5m2
#   Vision:    yes
#   Max ctx:   262K
#   Genesis:   v7.72.2 (full PROD env stack)
#   Status:    ✅ Production
#   Best for:  4-card TP=4 baseline — high concurrency, max KV pool size
# ---------------------------------------------------------------------------
# Quad RTX 3090 — TP=4 baseline. Qwen3.6-27B + MTP n=3 + fp8 KV + vision.
#
# Community-validated on Whamp's 4× RTX 3090 PCIe rig (discussion #26),
# 2026-05-03. Derived from dual/docker-compose.yml by scaling tensor
# parallelism and concurrent streams from 2 → 4.
#
# What this gives you (vs the 2-card default):
#   - TP=4 across four 3090s
#   - max_num_seqs=4 with full 262K context admission
#   - vLLM pre-check accepts max_model_len=262144 + max_num_seqs=4
#   - KV pool reports 483,200 tokens and 6.77× max concurrency at 262K
#   - Cliff 2 probe 7 passes: 58,569-token and 91,070-token needles recalled
#   - vision + tools + MTP n=3 + recall — same feature set as dual.yml
#
# Measured on 4× RTX 3090 PCIe, vLLM nightly 0.20.1rc1.dev16+g7a1eb8ac2:
#   - verify-full.sh: PASS
#   - verify-stress.sh: PASS 7/7, including 60K + 90K Cliff 2 needles
#   - bench.sh: 63.01 narr (CV 2.1%) / 76.25 code (CV 4.0%) wall TPS
#   - MTP AL during code bench: last observed 3.42 / 3.53 / 3.62
#   - Peak VRAM during bench: 23,494 MiB/card
#
# Trade-off vs TP=2 dual.yml:
#   - More long-context/concurrency headroom and Cliff 2 boundary data.
#   - Pick this over dual.yml when you need >2 concurrent streams or
#     single-prompt context beyond the 60K Cliff 2 boundary.
#   - Lower single-stream TPS on PCIe-only allreduce (63/76 vs ~69/89 TP=2).
#     Use this when you need 4-card capacity or Cliff 2 margin, not when you
#     only want fastest single-stream decode.
#
# Dependencies:
#   - 4× RTX 3090 (Ampere SM 8.6), PCIe-only validated (no NVLink required)
#   - vLLM PR #40361 (Marlin pad-sub-tile-n) — patched files volume-mounted
#     from ../../patches/vllm-marlin-pad/. At TP=4 the pad fork is still required
#     because more output-dim shards fall below Marlin's sub-tile threshold.
#
# All fp8/MTP long-context variants in this dir:
#
#   File                                Ctx    Streams   Narr/Code TPS   KV       Vision  Topology
#   dual/docker-compose.yml             262K   2         69 / 89          fp8      ✅      2× PCIe
#   multi4/docker-compose.yml (this)     262K   4         63 / 76          fp8      ✅      4× PCIe
#   multi4/dflash.yml     262K   2         64 / 104         FP16     ✅      4× PCIe
#   dual/nvlink.yml      262K   2         (community)      fp8      ✅      2× NVLink
#
# Run:
#   cd <repo>/models/qwen3.6-27b/vllm/compose
#   docker compose -f multi4/docker-compose.yml up -d
# ===========================================================================
# Hardware metadata (parsed by scripts/preflight.sh):
# Requires-min-vram-gb: 24
# Engine-profile: vllm-nightly-clean
# Requires-min-gpu-count: 4
# Tensor-parallel: 4
services:
  vllm-qwen36-27b-multi4:
    # Tracking latest nightly intentionally — this stack uses fp8 KV (not
    # TurboQuant), so it doesn't accumulate the same anchor-drift exposure
    # the single-card project does. Pin if you hit a regression; otherwise
    # ride the wave.
    image: ${VLLM_IMAGE:-vllm/vllm-openai:nightly-${VLLM_NIGHTLY_SHA}}
    container_name: "${ESTATE_CONTAINER:-vllm-qwen36-27b-multi4}"
    restart: "no"
    ports:
      - "${BIND_HOST:-0.0.0.0}:${ESTATE_PORT:-${PORT:-8015}}:8000"
    volumes:
      - ${MODEL_DIR:-../../../../../models-cache}:/root/.cache/huggingface
      # torch.compile + Triton kernel caches — first boot warms (~60-90 sec);
      # subsequent boots reuse cached graphs. Pattern from Sander's PROD launch.
      # Closes club-3090 #22.
      - ../../cache/torch_compile:/root/.cache/vllm/torch_compile_cache
      - ../../cache/triton:/root/.triton/cache
      # Marlin pad-sub-tile-n patch (vLLM PR #40361) — required for TP=4
      # on AutoRound W4A16 models where out-dim shards fall below 64.
      # Vendored in this repo at ../../patches/vllm-marlin-pad/ (no host
      # filesystem dependency). Drops out when vllm#40361 lands upstream.
      - ../../patches/vllm-marlin-pad/marlin.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/kernels/linear/mixed_precision/marlin.py:ro
      - ../../patches/vllm-marlin-pad/MPLinearKernel.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/kernels/linear/mixed_precision/MPLinearKernel.py:ro
      # vLLM PR #35936 required-tool fallback (drop when upstream lands).
      # vLLM PR #35936 required-tool fallback — sidecar pattern (drop when upstream lands).
      # Bind-mounted at side paths so install.sh can copy into vLLM's site-packages
      # BEFORE Genesis runs — avoids the RO-mount conflict with Genesis P64/P68/P69
      # which write to chat_completion/serving.py at vllm-import time. See
      # patches/vllm-pr35936-required-fallback/install.sh + README.md.
      - ../../patches/vllm-pr35936-required-fallback/vllm/entrypoints/openai/chat_completion/serving.py:/etc/club3090/pr35936-chat-completion-serving.py:ro
      - ../../patches/vllm-pr35936-required-fallback/vllm/entrypoints/openai/engine/serving.py:/etc/club3090/pr35936-engine-serving.py:ro
      - ../../patches/vllm-pr35936-required-fallback/install.sh:/etc/club3090/install-pr35936.sh:ro
      # froggeric/Qwen-Fixed-Chat-Templates qwen3.6 — fixes 7 default-template
      # bugs (empty <think></think> spam, </thinking> hallucination, unclosed
      # think before tool call, no-user-query crash, developer role, etc.).
      # See docs/UPSTREAM.md "Community templates / model assets" + the row at
      # https://huggingface.co/froggeric/Qwen-Fixed-Chat-Templates
      - ../../patches/froggeric-chat-template/chat_template.jinja:/etc/qwen-froggeric-chat-template.jinja:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=${ESTATE_GPUS:-${NVIDIA_VISIBLE_DEVICES:-all}}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      # PCIe-only stack — disable NCCL features that assume NVLink.
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_NO_USAGE_STATS=1
      - VLLM_USE_FLASHINFER_SAMPLER=1
      - OMP_NUM_THREADS=1
      # expandable_segments:True crashes boot on some setups (likely cuMemMap path).
      # Known: JusefPol on NVLink (PR #31), WSL2 single-card 3090 Ti.
      # Override via .env: PYTORCH_CUDA_ALLOC_CONF=expandable_segments:False
      - PYTORCH_CUDA_ALLOC_CONF=${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True,max_split_size_mb:512}
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint:
      - bash
      - -c
      - |
        # VLLM_ENFORCE_EAGER=1 in compose/.env disables CUDA graphs — use on
        # hardware where Cliff 2 GDN activation spikes occur at runtime
        # (~50-65K active context tokens). Costs ~20-30% TPS in exchange for
        # stability. See docs/HARDWARE.md "Note for WSL2 / Windows users".
        # Install PR #35936 overlay before vllm imports (drop when upstream lands).
        bash /etc/club3090/install-pr35936.sh
        exec vllm serve ${VLLM_ENFORCE_EAGER:+--enforce-eager} "$@"
      - --
    command:
      - --model
      - /root/.cache/huggingface/qwen3.6-27b-autoround-int4
      - --served-model-name
      - qwen3.6-27b-autoround
      - --quantization
      - auto_round
      - --dtype
      - float16
      - --tensor-parallel-size
      - "${TP:-4}"
      - --pipeline-parallel-size
      - "${PP:-1}"
      - --disable-custom-all-reduce
      - --max-model-len
      - "${MAX_MODEL_LEN:-262144}"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTILIZATION:-0.92}"
      - --max-num-seqs
      - "4"
      - --max-num-batched-tokens
      - "8192"
      - --kv-cache-dtype
      - "${KV_CACHE_DTYPE:-fp8_e5m2}"
      - --trust-remote-code
      # froggeric chat-template override (see volumes block + docs/UPSTREAM.md)
      - --chat-template
      - /etc/qwen-froggeric-chat-template.jinja
      - --reasoning-parser
      - qwen3
      - --default-chat-template-kwargs
      - '{"enable_thinking": false}'
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --speculative-config
      - '{"method":"mtp","num_speculative_tokens":3}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
