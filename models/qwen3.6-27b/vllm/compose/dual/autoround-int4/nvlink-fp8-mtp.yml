# DEPRECATED (2026-05-14): use dual/autoround-int4/fp8-mtp.yml — NVLink is auto-detected
# in the compose entrypoint. This stub forces NVLink mode for backward compatibility.
# Will be removed in a future release.
services:
  vllm-qwen36-27b-dual-nvlink:
    extends:
      file: fp8-mtp.yml
      service: vllm-qwen36-27b-dual
    container_name: "${ESTATE_CONTAINER:-vllm-qwen36-27b-dual-nvlink}"
    environment:
      - NVLINK_MODE=force_on
      - NVIDIA_VISIBLE_DEVICES=${ESTATE_GPUS:-${NVIDIA_VISIBLE_DEVICES:-all}}
      - PORT=${ESTATE_PORT:-8014}
