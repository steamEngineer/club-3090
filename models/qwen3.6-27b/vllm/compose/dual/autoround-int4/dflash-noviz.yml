# ===========================================================================
# Profile (at-a-glance):
#   Model:     Qwen3.6-27B (Lorbus AutoRound INT4 + BF16 mtp.fc preserved)
#   Topology:  Dual 3090 (TP=2, NVLink auto-detected via NVLINK_MODE)
#   Drafter:   z-lab DFlash N=5 (block-diffusion drafter)
#   KV:        fp8_e5m2 (forced bf16 for drafter via --dtype bfloat16)
#   Vision:    no (vision tower dropped — frees ~0.5 GB/card for ctx)
#   Max ctx:   200K (+15K vs dual-dflash.yml)
#   Genesis:   none — DFlash drafter handles spec-decode independently
#   Status:    🗑️ Deprecated
#   Caveats:   Pruned 2026-05-31 — the lone no-vision dual A/B; dropped per the single-vision-config policy (vllm/dual covers vision + 262K + 2 streams). Recover from git if a text-only path is needed.
#   Best for:  (deprecated — was: peak code TPS, no-vision, extra ctx headroom)
# ---------------------------------------------------------------------------
# Dual-card DFlash text-only — TP=2 + DFlash N=5 + 200K ctx + NO vision.
#
# vs `dual/dflash.yml` (the with-vision variant): drops MoonViT
# to free ~0.78 GiB per card → bumps max_model_len 185K → 200K (close to the
# absolute DFlash ceiling on dual-3090 with FP16 KV).
#
# Best for: long single-prompt text workloads (RAG / summarization / code
# review across very long codebases) where you don't need image input.
#
# Measured: 77 narr / 124 code TPS, 200K ctx, 1 stream, code AL ~4.27 warm.
#
# Same DFlash caveats as dual-dflash.yml apply: single-stream only on the
# 2-card variants, FP16 KV (no fp8/turbo on DFlash + Ampere), `--dtype
# bfloat16` for vllm#40334 workaround. NVLink, if present, is auto-detected at
# boot (NVLINK_MODE=force_on to force it) — no separate nvlink-* variant. If you
# have 4x 3090 and need full 262K context + 2 streams, use
# multi4/dflash.yml.
#
# ─── Prerequisite: download the DFlash draft model ──────────────────────
# Same as dual-dflash.yml — needs `z-lab/Qwen3.6-27B-DFlash` at
# `<MODEL_DIR>/qwen3.6-27b-dflash/`. Get it via:
#
#   WITH_DFLASH_DRAFT=1 bash scripts/setup.sh qwen3.6-27b
#
# OR manually `hf download z-lab/Qwen3.6-27B-DFlash --local-dir <MODEL_DIR>/qwen3.6-27b-dflash`.
# If missing, vLLM falls back silently to baseline bf16 decode (~25 TPS
# instead of 125 TPS — reported by @lolren in club-3090#18). See
# `dual-dflash.yml` header for the under-training caveat.
#
# To run:
#   cd <repo>/models/qwen3.6-27b/vllm/compose
#   docker compose -f dual/dflash-noviz.yml up -d
# ===========================================================================
# Hardware metadata (parsed by scripts/preflight.sh):
# Requires-min-vram-gb: 24
# Engine-profile: vllm-nightly-dflash
# Requires-min-gpu-count: 2
# Tensor-parallel: 2
services:
  vllm-qwen36-27b-dual-dflash:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:nightly-${VLLM_NIGHTLY_SHA}}
    container_name: "${ESTATE_CONTAINER:-vllm-qwen36-27b-dual-dflash-noviz}"
    restart: ${CLUB3090_RESTART:-unless-stopped}
    ports:
      - "${BIND_HOST:-0.0.0.0}:${ESTATE_PORT:-${PORT:-8013}}:8000"
    volumes:
      - ${MODEL_DIR:-../../../../../../models-cache}:/root/.cache/huggingface
      # torch.compile + Triton kernel caches — first boot warms (~60-90 sec);
      # subsequent boots reuse cached graphs. Pattern from Sander's PROD launch.
      # Closes club-3090 #22.
      - ../../../cache/torch_compile:/root/.cache/vllm/torch_compile_cache
      - ../../../cache/triton:/root/.triton/cache
      # Marlin pad-sub-tile-n (vLLM PR #40361) — vendored in this repo at
      # ../../../patches/vllm-marlin-pad/. Drops out when vllm#40361 lands upstream.
      - ../../../patches/vllm-marlin-pad/marlin.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/kernels/linear/mixed_precision/marlin.py:ro
      - ../../../patches/vllm-marlin-pad/MPLinearKernel.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/kernels/linear/mixed_precision/MPLinearKernel.py:ro
      # vLLM PR #35936 required-tool fallback (drop when upstream lands).
      # vLLM PR #35936 required-tool fallback — sidecar pattern (drop when upstream lands).
      # Bind-mounted at side paths so install.sh can copy into vLLM's site-packages
      # BEFORE Genesis runs — avoids the RO-mount conflict with Genesis P64/P68/P69
      # which write to chat_completion/serving.py at vllm-import time. See
      # patches/vllm-pr35936-required-fallback/install.sh + README.md.
      - ../../../patches/vllm-pr35936-required-fallback/vllm/entrypoints/openai/chat_completion/serving.py:/etc/club3090/pr35936-chat-completion-serving.py:ro
      - ../../../patches/vllm-pr35936-required-fallback/vllm/entrypoints/openai/engine/serving.py:/etc/club3090/pr35936-engine-serving.py:ro
      - ../../../patches/vllm-pr35936-required-fallback/install.sh:/etc/club3090/install-pr35936.sh:ro
      # vLLM PR #41800 (truncate_prompt_tokens kwarg) overlay — fixes opencode
      # HTTP 400 on get_max_tokens(). See patches/vllm-pr41800.../README.md.
      - ../../../patches/vllm-pr41800-truncate-prompt-tokens/install.sh:/etc/club3090/install-pr41800.sh:ro
      # froggeric/Qwen-Fixed-Chat-Templates qwen3.6 — fixes 7 default-template
      # bugs (empty <think></think> spam, </thinking> hallucination, unclosed
      # think before tool call, no-user-query crash, developer role, etc.).
      # See docs/UPSTREAM.md "Community templates / model assets" + the row at
      # https://huggingface.co/froggeric/Qwen-Fixed-Chat-Templates
      - ../../../patches/froggeric-chat-template/chat_template.jinja:/etc/qwen-froggeric-chat-template.jinja:ro
      # NVLink auto-detection — runs inside container at boot.
      - ../../../../../../scripts/detect_nvlink.sh:/etc/club3090/detect_nvlink.sh:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=${ESTATE_GPUS:-${NVIDIA_VISIBLE_DEVICES:-all}}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-${OFFLINE:-0}}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-${OFFLINE:-0}}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NVLINK_MODE=${NVLINK_MODE:-auto}
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_NO_USAGE_STATS=1
      - VLLM_USE_FLASHINFER_SAMPLER=1
      - OMP_NUM_THREADS=1
      # expandable_segments:True crashes boot on some setups (likely cuMemMap path).
      # Known: JusefPol on NVLink (PR #31), WSL2 single-card 3090 Ti.
      # Override via .env: PYTORCH_CUDA_ALLOC_CONF=expandable_segments:False
      - PYTORCH_CUDA_ALLOC_CONF=${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True,max_split_size_mb:512}
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint:
      - /bin/bash
      - -c
      - |
        # VLLM_ENFORCE_EAGER=1 in .env disables CUDA graphs — use on
        # hardware where graph capture causes OOM or instability (e.g. WSL2).
        # Install PR #35936 overlay before vllm imports (drop when upstream lands).
        bash /etc/club3090/install-pr35936.sh
        bash /etc/club3090/install-pr41800.sh
        # NVLink auto-detection (sets NCCL env vars, _NVLINK_ENABLED).
        source /etc/club3090/detect_nvlink.sh
        if [ "${_NVLINK_ENABLED:-0}" = "1" ]; then
          exec vllm serve ${VLLM_ENFORCE_EAGER:+--enforce-eager} "$@"
        else
          exec vllm serve ${VLLM_ENFORCE_EAGER:+--enforce-eager} --disable-custom-all-reduce "$@"
        fi
      - --
    command:
      - --model
      - /root/.cache/huggingface/qwen3.6-27b-autoround-int4
      - --served-model-name
      - qwen3.6-27b-autoround
      - --quantization
      - auto_round
      - --dtype
      - bfloat16
      - --tensor-parallel-size
      - "${TP:-2}"
      - --pipeline-parallel-size
      - "${PP:-1}"
      - --max-model-len
      - "${MAX_MODEL_LEN:-200000}"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTILIZATION:-0.95}"
      - --max-num-seqs
      - "1"
      - --max-num-batched-tokens
      - "8192"
      # No --kv-cache-dtype: DFlash needs head_size=256 + non-causal attention,
      # and no Ampere backend supports that triple with fp8/turbo KV. FP16 default
      # is the only working choice (matches Qwen3.5-27B + DFlash row 4 = 89.7 TPS).
      # --language-model-only frees ~0.78 GiB of MoonViT weights → 15K more KV ctx.
      - --language-model-only
      - --trust-remote-code
      # froggeric chat-template override (see volumes block + docs/UPSTREAM.md)
      - --chat-template
      - /etc/qwen-froggeric-chat-template.jinja
      - --reasoning-parser
      - qwen3
      - --default-chat-template-kwargs
      - '{"enable_thinking": false}'
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --speculative-config
      - '{"method":"dflash","model":"/root/.cache/huggingface/qwen3.6-27b-dflash","num_speculative_tokens":5}'
      - --override-generation-config
      - '{"temperature":${TEMP:-${TEMPERATURE:-0.6}},"top_p":${TOP_P:-0.95},"top_k":${TOP_K:-20},"min_p":${MIN_P:-0.0},"repetition_penalty":${REPEAT_PENALTY:-1.0}}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
