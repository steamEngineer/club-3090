# DEPRECATED (2026-05-14): use dual/turbo.yml — NVLink is auto-detected
# in the compose entrypoint. This stub forces NVLink mode for backward compatibility.
# Will be removed in a future release.
services:
  vllm-qwen36-27b-dual-nvlink-turbo:
    extends:
      file: turbo.yml
      service: vllm-qwen36-27b-dual-turbo
    container_name: "${ESTATE_CONTAINER:-vllm-qwen36-27b-dual-nvlink-turbo}"
    environment:
      - NVLINK_MODE=force_on
      - NVIDIA_VISIBLE_DEVICES=${ESTATE_GPUS:-${NVIDIA_VISIBLE_DEVICES:-all}}
      - PORT=${ESTATE_PORT:-8017}
