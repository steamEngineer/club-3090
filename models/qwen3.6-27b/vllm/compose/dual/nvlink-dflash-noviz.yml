# ===========================================================================
# Profile (at-a-glance):
#   Model:     Qwen3.6-27B (Lorbus AutoRound INT4 + BF16 mtp.fc preserved)
#   Topology:  Dual 3090 + NVLink (TP=2, NCCL P2P over NVLink)
#   Drafter:   z-lab DFlash N=5 (block-diffusion drafter)
#   KV:        FP16 (forced for DFlash drafter compatibility)
#   Vision:    no (frees ~0.5 GB/card for ctx)
#   Max ctx:   200K (+15K vs dual-nvlink-dflash.yml; NVLink lifts max to 188K stable)
#   Genesis:   none
#   Status:    ✅ Production
#   Best for:  NVLink + peak code TPS, no-vision (max ctx headroom)
# ---------------------------------------------------------------------------
# Dual RTX 3090 with NVLink + DFlash text-only — TP=2 + DFlash N=5 + 200K ctx
# + NO vision + NVLink P2P for faster allreduce.
#
# Mirrors dual/dflash-noviz.yml but enables NCCL P2P over NVLink
# and re-enables vLLM's custom all-reduce kernel (which dual-dflash-noviz.yml
# disables for PCIe-only stacks). Combines DFlash N=5 draft model with NVLink
# bridge for maximum single-stream code throughput on 2x 3090 without vision.
#
# Status: COMMUNITY-CONTRIBUTED, EXPERIMENTAL.
#   If you run this, please drop numbers in discussion #19 — paste-ready report
#   via `bash scripts/report.sh`.
#
# What this gives you (vs the PCIe-only `dual-dflash-noviz.yml`):
#   - NCCL P2P over NVLink (NCCL_P2P_LEVEL=NVL) — much faster allreduce on TP=2
#   - Custom all-reduce ENABLED (--disable-custom-all-reduce removed) — NVLink
#     makes vLLM's custom kernel a win where PCIe makes it a loss
#   - PYTORCH_CUDA_ALLOC_CONF without `expandable_segments:True` — JusefPol
#     reports it crashes on startup with NVLink wired up
#
# vs `dual/nvlink-dflash.yml` (the with-vision variant): drops
# MoonViT to free ~0.78 GiB per card → bumps max_model_len 185K → 200K
# (close to the absolute DFlash ceiling on dual-3090 with FP16 KV).
#
# Best for: long single-prompt text workloads (RAG / summarization / code
# review across very long codebases) where you don't need image input.
#
# KV cache: FP16 (default — DFlash needs head_size=256 + non-causal attention,
# and no Ampere backend supports that triple with fp8/turbo KV).
#
# ─── Prerequisite: download the DFlash draft model ──────────────────────
# Same as dual-dflash-noviz.yml — needs `z-lab/Qwen3.6-27B-DFlash` at
# `<MODEL_DIR>/qwen3.6-27b-dflash/`. Get it via:
#
#   WITH_DFLASH_DRAFT=1 bash scripts/setup.sh qwen3.6-27b
#
# OR manually `hf download z-lab/Qwen3.6-27B-DFlash --local-dir <MODEL_DIR>/qwen3.6-27b-dflash`.
# If missing, vLLM falls back silently to baseline bf16 decode (~25 TPS
# instead of 125 TPS — reported by @lolren in club-3090#18). See
# `dual-dflash.yml` header for the under-training caveat.
#
# Dependencies:
#   - 2x RTX 3090 (Ampere SM 8.6) WITH NVLink bridge installed and `nvidia-smi
#     topo -m` showing `NV*` between GPU0 and GPU1
#   - vLLM PR #40361 (Marlin pad-sub-tile-n) — patched files vendored in-repo
#     at ../../patches/vllm-marlin-pad/. PR is open upstream; drop the mount when
#     it lands. See ../../patches/vllm-marlin-pad/README.md.
#
# All dual-card variants in this dir:
#
#   File                                    Ctx    Streams   Narr/Code TPS   KV       Vision  NVLink
#   dual/docker-compose.yml (DEFAULT)       262K   2         69 / 89          fp8      ✓      not used
#   multi4/docker-compose.yml                262K   4         63 / 76          fp8      ✓      not used (4x PCIe)
#   multi4/dflash.yml         262K   2         64 / 104         FP16     ✓      not used (4x PCIe)
#   dual/nvlink.yml          262K   2         (community)      fp8      ✓      required
#   dual/nvlink-turbo.yml    262K   4         101 / 133        TQ3      ✓      required
#   dual/turbo.yml           262K   4         54 / 73          TQ3      ✓      not used
#   dual/dflash.yml          185K   1         82 / 125         FP16     ✓      not used
#   dual/dflash-noviz.yml    200K   1         78 / 127         FP16     ✗      not used
#   dual/nvlink-dflash.yml   185K   1         (community)      FP16     ✓      required
#   dual/nvlink-dflash-noviz.yml 200K   1         (community)      FP16     ✗      required
#
# To run:
#   cd <repo>/models/qwen3.6-27b/vllm/compose
#   docker compose -f dual/nvlink-dflash-noviz.yml up -d
# ===========================================================================
services:
  vllm-qwen36-27b-dual-nvlink-dflash-noviz:
    image: vllm/vllm-openai:nightly-1acd67a795ebccdf9b9db7697ae9082058301657
    container_name: vllm-qwen36-27b-dual-nvlink-dflash-noviz
    restart: "no"
    ports:
      - "${BIND_HOST:-0.0.0.0}:${PORT:-8019}:8000"
    volumes:
      - ${MODEL_DIR:-../../../../../models-cache}:/root/.cache/huggingface
      # torch.compile + Triton kernel caches — first boot warms (~60-90 sec);
      # subsequent boots reuse cached graphs. Pattern from Sander's PROD launch.
      # Closes club-3090 #22.
      - ../../cache/torch_compile:/root/.cache/vllm/torch_compile_cache
      - ../../cache/triton:/root/.triton/cache
      # Marlin pad-sub-tile-n (vLLM PR #40361) — vendored in this repo at
      # ../../patches/vllm-marlin-pad/. Drops out when vllm#40361 lands upstream.
      - ../../patches/vllm-marlin-pad/marlin.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/kernels/linear/mixed_precision/marlin.py:ro
      - ../../patches/vllm-marlin-pad/MPLinearKernel.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/kernels/linear/mixed_precision/MPLinearKernel.py:ro
      # vLLM PR #35936 required-tool fallback (drop when upstream lands).
      - ../../patches/vllm-pr35936-required-fallback/vllm/entrypoints/openai/chat_completion/serving.py:/usr/local/lib/python3.12/dist-packages/vllm/entrypoints/openai/chat_completion/serving.py:ro
      - ../../patches/vllm-pr35936-required-fallback/vllm/entrypoints/openai/engine/serving.py:/usr/local/lib/python3.12/dist-packages/vllm/entrypoints/openai/engine/serving.py:ro
      # froggeric/Qwen-Fixed-Chat-Templates qwen3.6 — fixes 7 default-template
      # bugs (empty <think></think> spam, </thinking> hallucination, unclosed
      # think before tool call, no-user-query crash, developer role, etc.).
      # See docs/UPSTREAM.md "Community templates / model assets" + the row at
      # https://huggingface.co/froggeric/Qwen-Fixed-Chat-Templates
      - ../../patches/froggeric-chat-template/chat_template.jinja:/etc/qwen-froggeric-chat-template.jinja:ro
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      # NVLink bridge present — let NCCL use P2P (don't disable it the way
      # dual-dflash-noviz.yml does for PCIe-only stacks) and pin the P2P level
      # to NVLink so NCCL doesn't fall back to PCIe paths if topology query is fuzzy.
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_LEVEL=NVL
      - VLLM_NO_USAGE_STATS=1
      - VLLM_USE_FLASHINFER_SAMPLER=1
      - OMP_NUM_THREADS=1
      # JusefPol report (PR #31): expandable_segments=True crashes on startup
      # with NVLink wired in. Keep max_split_size_mb cap, drop the rest.
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint:
      - /bin/bash
      - -c
      - |
        # VLLM_ENFORCE_EAGER=1 in .env disables CUDA graphs — use on
        # hardware where graph capture causes OOM or instability (e.g. WSL2).
        exec vllm serve ${VLLM_ENFORCE_EAGER:+--enforce-eager} "$@"
      - --
    command:
      - --model
      - /root/.cache/huggingface/qwen3.6-27b-autoround-int4
      - --served-model-name
      - qwen3.6-27b-autoround
      - --quantization
      - auto_round
      - --dtype
      - bfloat16
      - --tensor-parallel-size
      - "2"
      # Custom all-reduce ENABLED (no --disable-custom-all-reduce) — NVLink
      # makes vLLM's custom kernel a win. dual-dflash-noviz.yml disables it
      # because PCIe P2P bandwidth makes the NCCL fallback faster there.
      - --max-model-len
      - "${MAX_MODEL_LEN:-188000}"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTILIZATION:-0.95}"
      - --max-num-seqs
      - "1"
      - --max-num-batched-tokens
      - "8192"
      # No --kv-cache-dtype: DFlash needs head_size=256 + non-causal attention,
      # and no Ampere backend supports that triple with fp8/turbo KV. FP16 default
      # is the only working choice (matches Qwen3.5-27B + DFlash row 4 = 89.7 TPS).
      # --language-model-only frees ~0.78 GiB of MoonViT weights → 15K more KV ctx.
      - --language-model-only
      - --trust-remote-code
      # froggeric chat-template override (see volumes block + docs/UPSTREAM.md)
      - --chat-template
      - /etc/qwen-froggeric-chat-template.jinja
      - --reasoning-parser
      - qwen3
      - --default-chat-template-kwargs
      - '{"enable_thinking": false}'
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --speculative-config
      - '{"method":"dflash","model":"/root/.cache/huggingface/qwen3.6-27b-dflash","num_speculative_tokens":5}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
