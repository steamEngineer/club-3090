# ===========================================================================
# Profile (at-a-glance):
#   Model:     Qwen3.6-27B AWQ-BF16-INT4 (cyankiwi — int4 AWQ body + BF16 mtp head;
#              compressed-tensors pack-quantized)
#   Topology:  Dual 3090 (TP=2, NVLink auto-detected via NVLINK_MODE)
#   Drafter:   MTP n=3 (built-in — the checkpoint embeds the mtp.* head, BF16)
#   KV:        int8_per_token_head (1 byte/token, 8-bit — higher KV fidelity than the
#              fast tier's fp8_e5m2; keeps the full 262K at TP=2)
#   Vision:    yes
#   Max ctx:   262K (text_config max_position_embeddings; head_dim 256 uniform → int8-PTH native)
#   Genesis:   none — intentionally Genesis-free
#   Status:    🧪 Experimental
#   Quality:   105/150 (det 64/75 · sandbox 41/75) (--full, same harness 2026-06-07). 8-pack A/B
#                same day: fast 109 · balanced 105 · max 110 — a TIE (det 64/64/65; within ±5-7
#                noise; balanced nominally lowest). The short-ctx 8-pack can't separate the quants.
#   ⚠️ Honest standing: balanced is DOMINATED by the fast tier (vllm/dual) — slower (~67 vs ~89
#                code TPS), SMALLER KV pool (370K/1.41× vs fast's measured 622K/2.37× @262K: the
#                heavier 27 GB AWQ weights leave less KV room than fast's 17.5 GB autoround), AND
#                tied/below on the 8-pack. Its ONLY possible edge is int8-PTH KV fidelity > fast's
#                fp8_e5m2 — UNPROVEN (the short-ctx 8-pack is blind to it). Note int8-PTH and fp8
#                are the SAME size, so this is a fidelity bet, not a memory one. Survives only if
#                the long-ctx NIAH A/B (#470) shows int8-PTH materially better high-ctx recall;
#                otherwise deprecate — fast wins on speed AND pool.
#   Best for:  EXPERIMENTAL int8-PTH-KV-fidelity bet, pending the long-ctx NIAH A/B (#470). NOT a
#                recommended tier today — fast (vllm/dual) dominates it on speed + KV pool.
# ---------------------------------------------------------------------------
# Dual RTX 3090 — Qwen3.6-27B "balanced" tier (vllm/qwen-27b-dual-balanced).
# cyankiwi AWQ-BF16-INT4 weights + MTP n=3 + int8-PTH KV + vision. 4-bit weights (Marlin
# WNA16) + the max tier's 8-bit int8-per-token-head KV (higher fidelity than the fast tier's
# fp8_e5m2). The BF16 MTP head is kept full-precision for spec-decode accept quality. NOTE:
# the heavier 27 GB AWQ weights make this SLOWER and SMALLER-KV-pool than the fast tier — it
# is NOT a free middle; see the Quality block. Its reason-to-exist is the int8-PTH fidelity
# bet, pending #470.
#
# Where it sits in the dual family (measured v0.22.0 @262K, TP=2):
#   vllm/dual (≡ qwen-27b-dual-fast)   autoround int4 + fp8_e5m2 KV   ~89 code · pool 622K/2.37×  ← default: fastest + biggest pool
#   vllm/qwen-27b-dual-balanced (this) AWQ int4      + int8-PTH  KV   ~67      · pool 370K/1.41×  ← int8-PTH fidelity bet (unproven)
#   vllm/qwen-27b-dual-max             FP8 (8-bit)   + int8-PTH  KV   ~56      · pool 295K/1.13×  ← highest weight-fidelity, slowest
#
# Dependencies:
#   - 2× RTX 3090 (Ampere SM 8.6), PCIe-only (no NVLink — works fine; NVLink
#     auto-detected at boot via NVLINK_MODE if present)
#   - vLLM STABLE v0.22.0 image (Docker Hub, immutable) — no source overlays.
#     AWQ pack-quantized loads via the compressed-tensors path (Marlin int4 on Ampere);
#     int8_per_token_head KV is native on stock v0.22.0 for this uniform-head-dim model.
#
# Run (direct docker; or `launch.sh vllm/qwen-27b-dual-balanced`):
#   cd <repo>/models/qwen3.6-27b/vllm/compose
#   docker compose -f dual/awq-bf16-int4/int8.yml up -d
# ===========================================================================
# Hardware metadata (parsed by scripts/preflight.sh):
# Requires-min-vram-gb: 24
# Engine-profile: vllm-stable
# Requires-min-gpu-count: 2
# Tensor-parallel: 2
services:
  vllm-qwen36-27b-dual:
    # Pinned to a vLLM STABLE release (immutable — never purged from Docker Hub,
    # unlike nightlies; this is the #407 pin-drift fix). Genesis-free + fp8 KV
    # means no patch overlays are anchored here, so we ride stable releases.
    # Bump the tag to a newer stable after a verify-stress + soak gate.
    # Override with VLLM_IMAGE=... if you need a specific build.
    image: ${VLLM_IMAGE:-vllm/vllm-openai:v0.22.0}
    container_name: "${ESTATE_CONTAINER:-vllm-qwen36-27b-dual-balanced}"
    restart: ${CLUB3090_RESTART:-unless-stopped}
    ports:
      - "${BIND_HOST:-0.0.0.0}:${ESTATE_PORT:-${PORT:-8016}}:8000"
    volumes:
      - ${MODEL_DIR:-../../../../../../models-cache}:/root/.cache/huggingface
      # torch.compile + Triton kernel caches — first boot warms (~60-90 sec);
      # subsequent boots reuse cached graphs. Pattern from Sander's PROD launch.
      # Closes club-3090 #22.
      - ../../../cache/torch_compile:/root/.cache/vllm/torch_compile_cache
      - ../../../cache/triton:/root/.triton/cache
      # NOTE: vLLM source overlays (marlin-pad #40361, PR-35936 required-tool
      # fallback, PR-41800 truncate_prompt_tokens) were dropped 2026-05-25 — all
      # confirmed unnecessary on stable v0.21.0 (PR-41800 merged upstream; the
      # other two don't trip on a current vLLM). Keeping zero source mounts is
      # what makes this path pin-drift-immune. See docs/UPSTREAM.md.
      # froggeric/Qwen-Fixed-Chat-Templates qwen3.6 — fixes 7 default-template
      # bugs (empty <think></think> spam, </thinking> hallucination, unclosed
      # think before tool call, no-user-query crash, developer role, etc.).
      # See docs/UPSTREAM.md "Community templates / model assets" + the row at
      # https://huggingface.co/froggeric/Qwen-Fixed-Chat-Templates
      - ../../../patches/froggeric-chat-template/chat_template.jinja:/etc/qwen-froggeric-chat-template.jinja:ro
      # NVLink auto-detection — runs inside container at boot.
      - ../../../../../../scripts/detect_nvlink.sh:/etc/club3090/detect_nvlink.sh:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=${ESTATE_GPUS:-${NVIDIA_VISIBLE_DEVICES:-all}}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-${OFFLINE:-0}}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-${OFFLINE:-0}}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NVLINK_MODE=${NVLINK_MODE:-auto}
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_NO_USAGE_STATS=1
      - VLLM_USE_FLASHINFER_SAMPLER=1
      - OMP_NUM_THREADS=1
      # expandable_segments:True crashes boot on some setups (likely cuMemMap path).
      # Known: JusefPol on NVLink (PR #31), WSL2 single-card 3090 Ti.
      # Override via .env: PYTORCH_CUDA_ALLOC_CONF=expandable_segments:False
      - PYTORCH_CUDA_ALLOC_CONF=${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True,max_split_size_mb:512}
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint:
      - bash
      - -c
      - |
        # VLLM_ENFORCE_EAGER=1 in compose/.env disables CUDA graphs — use on
        # hardware where Cliff 2 GDN activation spikes occur at runtime
        # (~50-65K active context tokens). Costs ~20-30% TPS in exchange for
        # stability. See docs/HARDWARE.md "Note for WSL2 / Windows users".
        # NVLink auto-detection (sets NCCL env vars, _NVLINK_ENABLED).
        source /etc/club3090/detect_nvlink.sh
        if [ "$${_NVLINK_ENABLED:-0}" = "1" ]; then
          exec vllm serve $${VLLM_ENFORCE_EAGER:+--enforce-eager} "$$@"
        else
          exec vllm serve $${VLLM_ENFORCE_EAGER:+--enforce-eager} --disable-custom-all-reduce "$$@"
        fi
      - --
    command:
      - --model
      - /root/.cache/huggingface/qwen3.6-27b-awq-bf16-int4
      - --served-model-name
      - qwen3.6-27b-awq-bf16-int4
      - --quantization
      - compressed-tensors
      - --dtype
      - bfloat16
      - --tensor-parallel-size
      - "${TP:-2}"
      - --pipeline-parallel-size
      - "${PP:-1}"
      - --max-model-len
      - "${MAX_MODEL_LEN:-262144}"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTILIZATION:-0.92}"
      - --max-num-seqs
      - "2"
      - --max-num-batched-tokens
      - "8192"
      - --kv-cache-dtype
      - "${KV_CACHE_DTYPE:-int8_per_token_head}"
      - --trust-remote-code
      # froggeric chat-template override (see volumes block + docs/UPSTREAM.md)
      - --chat-template
      - /etc/qwen-froggeric-chat-template.jinja
      - --reasoning-parser
      - qwen3
      - --default-chat-template-kwargs
      - '{"enable_thinking": false}'
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --speculative-config
      - '{"method":"mtp","num_speculative_tokens":3}'
      - --override-generation-config
      - '{"temperature":${TEMP:-${TEMPERATURE:-0.6}},"top_p":${TOP_P:-0.95},"top_k":${TOP_K:-20},"min_p":${MIN_P:-0.0},"repetition_penalty":${REPEAT_PENALTY:-1.0}}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
