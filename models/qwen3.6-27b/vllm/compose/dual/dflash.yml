# ===========================================================================
# Profile (at-a-glance):
#   Model:     Qwen3.6-27B (Lorbus AutoRound INT4 + BF16 mtp.fc preserved)
#   Topology:  Dual 3090 PCIe (TP=2, no NVLink)
#   Drafter:   z-lab DFlash N=5 (block-diffusion drafter)
#   KV:        fp8_e5m2 (forced bf16 for drafter via --dtype bfloat16)
#   Vision:    yes
#   Max ctx:   185K
#   Genesis:   none — DFlash drafter handles spec-decode independently
#   Status:    ✅ Production
#   Best for:  Peak code TPS with vision (AL ~4.4 vs MTP's 3.4) ⭐
# ---------------------------------------------------------------------------
# Dual-card DFlash — TP=2 + DFlash N=5 spec-decode + 185K ctx + vision.
#
# The peak-single-stream code TPS variant. DFlash N=5 (z-lab's Qwen3.6-27B
# draft model) unlocks 78 narr / 128 code TPS — substantially faster than
# the fp8/MTP default's 71/89 on code-heavy workloads (code AL ~4.7 vs MTP's 3.4).
#
# Trades vs the fp8/MTP default:
#   - max_model_len 262K → 185K (DFlash draft model adds ~500 MB VRAM per card,
#     and cudagraph + KV pool budget tightens at higher ctx)
#   - Single-stream only (parallel draft + main model uses concurrency budget)
#   - DFlash bias toward code hurts narrative AL (drops to ~2.8 on prose)
#
# Vision: ON (verified 2026-04-25 — MoonViT works with DFlash on Qwen3.6-27B).
# Drop vision for 200K ctx via dual/dflash-noviz.yml.
#
# KV cache: FP16 (default — DFlash needs head_size=256 + non-causal attention,
# and no Ampere backend supports that triple with fp8/turbo KV).
#
# Required workaround: vllm#40334 dtype mismatch fix is not yet upstream;
# compose sets `--dtype bfloat16` to match the draft's training dtype.
#
# ─── Prerequisite: download the DFlash draft model ──────────────────────
# This compose loads `z-lab/Qwen3.6-27B-DFlash` from
# `<MODEL_DIR>/qwen3.6-27b-dflash/` as the spec-decode draft. The default
# `bash scripts/setup.sh qwen3.6-27b` does NOT fetch this model — you must
# either re-run setup with the flag, or download it manually:
#
#   bash scripts/setup.sh qwen3.6-27b      # then:
#   WITH_DFLASH_DRAFT=1 bash scripts/setup.sh qwen3.6-27b
#
# OR manually:
#   hf download z-lab/Qwen3.6-27B-DFlash \
#     --local-dir <MODEL_DIR>/qwen3.6-27b-dflash
#
# If the draft is missing, vLLM falls back silently and your wall TPS will
# match unquantized bf16 baseline (~25 TPS on dual-3090 at 185K), NOT the
# DFlash-spec'd 125 TPS this compose is designed for. Reported by
# @lolren in club-3090#18.
#
# Caveat: the z-lab draft is still under training as of 2026-04-26 (per
# docs/UPSTREAM.md). Published 82 narr / 125 code TPS numbers in
# docs/DUAL_CARD.md are against the 2026-04-26 snapshot at peak code-prompt
# conditions. AL (and TPS) on real agent traffic will be lower until z-lab
# tags training-complete. The dual.yml MTP path remains the safer default
# for autonomous coding agents until then.
#
# To run:
#   cd <repo>/models/qwen3.6-27b/vllm/compose
# Sibling DFlash variants:
#   - dual/dflash.yml:           2× PCIe, 185K, 1 stream, 82/125 TPS
#   - dual/dflash-noviz.yml:     2× PCIe, 200K, 1 stream, 78/127 TPS
#   - dual/nvlink-dflash.yml:    2× NVLink, 185K, 1 stream, (community) TPS
#   - dual/nvlink-dflash-noviz.yml: 2× NVLink, 188K, 1 stream, (community) TPS
#   - multi4/dflash.yml:          4× PCIe, 262K, 2 streams, 64/104 TPS
#
#   docker compose -f dual/dflash.yml up -d
# ===========================================================================
services:
  vllm-qwen36-27b-dual-dflash:
    image: vllm/vllm-openai:nightly-01d4d1ad375dc5854779c593eee093bcebb0cada
    container_name: vllm-qwen36-27b-dual-dflash
    restart: "no"
    ports:
      - "${BIND_HOST:-0.0.0.0}:${PORT:-8012}:8000"
    volumes:
      - ${MODEL_DIR:-../../../../../models-cache}:/root/.cache/huggingface
      # torch.compile + Triton kernel caches — first boot warms (~60-90 sec);
      # subsequent boots reuse cached graphs. Pattern from Sander's PROD launch.
      # Closes club-3090 #22.
      - ../../cache/torch_compile:/root/.cache/vllm/torch_compile_cache
      - ../../cache/triton:/root/.triton/cache
      # Marlin pad-sub-tile-n (vLLM PR #40361) — vendored in this repo at
      # ../../patches/vllm-marlin-pad/. Drops out when vllm#40361 lands upstream.
      - ../../patches/vllm-marlin-pad/marlin.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/kernels/linear/mixed_precision/marlin.py:ro
      - ../../patches/vllm-marlin-pad/MPLinearKernel.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/kernels/linear/mixed_precision/MPLinearKernel.py:ro
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_NO_USAGE_STATS=1
      - VLLM_USE_FLASHINFER_SAMPLER=1
      - OMP_NUM_THREADS=1
      # expandable_segments:True crashes boot on some setups (likely cuMemMap path).
      # Known: JusefPol on NVLink (PR #31), WSL2 single-card 3090 Ti.
      # Override via .env: PYTORCH_CUDA_ALLOC_CONF=expandable_segments:False
      - PYTORCH_CUDA_ALLOC_CONF=${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True,max_split_size_mb:512}
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint:
      - /bin/bash
      - -c
      - |
        # VLLM_ENFORCE_EAGER=1 in .env disables CUDA graphs — use on
        # hardware where graph capture causes OOM or instability (e.g. WSL2).
        exec vllm serve ${VLLM_ENFORCE_EAGER:+--enforce-eager} "$@"
      - --
    command:
      - --model
      - /root/.cache/huggingface/qwen3.6-27b-autoround-int4
      - --served-model-name
      - qwen3.6-27b-autoround
      - --quantization
      - auto_round
      - --dtype
      - bfloat16
      - --tensor-parallel-size
      - "2"
      - --disable-custom-all-reduce
      - --max-model-len
      - "${MAX_MODEL_LEN:-185000}"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTILIZATION:-0.95}"
      - --max-num-seqs
      - "1"
      - --max-num-batched-tokens
      - "8192"
      # No --kv-cache-dtype: DFlash needs head_size=256 + non-causal attention,
      # and no Ampere backend supports that triple with fp8/turbo KV. FP16 default
      # is the only working choice (matches Qwen3.5-27B + DFlash row 4 = 89.7 TPS).
      # --language-model-only removed to enable MoonViT vision tower (2026-04-25 test).
      - --trust-remote-code
      - --reasoning-parser
      - qwen3
      - --default-chat-template-kwargs
      - '{"enable_thinking": false}'
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --speculative-config
      - '{"method":"dflash","model":"/root/.cache/huggingface/qwen3.6-27b-dflash","num_speculative_tokens":5}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
