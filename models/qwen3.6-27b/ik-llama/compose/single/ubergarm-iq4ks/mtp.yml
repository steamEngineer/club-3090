# ===========================================================================
# Profile (at-a-glance):
#   Model:     Qwen3.6-27B (ubergarm MTP-IQ4_KS GGUF — imatrix IQK quant)
#   Engine:    ik_llama.cpp (ghcr.io/ikawrakow/ik-llama-cpp@sha256:5f914f1ccade922417af58c94bd1cbb558052c8852d86678ead3fe693eec0143)
#   Topology:  Single 3090 (TP=1)
#   Drafter:   MTP n=2, p-min 0.0 (built-in MTP head)
#   KV:        q4_0 K + q4_0 V (default — max-context-first; -khad/-vhad
#              Hadamard transforms on K and V caches for quantized-KV accuracy,
#              no VRAM cost. KV_TYPE=q8_0 = ampersandru's, higher KV fidelity,
#              caps ~131-200K ctx)
#   Template:  native (GGUF-embedded) — A/B'd froggeric v19 here, native won
#              the 8-pack 103 vs 99 (toolcall TIED 9/9); see header note below
#   Vision:    NO (text-only this profile; mmproj is a separate axis → -vision.yml)
#   Default ctx: 200000 — ik's MEASURED max-safe fill (ceiling-laddered on-rig
#              2026-05-23), q4_0 KV. Was 262144 (full n_ctx_train) but that is a
#              *boot* ceiling, not a *fill* ceiling — see the "boots ≠ fills" note
#              below. The ~0.5 GB weight lean does NOT buy more ctx than mainline:
#              ik forces n_ubatch=n_batch (=4096) so its larger graph buffer eats
#              the lean → ~same free VRAM as mainline at equal ctx. For lower VRAM /
#              cross-rig-safe boot, set CTX_SIZE=131072.
#   MAX ctx:   262144 (model native ceiling; n_ctx_train = n_ctx_orig_yarn = 262144).
#              ⚠ "boots ≠ fills": -ub 1024 @ 262144 boots at 22.5 GB / 24 with the KV
#              pool pre-reserved (verified 2026-05-21) — but that is a boot number, it
#              does NOT mean a prompt fills to 262K. The mainline llama-cpp twin walls
#              at ~125K (FA transient scratch at high fill — docs/CLIFFS.md 2026-05-23);
#              ik laddered on-rig 2026-05-23: 224K fills 205K but leaves only 477 MB at
#              the ceiling; 210K fills 193K leaving 863 MB — both under the 1024 MB
#              agent-safety margin. 200000 (≈1131 MB at ceiling) is the safe default. -ub 512 @ 262144
#              → 21.5 GB if you need the extra ~1 GB back.
#   Status:    ✅ Production (advanced-quant track, #180). In the wizard +
#              `bash scripts/switch.sh ik-llama/iq4ks-mtp`.
#   Perf:      ~18-20% FASTER decode TPS than shipped llamacpp/mtp Q4_K_M
#              (~60 narr / ~69 code vs ~50/58, at set-and-readback matched 370 W
#              same card), quality-tied (8-pack 103 vs 102), AND ~0.5-0.8 GB
#              leaner VRAM — faster AND leaner. Confirmed by a power-cap A/B +
#              5 ik runs (all ~70 code). The 2026-05-22 "tie" was a wrong-engine
#              measurement artifact (its tie number = mainline@370). See discussions/184.
#   Best for:  VRAM-tight single-card (sub-24 GB, shared GPU, WSL display tax)
#              where the leaner footprint matters; or if you want IQK quants.
# ---------------------------------------------------------------------------
# Qwen3.6-27B on ik_llama.cpp — single 3090, IQ4_KS + q4_0 KV + MTP, 200K default (262K native max).
#
# CONFIG SOURCE: ampersandru's authoritative launch flags from discussion #152
# (comment 16999100). Reproduced verbatim:
#     -ngl 99 --ctx-size 122880 -ngld 99 --multi-token-prediction
#     --draft-max 2 --draft-p-min 0.0 --merge-qkv
#
# JUSTIFIED DEVIATIONS from his config:
#   1. KV type — we DEFAULT q4_0 (max-context-first: enables the full 262K
#      native ctx on one 3090). ampersandru's full config uses q8_0; both fit
#      and are near-lossless. f16 KV would OOM at high ctx (8.3 GB @122K). For
#      max KV fidelity set KV_TYPE=q8_0 (caps ~131-200K — q8_0 @262K ~10 GB OOMs).
#   2. --reasoning off — stack-wide thinking-off-by-default policy (matches
#      llama-cpp mtp.yml). Without it the Qwen3.6 template defaults thinking
#      ON; short-budget requests return empty content (all tokens spent in
#      <think>). Bench passes enable_thinking=false anyway; this aligns the
#      raw endpoint to the same policy.
#   3. NATIVE chat template (no --chat-template-file). We A/B'd froggeric v19
#      here (it loads + suppresses thinking fine) but native scored HIGHER on
#      the 8-pack: 103 vs 99, with the toolcall pack TIED 9/9 and the agentic
#      hermesagent pack favouring native (12 vs 11). froggeric's template fixes
#      help the vLLM/qwen3_coder parser path (#157, +10pp there) but bring no
#      measurable gain on ik_llama's parser — so native is the default here
#      too. (vLLM keeps its own froggeric copy under vllm/patches/.)
#
# Engine pinned by digest (engine policy):
#   ghcr.io/ikawrakow/ik-llama-cpp@sha256:5f914f1ccade922417af58c94bd1cbb558052c8852d86678ead3fe693eec0143
#     @sha256:c13e0798e4117649962833adc932362b64cb7080cfc9dbb1235161f43f8d5c49
#   cu13 = matches our CUDA 13.2 host driver.
#
# Quick start:
#   1. Get the MTP-IQ4_KS GGUF:
#        hf download ubergarm/Qwen3.6-27B-GGUF Qwen3.6-27B-MTP-IQ4_KS.gguf \
#          --local-dir $MODEL_DIR/qwen3.6-27b-gguf/ubergarm-mtp-iq4ks
#   2. From this directory:
#        MODEL_DIR=/your/models/dir docker compose -f iq4ks-mtp.yml up -d
#   3. curl http://localhost:8020/v1/models  → should list the model.
#
# Override defaults via .env or shell:
#   MODEL_DIR              host dir to mount as /models
#   GGUF_FILE             path under /models (default: …ubergarm-mtp-iq4ks/Qwen3.6-27B-MTP-IQ4_KS.gguf)
#   CTX_SIZE              KV pool size       (default: 200000; native MAX 262144 — see header)
#   BATCH_SIZE           llama.cpp -b       (default: 4096 — matches llama-cpp mtp.yml)
#   UBATCH_SIZE          llama.cpp -ub      (default: 1024; set 512 for 262144 ctx, ~2-4% TPS cost)
#   NP                   parallel slots     (default: 1)
#   KV_TYPE              K and V quant type (default: q4_0 = max-ctx; q8_0 = ampersandru's, higher fidelity)
#   MTP_DRAFT_N_MAX      MTP draft tokens   (default: 2)
#   DRAFT_P_MIN          draft accept floor (default: 0.0)
#   REASONING            thinking gate      (default: off; set 'on' to enable reasoning — see below)
#   REASONING_FORMAT     reasoning routing  (default: deepseek)
#
# ⭐ TEST WITH REASONING ON (one env flip):
#     REASONING=on MODEL_DIR=/your/models docker compose -f iq4ks-mtp.yml up -d
#   The reasoning-format (deepseek) routing is always present; only the
#   --reasoning gate flips. When ON, also tune MTP deeper (MTP_DRAFT_N_MAX=5
#   DRAFT_P_MIN=0.5) — reasoning text drafts well, so a deeper draft pays off
#   (Vincent's thinking-on profile). Default-off keeps n=2/p-min 0.0 (the
#   thinking-off sweet spot).
#   PORT                 host port          (default: 8020)
#   CUDA_VISIBLE_DEVICES which GPU to use   (default: 0)

services:
  ik-llama-qwen36-27b-iq4ks-mtp:
    image: ${IK_LLAMA_IMAGE:-ghcr.io/ikawrakow/ik-llama-cpp@sha256:5f914f1ccade922417af58c94bd1cbb558052c8852d86678ead3fe693eec0143}
    container_name: "${ESTATE_CONTAINER:-ik-llama-qwen36-27b}"
    restart: unless-stopped
    ports:
      - "${ESTATE_PORT:-${PORT:-8020}}:8080"
    volumes:
      - "${MODEL_DIR:-../../../../../../models-cache}:/models:ro"
    # server target ENTRYPOINT is /app/llama-server — args only below.
    # ⚠ -np 1 is intentional on a single 24 GB card — do NOT raise it to
    #   "parallelize." One GPU is compute-bound: extra slots divide its
    #   throughput, they don't multiply it. At -np 4 each slot fell to
    #   ~14 tok/s here — slow enough to trip agentic clients' per-request
    #   timeouts (aider ran 1/30) — and -np>1 also auto-disables MTP and
    #   can OOM the spec-context buffer. On a higher-throughput card (e.g.
    #   5090) or multi-GPU the trade may flip — re-validate before raising.
    command: >-
      --host 0.0.0.0
      --port 8080
      --model /models/${GGUF_FILE:-qwen3.6-27b-gguf/ubergarm-mtp-iq4ks/Qwen3.6-27B-MTP-IQ4_KS.gguf}
      -ngl 99
      --ctx-size ${CTX_SIZE:-200000}
      -b ${BATCH_SIZE:-4096}
      -ub ${UBATCH_SIZE:-1024}
      -np ${NP:-1}
      -ctk ${KV_TYPE:-q4_0}
      -ctv ${KV_TYPE:-q4_0}
      -khad
      -vhad
      -ngld 99
      --spec-type mtp:n_max=${MTP_DRAFT_N_MAX:-2},p_min=${DRAFT_P_MIN:-0.0}
      --recurrent-ckpt-mode auto
      --merge-qkv
      -fa on
      --jinja
      --parallel-tool-calls
      --reasoning ${REASONING:-off}
      --reasoning-format ${REASONING_FORMAT:-deepseek}
      --temp ${TEMP:-${TEMPERATURE:-0.6}}
      --top-p ${TOP_P:-0.95}
      --top-k ${TOP_K:-20}
      --min-p ${MIN_P:-0.0}
      --repeat-penalty ${REPEAT_PENALTY:-1.0}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${ESTATE_GPUS:-${CUDA_VISIBLE_DEVICES:-0}}"]
              capabilities: [gpu]
