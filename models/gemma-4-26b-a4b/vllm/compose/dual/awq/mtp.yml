# ===========================================================================
# Profile (at-a-glance):
#   Model:     Gemma 4 26B-A4B MoE (cyankiwi AWQ-4bit, compressed-tensors)
#   Topology:  Dual 3090 (TP=2, NVLink auto-detected via NVLINK_MODE)
#   Drafter:   MTP n=4 — google/gemma-4-26B-A4B-it-assistant (external)
#   KV:        bfloat16 (sidesteps Ampere fp8 dispatch issues)
#   Vision:    off (limit-mm-per-prompt image=0 audio=0)
#   Max ctx:   262K (model max — laddered: KV pool 806,821 tok at 262144/0.92
#              util on 2x 3090; sliding_window=1024 keeps most-layer KV cheap)
#   Genesis:   N/A — Genesis is Qwen3-Next-specific
#   Status:    🧪 Experimental — AWQ + external MTP on stock vLLM v0.22.0; boot-validated 2026-06-06 (#326), rebench-full/soak pending before Production
# ---------------------------------------------------------------------------
# AWQ-4bit (compressed-tensors → Marlin WNA16 on sm_86) + the external MTP
# assistant drafter wired via `--speculative-config`. n=4 per the
# gemma-26b-it-assistant DrafterProfile. Sibling `single/awq/base.yml` is the
# no-spec tp=1 baseline; this is the tp=2 + MTP path.
#
# Wiring history (#326, 2026-06-06): the AutoRound-int4-mixed weights (bf16.yml,
# now in ../_archive/) are Ampere-dead — int4-MIXED packs to `uint8b128`, which
# has no W4A16 kernel on sm_86 (Cutlass/Machete are Hopper-only; Triton W4A16
# only takes uint4b8/uint4). The cyankiwi AWQ-4bit (pure uint4, compressed-
# tensors) resolves to Marlin WNA16 MoE on sm_86 and serves cleanly. The prior
# no-spec `awq/bf16.yml` was archived (this MTP variant supersedes it).
#
# Per the Qwen 35B-A3B preview-MTP finding (slower despite high acceptance),
# stay skeptical on MTP net-gain — measure with rebench-full before any default.
#
# Why a separate drafter path (not built-in MTP head):
#   Gemma 4 26B-A4B doesn't ship a built-in MTP head — `mtp_num_hidden_layers`
#   is null in the model YAML. Google released an external assistant model
#   (`google/gemma-4-26B-A4B-it-assistant`, ~0.97 GB BF16) for this purpose.
#   Same family pattern as the 31B assistant we already use for `gemma-bf16-mtp`.
#
# PR #40886 (AWQ compressed-tensors MoE key remap) is now in stock v0.22.0 —
# no overlay needed (validated #326, 2026-06-05).
# ===========================================================================
# Hardware metadata (parsed by scripts/preflight.sh):
# Requires-min-vram-gb: 24
# Engine-profile: vllm-stable
# Requires-min-gpu-count: 2
# Tensor-parallel: 2
# Requires-sm: 7.5+
services:
  vllm-gemma-4-26b-a4b-awq-mtp-tp2:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:v0.22.0}
    container_name: "${ESTATE_CONTAINER:-vllm-gemma-4-26b-a4b-awq-mtp-tp2}"
    restart: ${CLUB3090_RESTART:-unless-stopped}
    ports:
      - "${ESTATE_PORT:-${PORT:-8041}}:8000"
    volumes:
      - ${MODEL_DIR:-../../../../../../models-cache}:/root/.cache/huggingface
      - ../../../cache/torch_compile:/root/.cache/vllm/torch_compile_cache
      - ../../../cache/triton:/root/.triton/cache
      # NVLink auto-detection — runs inside container at boot (same path as dual-max).
      - ../../../../../../scripts/detect_nvlink.sh:/etc/club3090/detect_nvlink.sh:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=${ESTATE_GPUS:-${NVIDIA_VISIBLE_DEVICES:-all}}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-${OFFLINE:-0}}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-${OFFLINE:-0}}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NVLINK_MODE=${NVLINK_MODE:-auto}
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_NO_USAGE_STATS=1
      - OMP_NUM_THREADS=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:512
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - TRITON_CACHE_DIR=/root/.triton/cache
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint:
      - bash
      - -c
      - |
        # NVLink auto-detect: detect_nvlink.sh sets the NCCL env + _NVLINK_ENABLED;
        # vLLM custom all-reduce is ON for NVLink/P2P, OFF (--disable-custom-all-reduce)
        # for PCIe. $$ escapes $ so Compose v5.1+ passes the bash through verbatim — an
        # un-escaped _NVLINK_ENABLED ref would be interpolated at parse time → forced to 0.
        source /etc/club3090/detect_nvlink.sh
        if [ "$${_NVLINK_ENABLED:-0}" = "1" ]; then
          exec vllm serve "$$@"
        else
          exec vllm serve --disable-custom-all-reduce "$$@"
        fi
      - --
    command:
      - --override-generation-config
      - '{"temperature":${TEMP:-${TEMPERATURE:-1.0}},"top_p":${TOP_P:-0.95},"top_k":${TOP_K:-64},"min_p":${MIN_P:-0.0},"repetition_penalty":${REPEAT_PENALTY:-1.0}}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - /root/.cache/huggingface/gemma-4-26b-a4b-awq-4bit
      - --served-model-name
      - gemma-4-26b-a4b-awq
      - --tensor-parallel-size
      - "${TP:-2}"
      - --pipeline-parallel-size
      - "${PP:-1}"
      - --max-model-len
      - "${MAX_MODEL_LEN:-262144}"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTILIZATION:-0.92}"
      - --max-num-seqs
      - "256"
      - --max-num-batched-tokens
      - "4096"
      - --limit-mm-per-prompt
      - '{"image":0,"audio":0}'
      - --kv-cache-dtype
      - auto
      - --trust-remote-code
      - --enable-auto-tool-choice
      - --tool-call-parser
      - gemma4
      # Route Gemma-4's <|channel>thought…<channel|> trace into reasoning_content
      # (vLLM Gemma4ReasoningParser). No-ops with thinking OFF (no channel tokens);
      # required for verify-full check 6. Matches gemma-4-31b/12b composes.
      - --reasoning-parser
      - gemma4
      - --chat-template
      - /vllm-workspace/examples/tool_chat_template_gemma4.jinja
      - --enable-prefix-caching
      - --enable-chunked-prefill
      # External MTP assistant drafter — n=4 per gemma-26b-it-assistant DrafterProfile.
      - --speculative-config
      - '{"model":"/root/.cache/huggingface/gemma-4-26b-a4b-it-assistant","num_speculative_tokens":4}'
