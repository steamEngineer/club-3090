# ===========================================================================
# Profile (at-a-glance):
#   Model:     Gemma 4 26B-A4B MoE (Intel AutoRound INT4 mixed)
#   Topology:  Single 3090 (TP=1)
#   Drafter:   none (base smoke compose — MTP via gemma-26b-it-assistant
#              can be added once base boot is validated)
#   KV:        bfloat16 (sidesteps Ampere fp8 dispatch issues — same logic
#              as gemma-4-31b/single/docker-compose.yml)
#   Vision:    off (limit-mm-per-prompt image=0 audio=0) for first boot
#   Max ctx:   8K (conservative — first-boot smoke; bump after validation)
#   Genesis:   none (Gemma 4 family doesn't need Genesis — engine
#              vllm-nightly-clean rides latest nightly)
#   Status:    🧪 Experimental — v0.7.3 MoE onboarding, first boot pending
#   Active params: ~4B (128 experts × 8 active = ~4B routed)
# ---------------------------------------------------------------------------
# Gemma 4 26B-A4B-it (Intel AutoRound INT4 mixed) — first MoE model added to
# club-3090 alongside Qwen 3.6 35B-A3B.
#
# Why vllm-nightly-clean (not vllm-nightly-mtp):
#   Gemma 4 family doesn't need Genesis patches (no DeltaNet quirks).
#   By routing through the unconstrained nightly we get latest upstream
#   features (incl. continued MoE-loader improvements) without waiting on
#   Genesis re-anchor cycles.
#
# Why no drafter on this compose:
#   The 26B-A4B has an external MTP assistant (google/gemma-4-26B-A4B-it-
#   assistant, ~0.97 GB) — separate weights from the 31B assistant.
#   Validating base boot first, then layering MTP on top in a follow-up.
#
# Models:
#   target: Intel/gemma-4-26B-A4B-it-int4-mixed-AutoRound
#           (~14 GB — quant mix of MoE expert layers)
#   draft : none on this compose (gemma-26b-it-assistant compose TBD)
#
# KV format pinned to bf16:
#   - fp8_e5m2 → blocked by gemma4_mm.py assert (vLLM allowlist)
#   - fp8_e4m3 → Triton "fp8e4nv not supported" on sm_86 Ampere
#   - default bf16 → sidesteps both — same pattern as 31B single
# Smaller KV pool than fp8 but at 8K initial ctx not the bottleneck.
# ===========================================================================
# Hardware metadata (parsed by scripts/preflight.sh):
# Requires-min-vram-gb: 24
# Engine-profile: vllm-nightly-clean
# Requires-min-gpu-count: 1
# Tensor-parallel: 1
# Requires-sm: 7.5+
services:
  vllm-gemma-4-26b-a4b-tp1:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:nightly-${VLLM_NIGHTLY_SHA}}
    container_name: "${ESTATE_CONTAINER:-vllm-gemma-4-26b-a4b-tp1}"
    restart: ${CLUB3090_RESTART:-unless-stopped}
    ports:
      - "${ESTATE_PORT:-${PORT:-8040}}:8000"
    volumes:
      - ${MODEL_DIR:-../../../../../../models-cache}:/root/.cache/huggingface
      - ../../../cache/torch_compile:/root/.cache/vllm/torch_compile_cache
      - ../../../cache/triton:/root/.triton/cache
    environment:
      - NVIDIA_VISIBLE_DEVICES=${ESTATE_GPUS:-${NVIDIA_VISIBLE_DEVICES:-all}}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-${OFFLINE:-0}}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-${OFFLINE:-0}}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_NO_USAGE_STATS=1
      - OMP_NUM_THREADS=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:512
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - TRITON_CACHE_DIR=/root/.triton/cache
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command:
      - --override-generation-config
      - '{"temperature":${TEMP:-${TEMPERATURE:-1.0}},"top_p":${TOP_P:-0.95},"top_k":${TOP_K:-64},"min_p":${MIN_P:-0.0},"repetition_penalty":${REPEAT_PENALTY:-1.0}}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - /root/.cache/huggingface/gemma-4-26b-a4b-autoround-int4-mixed
      - --served-model-name
      - gemma-4-26b-a4b-autoround
      - --tensor-parallel-size
      - "${TP:-1}"
      - --pipeline-parallel-size
      - "${PP:-1}"
      - --max-model-len
      - "${MAX_MODEL_LEN:-8192}"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTILIZATION:-0.92}"
      - --max-num-seqs
      - "256"
      - --max-num-batched-tokens
      - "4096"
      - --limit-mm-per-prompt
      - '{"image":0,"audio":0}'
      - --kv-cache-dtype
      - auto
      - --trust-remote-code
      - --enable-auto-tool-choice
      - --tool-call-parser
      - gemma4
      - --chat-template
      - /vllm-workspace/examples/tool_chat_template_gemma4.jinja
