# ===========================================================================
# Profile (at-a-glance):
#   Model:     Gemma 4 26B-A4B MoE (cyankiwi AWQ-4bit, compressed-tensors)
#   Topology:  Dual 3090 (TP=2)
#   Drafter:   none (base smoke compose — MTP via gemma-26b-it-assistant
#              can be added in a follow-up compose)
#   KV:        bfloat16 (sidesteps Ampere fp8 dispatch issues — Triton
#              fp8e4nv not supported on sm_86)
#   Vision:    off (limit-mm-per-prompt image=0 audio=0) for first boot
#   Max ctx:   32K (first-boot smoke; can extend after validation)
#   Genesis:   none (Gemma 4 family doesn't need Genesis)
#   Status:    🧪 Experimental — v0.7.3 MoE onboarding, AWQ path with PR #40886 overlay (validation pending)
#   Active params: ~4B (128 experts × 8 active = ~4B routed)
# ---------------------------------------------------------------------------
# Gemma 4 26B-A4B-it (cyankiwi AWQ-4bit, compressed-tensors format) — the
# v0.7.3 production Ampere path for this model, replacing the Intel
# AutoRound INT4 attempt which is structurally blocked on SM86 by Marlin
# K-dim alignment (moe_intermediate_size=704 not aligned to group_size=128).
#
# Why this works on Ampere where AutoRound INT4 doesn't:
#   - AWQ via compressed-tensors routes through a different vLLM kernel
#     path that handles arbitrary K shapes (unlike Marlin)
#   - PR #40886 overlay (mounted below) fixes the KeyError on the
#     `_packed` / `_scale` suffixed MoE expert weights — without this,
#     vLLM's `gemma4.py::_weight_iterator` doesn't know how to remap
#     the compressed-tensors per-expert keys into the FusedMoE format
#
# Overlay drops when: vLLM PR #40886 merges upstream AND vllm-nightly-clean
# bumps past the merge commit. Track in docs/UPSTREAM.md.
#
# Vendor: cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit (~17 GB on disk, 4 shards).
# Format: compressed-tensors pack-quantized, group-quantized scales.
# PR #40886 head: tajwali/vllm @ 652819dad0bf9bbb0436d6660822e7aff30c3ff0.
# ===========================================================================
# Hardware metadata (parsed by scripts/preflight.sh):
# Requires-min-vram-gb: 24
# Engine-profile: vllm-nightly-clean
# Requires-min-gpu-count: 2
# Tensor-parallel: 2
# Requires-sm: 7.5+
services:
  vllm-gemma-4-26b-a4b-awq-tp2:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:nightly-${VLLM_NIGHTLY_SHA}}
    container_name: "${ESTATE_CONTAINER:-vllm-gemma-4-26b-a4b-awq-tp2}"
    restart: ${CLUB3090_RESTART:-unless-stopped}
    ports:
      - "${ESTATE_PORT:-${PORT:-8042}}:8000"
    volumes:
      - ${MODEL_DIR:-../../../../../../models-cache}:/root/.cache/huggingface
      - ../../../cache/torch_compile:/root/.cache/vllm/torch_compile_cache
      - ../../../cache/triton:/root/.triton/cache
      # vLLM PR #40886 overlay — AWQ compressed-tensors MoE key remapping.
      # See ../../../patches/vllm-pr40886-awq-moe-keys/README.md.
      - ../../../patches/vllm-pr40886-awq-moe-keys/install.sh:/etc/club3090/install-pr40886.sh:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=${ESTATE_GPUS:-${NVIDIA_VISIBLE_DEVICES:-all}}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-${OFFLINE:-0}}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-${OFFLINE:-0}}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_NO_USAGE_STATS=1
      - OMP_NUM_THREADS=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:512
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - TRITON_CACHE_DIR=/root/.triton/cache
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint:
      - /bin/bash
      - -c
      - |
        # PR #40886 overlay must run BEFORE `vllm serve` imports the model
        # module — installs the AWQ compressed-tensors key remapping into
        # gemma4.py via an anchor-based Python patcher (idempotent).
        bash /etc/club3090/install-pr40886.sh
        exec vllm serve ${VLLM_ENFORCE_EAGER:+--enforce-eager} "$@"
      - --
    command:
      - --override-generation-config
      - '{"temperature":${TEMP:-${TEMPERATURE:-1.0}},"top_p":${TOP_P:-0.95},"top_k":${TOP_K:-64},"min_p":${MIN_P:-0.0},"repetition_penalty":${REPEAT_PENALTY:-1.0}}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - /root/.cache/huggingface/gemma-4-26b-a4b-awq-4bit
      - --served-model-name
      - gemma-4-26b-a4b-awq
      - --tensor-parallel-size
      - "${TP:-2}"
      - --pipeline-parallel-size
      - "${PP:-1}"
      - --max-model-len
      - "${MAX_MODEL_LEN:-32768}"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTILIZATION:-0.92}"
      - --max-num-seqs
      - "256"
      - --max-num-batched-tokens
      - "4096"
      - --limit-mm-per-prompt
      - '{"image":0,"audio":0}'
      - --kv-cache-dtype
      - auto
      - --trust-remote-code
      - --enable-auto-tool-choice
      - --tool-call-parser
      - gemma4
      - --chat-template
      - /vllm-workspace/examples/tool_chat_template_gemma4.jinja
      - --enable-prefix-caching
      - --enable-chunked-prefill
